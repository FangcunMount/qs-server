# 在 nginx.conf 的 http {} 内 include 本文件（位于 limit_conn_zone 之前 include map）。
# 部署路径示例：/opt/infra/components/nginx/conf.d/http-conn-limit.conf
#
# 生产默认单 IP 20 连接；压测客户端 IP 单独放宽。改完后 docker restart nginx，
# 并用 docker exec nginx grep limit_conn 确认容器内已生效。

map $binary_remote_addr $conn_limit_per_ip_value {
    default 20;
    # 压测机公网 IP（按需增删）
    61.49.247.106 5000;
}

limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_conn conn_limit_per_ip $conn_limit_per_ip_value;
