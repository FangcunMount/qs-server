# image.fangcunmount.cn —— 静态资源（图片等，按需部署）
# 注意：本文件被包含于 http{} 内
# 将 root 指向对象存储挂载点或本地发布目录；无静态资源时可不启用本 server。

# 与 API 网关一致的来源白名单（canvas 等需跨域读像素时）
map $http_origin $image_cors_origin {
    default "";
    "~^https://([a-z0-9-]+\.)?fangcunmount\.cn$" $http_origin;
}

server {
    listen 443 ssl;
    http2 on;
    server_name image.fangcunmount.cn;

    ssl_certificate     /data/ssl/certs/fangcunmount.cn.crt;
    ssl_certificate_key /data/ssl/private/fangcunmount.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 5m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        root /data/www/image;
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Access-Control-Allow-Origin $image_cors_origin always;
        add_header Vary Origin always;
    }
}

server {
    listen 80;
    server_name image.fangcunmount.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$server_name$request_uri;
    }
}
