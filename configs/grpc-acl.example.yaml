# gRPC method ACL example (IR-R016 Phase A)
#
# Enable on apiserver with:
#   grpc.acl.enabled: true
#   grpc.acl.config-file: configs/grpc-acl.example.yaml
#   grpc.acl.default-policy: deny
#
# service_name must exactly match the mTLS ServiceName extracted from each
# client certificate. Canonical workload CNs end in .svc.

default_policy: deny

services:
  - service_name: qs-collection-server.svc
    enabled: true
    description: collection-server BFF least-privilege apiserver RPC surface
    allowed_methods:
      - /answersheet.AnswerSheetService/SaveAnswerSheet
      - /answersheet.AnswerSheetService/LookupAnswerSheetSubmission
      - /answersheet.AnswerSheetService/GetAnswerSheet
      - /answersheet.AnswerSheetService/ListAnswerSheets
      - /questionnaire.QuestionnaireService/GetQuestionnaire
      - /questionnaire.QuestionnaireService/ListQuestionnaires
      - /evaluation.TesteeEvaluationService/GetMyAssessment
      - /evaluation.TesteeEvaluationService/ListMyAssessments
      - /evaluation.TesteeEvaluationService/GetAssessmentScores
      - /evaluation.TesteeEvaluationService/GetFactorTrend
      - /evaluation.TesteeEvaluationService/GetHighRiskFactors
      - /evaluation.AssessmentIntakeService/ResolveAssessmentByAnswerSheetID
      - /interpretation.ParticipantReportService/GetAssessmentReport
      - /actor.ActorService/CreateTestee
      - /actor.ActorService/GetTestee
      - /actor.ActorService/UpdateTestee
      - /actor.ActorService/TesteeExists
      - /actor.ActorService/ListTesteesByOrg
      - /actor.ActorService/ListTesteesByUser
      - /actor.ActorService/GetTesteeCareContext
      - /assessmentmodel.AssessmentModelCatalogService/GetPublishedModel
      - /assessmentmodel.AssessmentModelCatalogService/ListPublishedModels
      - /assessmentmodel.AssessmentModelCatalogService/ListHotPublishedModels
      - /assessmentmodel.AssessmentModelCatalogService/GetCatalogOptions

  - service_name: qs-worker.svc
    enabled: true
    description: worker least-privilege apiserver RPC surface
    allowed_methods:
      - /evaluation.AssessmentIntakeService/EnsureAssessment
      - /evaluation.EvaluationWorkerService/ExecuteEvaluation
      - /interpretation.InterpretationAutomationService/GenerateReportFromOutcome
      - /internalapi.InternalService/SyncAssessmentAttention
      - /internalapi.InternalService/HandleQuestionnairePublishedPostActions
      - /internalapi.InternalService/HandleScalePublishedPostActions
      - /internalapi.InternalService/SendTaskOpenedMiniProgramNotification
