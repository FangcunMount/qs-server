# ============================================================
# qs-worker 生产环境配置
# ============================================================
# 用途：后台任务处理、事件消费、消息队列 Worker
# 维护人：DevOps Team
# 最后更新：2025-01-20
# 说明：Worker 无对外暴露端口，仅消费消息队列
# ============================================================

# ============================================================
# 1. 应用配置
# ============================================================
# 应用级别的基础配置

# -------------------------------------------------------
# 1.1 服务器模式
# -------------------------------------------------------
server:
  mode: release  # server mode: release, debug, test

metrics:
  enable: true
  bind_address: "0.0.0.0"
  bind_port: 9092

# -------------------------------------------------------
# 1.2 Worker 配置
# -------------------------------------------------------
worker:
  # Enable only after setting the audited Durable Attention Projection cutover.
  attention-projection-reconcile-enabled: false
  attention-projection-reconcile-from: ""
  attention-projection-reconcile-dry-run: true
  service-name: "qs-worker"   # 服务名称（用于日志和监控）
  concurrency: 48              # 300QPS 目标：serverD 单实例消费并发（与 apiserver gRPC 跨云）

# ============================================================
# 2. 消息队列配置
# ============================================================
# NSQ 或 RabbitMQ 消息队列配置

messaging:
  provider: nsq  # 消息队列提供者: nsq, rabbitmq
  nsq-addr: "nsqd:4150"
  nsq-lookupd-addr: "nsqlookupd:4161"
  rabbitmq-url: "amqp://guest:guest@127.0.0.1:5672/"
  delivery:
    enable: true
    max-attempts: 8

retry_governance:
  automatic-retry-enabled: true  # emergency switch; manual/force authorization is unaffected
  hold-replay:
    max-attempts: 30
    base-delay: 10s
    max-delay: 1h
    jitter-fraction: 0.2

# ============================================================
# 3. gRPC 客户端配置
# ============================================================
# 调用 apiserver 的 gRPC 服务

grpc:
  apiserver-addr: "qs-apiserver:9090"  # Docker 容器服务名
  insecure: false
  tls-ca-file: "/etc/qs-server/ssl/grpc/ca/ca-chain.crt"
  tls-cert-file: "/etc/qs-server/ssl/grpc/server/qs-worker.crt"
  tls-key-file: "/etc/qs-server/ssl/grpc/server/qs-worker.key"
  tls-server-name: ""

# ============================================================
# 4. 存储配置
# ============================================================
# MySQL、MongoDB、Redis 数据库配置

# -------------------------------------------------------
# 4.1 MySQL 数据库
# -------------------------------------------------------
mysql:
  host: "127.0.0.1:3306"
  username: "app_user"
  password: ""
  database: "qs"
  max-idle-connections: 12
  max-open-connections: 50
  max-connection-life-time: "1h"
  log-level: 2  # 生产环境只记录 Error
  location: "Asia/Shanghai"
  session-time-zone: "+08:00"

# -------------------------------------------------------
# 4.2 MongoDB 数据库
# -------------------------------------------------------
# 支持两种方式：分离参数（推荐）或直接 URL
mongodb:
  host: "127.0.0.1:27017"
  username: "app_user"
  password: ""
  database: "questionnaire_scale"
  # url: ""  # 可选，如果设置则优先使用
  use-ssl: false
  ssl-insecure-skip-verify: false
  ssl-allow-invalid-hostnames: false
  ssl-ca-file: ""
  ssl-pem-keyfile: ""
  # MongoDB 日志配置
  enable-logger: true             # 生产环境启用 MongoDB 命令日志
  slow-threshold: 500ms           # 生产环境慢查询阈值（可以调高）
  
  # 详细日志配置（component-base v0.4.1+ 已支持）
  log-command-detail: true        # 启用查询详情（用于慢查询分析）
  log-reply-detail: false         # 生产环境禁用响应详情
  log-started: false              # 生产环境禁用命令开始日志

# -------------------------------------------------------
# 4.3 Redis
# -------------------------------------------------------
# 用途：缓存、会话、限流等临时数据
# DB 分配约定（生产）：
#   - DB 0: IAM 业务
#   - DB 1: QS 业务默认 Redis
#   - DB 2+: 缓存/锁专用
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
  database: 1
  max-idle: 32
  max-active: 150
  timeout: 300
  min-idle-conns: 5
  pool-timeout: 10
  dial-timeout: 5
  read-timeout: 5
  write-timeout: 5
  enable-cluster: false
  use-ssl: false

redis_profiles:
  lock_cache:
    database: 6
  ops_runtime:
    database: 0

lock_lease:
  renewal_enabled: false

redis_runtime:
  namespace: ""
  families:
    lock_lease:
      redis_profile: "lock_cache"
      namespace_suffix: "cache:lock"
      allow_fallback_default: true
    ops_runtime:
      redis_profile: "ops_runtime"
      namespace_suffix: "ops:runtime"
      allow_fallback_default: true

cache:
  capabilities:
    report_status:
      ttl_seconds: 172800

# Worker 仅发布 report_status_changed；Redis Pub/Sub 不是可靠业务事件通道。
signaling:
  redis:
    enabled: true
    prefix: "qs:signal"
    buffer_size: 100

# ============================================================
# 5. 系统配置
# ============================================================
# 日志等系统级配置

# -------------------------------------------------------
# 5.1 日志配置（生产环境 - JSON 格式）
# -------------------------------------------------------
# 说明：生产环境使用 JSON 格式便于日志采集和分析
log:
  disable-caller: true          # 生产环境禁用调用者信息（性能优化）
  disable-stacktrace: true      # 仅在 panic 时记录堆栈
  level: debug                   # 日志级别: debug, info, warn, error, fatal, panic
  format: console               # 日志格式: console(开发), json(生产)
  enable-color: true            # 生产环境禁用颜色
  development: true            # 生产模式
  name: "qs-worker"             # 日志名称
  max-size: 100                 # 单个日志文件最大 100MB
  max-age: 30                   # 保留 30 天
  max-backups: 10               # 保留 10 个备份文件
  compress: true                # 压缩旧文件节省空间
  enable-time-rotation: true
  time-rotation-format: "2006-01-02"
  enable-level-output: true
  level-output-mode: "duplicate"
  level-output-paths:
    all:
      - stdout
      - /data/logs/qs/qs-worker.log
    warn:
      - /data/logs/qs/qs-worker-warn.log
    error:
      - stderr
      - /data/logs/qs/qs-worker-error.log
