# ============================================================================
# qs-apiserver 生产环境配置
# ============================================================================
# 用途：QS 系统核心 API 服务，提供 REST API 和 gRPC 服务
# 维护：运维团队
# 更新时间：2025-12-10
# ============================================================================

# ============================================================================
# 1. 应用基础配置
# ============================================================================
app:
  name: "qs-apiserver"
  version: "1.0.0"
  mode: "production"  # development, production

# ============================================================================
# 2. 服务端口配置
# ============================================================================

# ----------------------------------------------------------------------------
# 2.1 RESTful HTTP/HTTPS 服务配置
# ----------------------------------------------------------------------------
server:
    mode: release # 生产环境默认 release
    healthz: true
    profiling: true # 是否开启 pprof（/debug/pprof），用于生成火焰图
    metrics: true # 是否开启 Prometheus 指标（/metrics），用于观测 HTTP QPS/延迟
    middlewares: recovery,enhanced_logger,secure,nocache,cors
    max-ping-count: 3

# HTTP REST API 配置（不安全，内网使用）
# 用途：内网服务间调用、健康检查，性能优先（无 TLS 握手开销）
# 安全策略：通过 Docker 网络隔离 + 防火墙规则限制访问
insecure:
  bind-address: "0.0.0.0"
  bind-port: 8080

# HTTPS REST API 配置（安全，外网访问）
# 用途：外部客户端访问（管理后台、第三方服务）
# 访问路径：客户端 -> Nginx (443) -> qs-apiserver (8443)
secure:
  bind-address: "0.0.0.0"
  bind-port: 8443
  tls:
    # Web 证书（容器内路径，由 docker-compose 从宿主机挂载）
    cert-file: "/etc/qs-server/ssl/certs/fangcunmount.cn.crt"
    private-key-file: "/etc/qs-server/ssl/private/fangcunmount.cn.key"

# ----------------------------------------------------------------------------
# 2.2 gRPC 服务配置（生产环境 - 安全模式）
# ----------------------------------------------------------------------------
# 端口策略：
#   - 9090: gRPC 服务端口，启用 mTLS 双向认证，仅限内网可信服务访问
#   - 9091: 健康检查端口，HTTP 协议，供监控系统使用（不需要客户端证书）
grpc:
  bind-address: "0.0.0.0"
  bind-port: 9090        # gRPC 服务端口
  healthz-port: 9091     # 健康检查端口（独立 HTTP 端口，无需 mTLS）

  # 生产环境必须启用 TLS
  insecure: false
  # 证书路径（宿主机 /data/infra/ssl/grpc → 容器 /etc/qs-server/ssl/grpc）
  tls-cert-file: "/etc/qs-server/ssl/grpc/server/qs-apiserver.crt"
  tls-key-file: "/etc/qs-server/ssl/grpc/server/qs-apiserver.key"

  # 消息大小限制
  max-msg-size: 4194304  # 4MB

  # 连接管理
  max-connection-age: 120s
  max-connection-age-grace: 20s

  # mTLS 双向认证配置（QS 内部服务简化模式）
  # 说明：QS 三件套内部通信，通过 OU 白名单简化管理，无需维护 CN 白名单
  mtls:
    enabled: true
    ca-file: "/etc/qs-server/ssl/grpc/ca/ca-chain.crt"  # CA 证书链
    require-client-cert: true  # 强制客户端提供证书

    # CN 白名单：留空以简化管理（新增 QS 服务无需修改配置）
    allowed-cns: []

    # OU 白名单：只允许 QS 组织的服务访问
    allowed-ous:
      - "QS"  # 所有 OU=QS 的证书都可访问（包括 collection-server, evaluation-server 等）

    # TLS 版本控制
    min-tls-version: "1.2"

    # 证书自动重载（生产环境推荐）
    enable-auto-reload: true
    reload-interval: 5m

  # 认证配置（如需对外暴露 gRPC API 时启用）
  auth:
    enabled: false  # 内部服务通信无需 JWT，mTLS 已提供身份验证

  # 方法级 ACL：默认拒绝，仅允许 collection-server 与 worker 访问各自的精确 RPC。
  acl:
    enabled: true
    config-file: "configs/grpc-acl.prod.yaml"
    default-policy: "deny"

  # 审计配置（未来扩展）
  audit:
    enabled: false

  # 功能开关
  enable-reflection: false    # 生产环境禁用反射（安全考虑）
  enable-health-check: true   # 启用健康检查

# collection-server 代表 IAM User 调用患者报告 gRPC 时的短期委托凭据。
# 密钥只允许通过环境变量注入：
#   QS_APISERVER_DELEGATED_SUBJECT_CURRENT_KEY
#   QS_APISERVER_DELEGATED_SUBJECT_PREVIOUS_KEY（轮换窗口可选）
delegated-subject:
  enabled: true
  current-key: ""
  previous-key: ""
  ttl: 5m

# ============================================================================
# 3. 数据存储配置
# ============================================================================

# ----------------------------------------------------------------------------
# 3.1 MySQL 数据库配置
# ----------------------------------------------------------------------------
mysql:
  host: "127.0.0.1:3306"
  username: "app_user"
  password: ""
  database: "qs"
  max-idle-connections: 40        # 4C/8G mixed_280+：略增热连接，减少池重建
  max-open-connections: 150       # 与 backpressure.mysql.max_inflight 对齐（4C/8G 榨干档）
  max-connection-life-time: 30m   # 缩短连接生命周期，避免超时
  max-idle-time: 10m              # 添加空闲超时
  log-level: 4 # 生产降低日志级别
  location: "Asia/Shanghai"      # DATETIME 解析统一使用上海时区
  session-time-zone: "+08:00"   # 每个连接显式设置 MySQL session time_zone

# ----------------------------------------------------------------------------
# 3.2 数据库迁移配置
# ----------------------------------------------------------------------------
migration:
  enabled: true   # 生产环境建议开启
  autoseed: false
  database: "qs"

# ----------------------------------------------------------------------------
# 3.3 Redis 配置（单实例）
# ----------------------------------------------------------------------------
# DB 分配约定（生产）：
#   - DB 0: IAM 业务
#   - DB 1: QS 业务默认 Redis
#   - DB 2+: 缓存/锁/元数据专用
redis:
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
  database: 1
  max-idle: 48
  max-active: 384                 # 4C/8G：对齐混合读+缓存并发（≈容器内存 75% 内）
  timeout: 300
  min-idle-conns: 10
  pool-timeout: 10
  dial-timeout: 5
  read-timeout: 5
  write-timeout: 5
  enable-cluster: false
  use-ssl: false

redis_profiles:
  static_cache:
    database: 2
  object_cache:
    database: 3
  query_cache:
    database: 4
  meta_cache:
    database: 7
  rank_cache:
    database: 8
  sdk_cache:
    database: 5
  lock_cache:
    database: 6
  ops_runtime:
    database: 0

lock_lease:
  renewal_enabled: false

redis_runtime:
  namespace: ""
  families:
    static_meta:
      redis_profile: "static_cache"
      namespace_suffix: "cache:static"
      allow_fallback_default: true
      allow_warmup: true
    object_view:
      redis_profile: "object_cache"
      namespace_suffix: "cache:object"
      allow_fallback_default: true
    query_result:
      redis_profile: "query_cache"
      namespace_suffix: "cache:query"
      allow_fallback_default: true
      allow_warmup: true
    meta_hotset:
      redis_profile: "meta_cache"
      namespace_suffix: "cache:meta"
      allow_fallback_default: true
    business_rank:
      redis_profile: "rank_cache"
      namespace_suffix: "cache:rank"
      allow_fallback_default: true
    sdk_token:
      redis_profile: "sdk_cache"
      namespace_suffix: "cache:sdk"
      allow_fallback_default: true
    lock_lease:
      redis_profile: "lock_cache"
      namespace_suffix: "cache:lock"
      allow_fallback_default: true
    ops_runtime:
      redis_profile: "ops_runtime"
      namespace_suffix: "ops:runtime"
      allow_fallback_default: true

# Redis Pub/Sub 仅承载 report-status 唤醒和缓存失效；失败不回滚业务状态，
# 也绝不能替代 durable_outbox。
signaling:
  redis:
    enabled: true
    prefix: "qs:signal"
    buffer_size: 100

# ----------------------------------------------------------------------------
# 3.4 Plan 业务配置
# ----------------------------------------------------------------------------
plan:
  entry_base_url: "https://collect.fangcunmount.cn/entry"

# ----------------------------------------------------------------------------
# 3.5 缓存控制
# ----------------------------------------------------------------------------
cache:
  capabilities:
    survey:
      questionnaire: {enabled: true, ttl: "2h", negative: true}
    modelcatalog:
      published_model: {enabled: true, ttl: "2h", negative: true}
    evaluation:
      assessment_detail: {enabled: true, ttl: "1h", singleflight: true}
      assessment_list: {enabled: true, ttl: "10m", singleflight: false}
    actor:
      testee: {enabled: true, ttl: "30m", negative: true}
    plan:
      detail: {enabled: true, ttl: "12h", singleflight: true}
    statistics:
      query: {enabled: true, ttl: "26h", singleflight: false}
    report_status:
      ttl_seconds: 172800
  defaults:
    compress_payload: false         # 是否压缩缓存 payload

    static:               # 静态数据缓存（如量表、问卷定义等），适合长期缓存，穿透保护优先
      negative_ttl: "5m"
      compress: false     # 生产环境可以适度启用压缩，节省内存和网络带宽
      singleflight: true  # 启用单飞，避免缓存穿透时的雪崩效应
      negative: false     # 生产环境建议禁用负缓存，避免数据更新后长时间读取旧数据；依赖单飞机制保护数据库安全

    object:               # 对象数据缓存（如测评结果等），适合短期缓存，性能优先
      negative_ttl: "5m"
      compress: false     # 生产环境可以适度启用压缩，节省内存和网络带宽
      singleflight: true  # 启用单飞，避免缓存穿透时的雪崩效应
      negative: false     # 生产环境建议禁用负缓存，避免数据更新后长时间读取旧数据；依赖单飞机制保护数据库安全

    query:                # 查询结果缓存 family 默认值；Statistics capability 单独使用 26h TTL
      negative_ttl: "5m"
      compress: false     # 生产环境可以适度启用压缩，节省内存和网络带宽
      singleflight: true  # 线 B1：统计 query cache miss 合并回源，避免缓存击穿雪崩
      negative: false     # 生产环境建议禁用负缓存，避免数据更新后长时间读取旧数据；依赖单飞机制保护数据库安全

    ttl_jitter_ratio: 0.2       # 缓存时间抖动比例，生产环境建议设置为 0.1（10%），避免大量缓存同时过期导致的性能问题

  governance:
    statistics_warmup:          # 统计查询结果缓存预热配置
      enable: true              # 启用统计缓存预热，生产环境建议开启以提升关键统计查询的性能
      warm_on_startup: true     # 进程启动预热 overview（不依赖 warmup.startup.query）
      org_ids: [1]              # 组织ID列表（从配置读取，默认预热所有组织）
      overview_presets: ["latest_complete_day", "7d", "30d"] # 首页概览常用窗口

    warmup:
      enable: true              # 启用缓存预热，生产环境建议开启以提升关键数据的访问性能
      startup:                  # 启动预热，生产环境建议开启以提升服务启动后的访问性能
        static: true            # 预热静态数据（如量表、问卷定义等），生产环境建议开启以提升访问性能
        query: false            # 预热查询结果，生产环境可以根据实际情况选择是否开启；如果某些统计查询非常重且访问频繁，建议开启预热
      hotset:                   # 热点数据预热配置，生产环境建议开启以提升访问性能
        enable: true            # 启用热点数据预热
        top_n: 20               # 预热前 N 热数据，生产环境建议设置为 20，平衡预热覆盖率和性能；如果访问分布非常集中，可以适当增加 top_n
        max_items_per_kind: 200 # 每种类型预热的最大数据量，生产环境建议设置为 200，避免预热过多数据导致性能问题；如果某些类型的数据访问非常频繁，可以适当增加 max_items_per_kind

# ----------------------------------------------------------------------------
# 3.6 内建调度器配置
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# 3.6.1 计划调度器任务
# ----------------------------------------------------------------------------
plan_scheduler:
  enable: true                  # 启用计划调度器
  org_ids: [1]                  # 组织ID列表（从配置读取，默认调度所有组织）
  initial_delay: "1m"           # 启动后首次调度延迟，避免与其他服务启动冲突
  interval: "60m"               # 2C4G 临时降配阶段回到保守扫描频率
  pending_lookback: "24h"       # 只自动开放最近 24 小时内到期的 pending 任务，避免历史补录任务被立即开放
  lock_key: "qs:plan-scheduler:leader" # 分布式锁键，确保单实例执行
  lock_ttl: "2m"                # 锁过期时间，略长于调度间隔，避免死锁

# ----------------------------------------------------------------------------
# 3.6.2 评估一致性审计任务
# ----------------------------------------------------------------------------
evaluation_consistency_reconcile:
  enable: true                  # 启用评估 outcome 与 assessment 状态一致性审计
  interval: "10m"               # 扫描间隔
  batch_limit: 100              # 每轮最多扫描的 assessment 数量
  lock_key: "qs:evaluation-consistency-reconcile:leader" # 分布式锁键，确保单实例执行
  lock_ttl: "5m"               # 锁过期时间

# ----------------------------------------------------------------------------
# 3.6.5 事件出库重投任务
# ----------------------------------------------------------------------------
# durable_outbox 只排空 configs/events.yaml 中的可靠业务事件；
# durable_outbox 不承担 Statistics 投影；Statistics 由夜间 Collector 读取权威业务数据。
outbox_relay:
  mongo:
    interval: "1s"                # mongo_domain_events DB fallback relay 周期；ready-index/immediate 可更早触发
    batch_size: 1000              # 每轮最多 claim 的 Mongo profile 事件数
    publish_workers: 48           # pretest120 实测 128 会把 Mongo 连接池打满；保留 48
    immediate_max_concurrent: 24  # mixed_300 chain_probe：略提 immediate 旁路并发
  assessment:
    interval: "1s"               # assessment_mysql_events DB fallback relay 周期
    batch_size: 200               # 每轮最多 claim 的 MySQL profile 事件数
    publish_workers: 24           # MySQL profile 并发 publish
    immediate_max_concurrent: 24  # evaluation.requested / outcome.committed immediate 并发上限

# ----------------------------------------------------------------------------
# 3.6.6 统计数据同步任务
# ----------------------------------------------------------------------------
statistics_sync:                # 统计数据同步任务配置
  enable: true                  # 启用统计数据同步任务: true
  org_ids: [1]                  # 组织ID列表（从配置读取，默认同步所有组织）: [1]
  run_at: "00:30"               # 每天凌晨 00:30 执行，避开业务高峰期: 00:30
  repair_window_days: 7         # 同步修复数据的时间窗口，默认最近 7 天: 7
  lock_key: "qs:statistics-sync:leader"   # 分布式锁键，确保单实例执行: qs:statistics-sync:leader
  lock_ttl: "30m"               # 锁过期时间，足够覆盖整个同步过程，避免重复执行

# ----------------------------------------------------------------------------
# 3.7 限流配置
# ----------------------------------------------------------------------------
rate_limit:
  enabled: true                   # 启用限流: true
  submit_global_qps: 300          # 全局提交 QPS: 300
  submit_global_burst: 450        # 全局提交突发量: 450
  submit_user_qps: 200            # 用户提交 QPS: 200
  submit_user_burst: 300          # 用户提交突发量: 300
  admin_submit_global_qps: 360    # 管理员全局提交 QPS: 360
  admin_submit_global_burst: 540  # 管理员全局提交突发量: 540
  admin_submit_user_qps: 320      # 管理员用户提交 QPS: 320
  admin_submit_user_burst: 480    # 管理员用户提交突发量: 480
  query_global_qps: 300           # 全局查询 QPS: 300
  query_global_burst: 450         # 全局查询突发量: 450
  query_user_qps: 200             # 用户查询 QPS: 200
  query_user_burst: 300           # 用户查询突发量: 300
  wait_report_global_qps: 300     # 全局等待报告 QPS: 300
  wait_report_global_burst: 450   # 全局等待报告突发量: 450
  wait_report_user_qps: 200       # 用户等待报告 QPS: 200
  wait_report_user_burst: 300     # 用户等待报告突发量: 300

# ----------------------------------------------------------------------------
# 3.8 下游背压配置
# ----------------------------------------------------------------------------
backpressure:
  # 4C/8G 榨干档（serverA）：抬高 inflight、延长槽位等待，减少 k6 30s transport timeout。
  # mongo max_inflight 与驱动连接池共享预算（outbox+业务经 MongoLimiter 合并计数）。
  mysql:
    enabled: true                  # 启用 MySQL 背压: true
    max_inflight: 150              # 4C/8G mixed_280+（原 180；对齐连接池 150）
    timeout_ms: 5000               # 槽位满时多等一会儿，避免过早失败放大 k6 VU 螺旋
  mongo:
    enabled: true                  # 启用 Mongo 背压: true
    max_inflight: 120              # 4C/8G mixed_280+（原 80，submit+outbox 主瓶颈）
    timeout_ms: 5000               # 与 mysql 对齐，优先在应用内排队
  iam:
    enabled: true                  # 启用 IAM 背压: true
    max_inflight: 100              # 4C/8G：略抬跨机 IAM gRPC 并发
    timeout_ms: 4000               # 请求超时时间: 4000ms

# ----------------------------------------------------------------------------
# 3.8.1 系统治理聚合（工作台）
# ----------------------------------------------------------------------------
# Prometheus 与组件端点由 apiserver 聚合，前端不再直连 collection/worker。
system_governance:
  retry:
    manual_actions_enabled: true
    lease_reconcile_enabled: true
    lease:
      run_duration: 5m
      reconcile_interval: 10s
      reconcile_jitter_fraction: 0
    business:
      max_automatic_attempts: 3
      base_delay: 30s
      max_delay: 5m
      jitter_fraction: 0
    outbox:
      max_automatic_attempts: 30
      base_delay: 10s
      max_delay: 1h
      jitter_fraction: 0.2
  # 生产默认关闭；上线时按动态限流、队列、Leader 让权顺序逐项启用。
  resilience:
    tune_rate_limit: false
    drain_queue: false
    resume_queue: false
    release_lock: false
  prometheus:
    # infra/components/prometheus 与 qs-apiserver 同在 infra-network，Query API 使用服务名访问。
    enabled: true
    base_url: "http://prometheus:9090"
    timeout: 3s
  components:
    collection-server:
      discovery: dns
      minimum_instances: 2
      resilience_url: "http://qs-collection-server:8080/governance/resilience"
      cache_url: "http://qs-collection-server:8080/governance/redis"
      timeout: 3s
    worker:
      discovery: single
      resilience_url: "http://qs-worker:9092/governance/resilience"
      cache_url: "http://qs-worker:9092/governance/redis"
      timeout: 3s

# ----------------------------------------------------------------------------
# 3.9 MongoDB 数据库配置
# ----------------------------------------------------------------------------
# 支持两种方式：
# 1. 分离参数（推荐，便于通过环境变量覆盖）
# 2. 直接 URL（如果设置了 url，则忽略分离参数）
mongodb:
  # 如需直接提供完整连接串，可使用 url，优先级高于下面的分离字段。
  # Docker 单节点副本集示例：
  # url: "mongodb://app_user:password@mongo:27017/qs?replicaSet=rs0&directConnection=true"
  url: ""
  host: "127.0.0.1:27017"          # MongoDB 主机地址: 127.0.0.1:27017
  username: "app_user"             # MongoDB 用户名: app_user
  password: ""                     # MongoDB 密码:
  database: "qs"                   # MongoDB 数据库: qs
  replica-set: ""                  # 副本集名称（如 rs0）；使用分离字段或完整 url 都会生效
  direct-connection: false         # 单节点副本集可设为 true；使用分离字段或完整 url 都会生效
  use-ssl: false                   # 是否启用 SSL: false
  ssl-insecure-skip-verify: false  # 是否跳过 SSL 证书验证: false
  ssl-allow-invalid-hostnames: false # 是否允许无效主机名: false
  ssl-ca-file: ""                  # SSL CA 文件:
  ssl-pem-keyfile: ""              # SSL PEM 密钥文件:
  # MongoDB 日志配置
  enable-logger: true              # 启用 MongoDB 命令日志
  slow-threshold: 500ms            # 慢查询阈值（生产环境建议调高）

  # 详细日志配置（component-base v0.4.1+ 已支持，查询详情会自动脱敏）
  # 生产环境可以适度启用 log-command-detail 用于问题排查，性能影响很小
  log-command-detail: true        # 记录查询详情（用于慢查询分析和问题排查）
  log-reply-detail: false         # 生产环境禁用响应详情（避免日志过大）
  log-started: false              # 生产环境禁用命令开始日志（减少日志量）

# ----------------------------------------------------------------------------
# 3.10 消息队列配置
# ----------------------------------------------------------------------------
messaging:
  enabled: true                        # 启用消息队列发布: true
  provider: nsq                        # 消息队列类型: nsq 或 rabbitmq (生产环境建议使用 nsq, 优先使用 nsq)

  # NSQ 配置（生产环境使用 Docker 服务名或实际地址）
  nsq-addr: "nsqd:4150"                 # NSQ 生产者地址: nsqd:4150 (Docker 网络内部)
  nsq-lookupd-addr: "nsqlookupd:4161"   # NSQ Lookupd 地址: nsqlookupd:4161 (用于服务发现)

# EventSubsystem 本地消费者。hot-rank 与主 worker 使用同一 Topic、不同 channel，
# Redis 投影失败只会重试该 channel，不会阻断 answersheet Evaluation 主链。
# 只有 MQ-backed publisher 可用时才实际订阅；logging/nop 模式 status 显示 disabled。
eventing:
  consumers:
    modelcatalog-hot-rank:
      enabled: true
      channel: "qs-apiserver-modelcatalog-hot-rank-v1"

# ============================================================================
# 4. 外部服务集成配置
# ============================================================================

# ----------------------------------------------------------------------------
# 4.1 IAM 集成配置
# ----------------------------------------------------------------------------
iam:
  # 功能开关（灰度发布控制）
  enabled: true                   # 是否启用 IAM 集成（生产环境开启）
  grpc-enabled: true              # 是否启用 gRPC 调用
  jwks-enabled: true              # 是否启用 JWKS 本地验签

  # 可观测性配置
  enable-tracing: true            # 启用 OpenTelemetry 链路追踪
  enable-metrics: true            # 启用 Prometheus 指标

  # authz 规则通知
  authz-sync:                           # authz 规则同步配置 (authz 规则更新后，通过 NSQ 通知 apiserver 更新规则)
    enabled: true                       # 是否启用 authz 同步: true
    provider: "nsq"                     # 消息队列类型: nsq 或 rabbitmq (生产环境建议使用 nsq)
    nsq-lookupd-addr: "nsqlookupd:4161" # NSQ Lookupd 地址: nsqlookupd:4161 (用于服务发现)
    topic: "iam.authz.version"          # 主题: iam.authz.version
    channel-prefix: "qs-authz-sync"     # 频道前缀: qs-authz-sync

  # gRPC 连接配置
  grpc:
    address: "iam-apiserver:9090"       # IAM 在 serverB；经 Swarm overlay infra-network 解析（勿映射到宿主机 9090）
    timeout: 5s                         # 请求超时时间: 5s (生产环境建议调高)
    retry-max: 3                        # 最大重试次数: 3 (生产环境建议调高)

    # mTLS 证书配置（宿主机 /data/infra/ssl/grpc → 容器 /etc/qs-server/ssl）
    tls:
      enabled: true               # 启用 mTLS 双向认证（匹配 IAM 9090 端口）
      ca-file: "/etc/qs-server/ssl/grpc/ca/ca-chain.crt"           # CA 证书链
      cert-file: "/etc/qs-server/ssl/grpc/server/qs-apiserver.crt" # QS 客户端证书
      key-file: "/etc/qs-server/ssl/grpc/server/qs-apiserver.key"  # QS 客户端私钥

  # JWT 验证配置
  jwt:
    issuer: "https://iam.fangcunmount.cn"              # Token 签发者（canonical issuer）
    audience: ["qs-api"]                               # 允许的受众（QS API 标识）
    algorithms: ["RS256", "ES256"]                     # 支持的签名算法
    clock-skew: 60s                                    # 时钟偏移容忍度
    required-claims: ["user_id", "tenant_id"]          # 必需的 Claims

  # JWKS 配置（JWT 公钥管理）
  jwks:
    url: "https://iam.fangcunmount.cn/.well-known/jwks.json"  # JWKS HTTP 端点
    grpc-endpoint: "iam-apiserver:9090"                       # gRPC 降级端点: iam-apiserver:9090 (HTTP 失败时使用，端口 9090)
    refresh-interval: 1h                                      # 定时刷新间隔: 1h (生产环境建议调高)
    cache-ttl: 24h                                            # 缓存有效期: 24h (生产环境建议调高)
    fetch-strategies: ["http", "grpc", "cache"]               # 降级策略: HTTP → gRPC → 缓存 (生产环境建议调高)

  # 用户信息缓存配置
  user-cache:
    enabled: true                                      # 启用用户信息缓存
    ttl: 5m                                            # 缓存时长: 5m (生产环境建议调高)
    max-size: 10000                                    # 最大缓存条目数

  # ProfileLink 缓存配置
  profile-link-cache:
    enabled: true                                      # 启用ProfileLink 缓存
    ttl: 10m                                           # 缓存时长（ProfileLink 变化较少）
    max-size: 50000                                    # 最大缓存条目数

# ----------------------------------------------------------------------------
# 4.2 微信小程序配置
# ----------------------------------------------------------------------------
wechat:
  # IAM 中的 wechatappId，用于查询微信应用信息（AppID、AppSecret 等）
  wechat-app-id: "wx72ade250b619a649"

  # 小程序页面路径，例如 "pages/home/index"
  page-path: "pages/assessment/fill/index"

  # 降级配置（如果 IAM 未启用时使用，可选）
  # app-id: ""      # 小程序 AppID（直接配置）
  # app-secret: ""  # 小程序 AppSecret（直接配置）

# ----------------------------------------------------------------------------
# 4.3 阿里云 OSS（二维码对象存储）
# ----------------------------------------------------------------------------
oss:
  enabled: true         # 是否启用 OSS 存储二维码图片: true
  region: "cn-beijing"  # OSS 存储区域（生产环境建议使用与服务器同地域的存储区域）
  # 生产建议优先使用同地域内网 endpoint
  endpoint: "oss-cn-beijing-internal.aliyuncs.com"  # OSS 内网 Endpoint（生产环境建议使用同地域内网地址）
  bucket: "fangcunmount"
  # 私有 Bucket 代理模式：对外仍返回 apiserver 的二维码路由，由服务端从 OSS 读取后转发
  public-base-url: "https://qs.fangcunmount.cn/api/v1/qrcodes"
  object-key-prefix: "qrcode"
  cache-control: "public, max-age=604800"
  use-internal-endpoint: true
  use-cname: false
  connect-timeout: 3s
  read-write-timeout: 10s
  retry-max-attempts: 2
  # 推荐通过 env_file 注入 AK/SK，而不是直接写在配置文件里
  # access-key-id: ""
  # access-key-secret: ""

# ----------------------------------------------------------------------------
# 4.4 测评人物图片（复用上方私有 OSS，由 qs-server 稳定代理）
# ----------------------------------------------------------------------------
assessment_assets:
  enabled: true
  object-key-prefix: "assessment-assets/typology"
  public-url-prefix: "https://qs.fangcunmount.cn/api/v1/assessment-assets/typology"
  max-upload-bytes: 5242880

# ============================================================================
# 5. 系统运行配置
# ============================================================================

# ----------------------------------------------------------------------------
# 5.1 日志配置（生产环境 - 使用 component-base duplicate 模式）
# ----------------------------------------------------------------------------
log:
  level: info                   # 日志基本级别：debug, info, warn, error, fatal, panic
  format: json               # 日志格式（json 适合生产环境，console 适合开发环境）
  enable-color: false            # 文件输出启用颜色
  development: false             # 开发模式: true, false
  name: "qs-apiserver"          # 日志名称

  # 📊 日志轮转配置
  max-size: 100                 # 单个日志文件最大 100MB
  max-age: 30                   # 保留 30 天
  max-backups: 10               # 保留 10 个备份文件
  compress: true                # 压缩旧文件节省空间

  # ⏰ 按时间轮转（推荐生产环境使用）
  enable-time-rotation: true    # 启用按天轮转
  time-rotation-format: "2006-01-02"  # 按天轮转

  # 🎯 分级输出（duplicate 模式 - 生产环境推荐）
  enable-level-output: true       # 启用分级输出
  level-output-mode: "duplicate"  # 重复输出模式（推荐）
  level-output-paths:
    all:
      - stdout                              # 容器/进程标准输出保留完整日志
      - /data/logs/qs/qs-apiserver.log      # 完整日志（所有级别）
    error:
      - stderr                              # ERROR 级别写入标准错误，便于监控采集
      - /data/logs/qs/qs-apiserver-error.log # 额外记录 ERROR（快速定位故障）
