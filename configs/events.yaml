# ============================================================================
# 领域事件配置
# ============================================================================
# 本文件只描述当前运行时真实生效的事件契约与 Topic 映射。
# delivery 语义：
#   durable_outbox  - 可靠业务事件，Outbox + NSQ
#   best_effort     - 尽力投递领域事件（direct publish），可丢
# 一次性唤醒信令见 configs/signals.yaml（ephemeral_signal，Redis Pub/Sub）
# ============================================================================

version: "1.0"

topics:
  questionnaire-lifecycle:
    name: "qs.survey.lifecycle"
    description: "问卷和量表生命周期事件"

  assessment-lifecycle:
    name: "qs.evaluation.lifecycle"
    description: "测评生命周期事件"

  analytics-behavior:
    name: "qs.analytics.behavior"
    description: "行为足迹与测评服务过程投影事件"

  task-lifecycle:
    name: "qs.plan.task"
    description: "测评任务生命周期事件"

events:
  questionnaire.changed:
    topic: questionnaire-lifecycle
    delivery: best_effort
    aggregate: Questionnaire
    domain: survey/questionnaire
    description: "问卷生命周期变化"
    handler: questionnaire_changed_handler

  assessment_model.changed:
    topic: questionnaire-lifecycle
    delivery: best_effort
    aggregate: AssessmentModel
    domain: modelcatalog
    description: "测评模型生命周期变化"
    handler: assessment_model_changed_handler

  answersheet.submitted:
    topic: assessment-lifecycle
    delivery: durable_outbox
    aggregate: AnswerSheet
    domain: survey/answersheet
    description: "答卷已提交"
    handler: answersheet_submitted_handler

  evaluation.requested:
    topic: assessment-lifecycle
    delivery: durable_outbox
    aggregate: Evaluation
    domain: evaluation
    description: "Evaluation 已请求执行"
    handler: evaluation_requested_handler

  evaluation.outcome.committed:
    topic: assessment-lifecycle
    delivery: durable_outbox
    aggregate: Evaluation
    domain: evaluation
    description: "评分事实已可靠提交，等待报告生成"
    handler: evaluation_outcome_committed_handler

  evaluation.failed:
    topic: assessment-lifecycle
    delivery: durable_outbox
    aggregate: Evaluation
    domain: evaluation
    description: "Evaluation 执行失败"
    handler: evaluation_failed_handler

  interpretation.report.generated:
    topic: assessment-lifecycle
    delivery: durable_outbox
    aggregate: Report
    domain: interpretation/report
    description: "报告已生成（outcome 投影：model/primary_score/level）"
    handler: interpretation_report_generated_handler

  interpretation.report.failed:
    topic: assessment-lifecycle
    delivery: durable_outbox
    aggregate: Report
    domain: interpretation/report
    description: "报告生成尝试失败"
    handler: interpretation_report_failed_handler

  footprint.entry_opened:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "用户成功打开入口"
    handler: behavior_projector_handler

  footprint.intake_confirmed:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "用户完成一次接入"
    handler: behavior_projector_handler

  footprint.testee_profile_created:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "新建受试者档案"
    handler: behavior_projector_handler

  footprint.care_relationship_established:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "建立看护/服务关系"
    handler: behavior_projector_handler

  footprint.care_relationship_transferred:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "转移看护/服务关系"
    handler: behavior_projector_handler

  footprint.answersheet_submitted:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "提交答卷"
    handler: behavior_projector_handler

  footprint.assessment_created:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "形成测评"
    handler: behavior_projector_handler

  footprint.report_generated:
    topic: analytics-behavior
    delivery: durable_outbox
    aggregate: BehaviorFootprint
    domain: statistics/behavior
    description: "产出报告"
    handler: behavior_projector_handler

  task.opened:
    topic: task-lifecycle
    delivery: best_effort
    aggregate: AssessmentTask
    domain: plan
    description: "任务已开放"
    handler: task_opened_handler

  task.completed:
    topic: task-lifecycle
    delivery: best_effort
    aggregate: AssessmentTask
    domain: plan
    description: "任务已完成"
    handler: task_completed_handler

  task.expired:
    topic: task-lifecycle
    delivery: best_effort
    aggregate: AssessmentTask
    domain: plan
    description: "任务已过期"
    handler: task_expired_handler

  task.canceled:
    topic: task-lifecycle
    delivery: best_effort
    aggregate: AssessmentTask
    domain: plan
    description: "任务已取消"
    handler: task_canceled_handler
