# ============================================================================
# 领域事件配置
# ============================================================================
# 本文件只描述当前运行时真实生效的事件契约与 Topic 映射。
# 发布端和订阅端共用此配置，确保事件类型、Topic 和 handler 名称一致。
# ============================================================================

version: "1.0"

topics:
  questionnaire-lifecycle:
    name: "qs.survey.lifecycle"
    description: "问卷和量表生命周期事件"

  assessment-lifecycle:
    name: "qs.evaluation.lifecycle"
    description: "测评生命周期事件"

  task-lifecycle:
    name: "qs.plan.task"
    description: "测评任务生命周期事件"

events:
  questionnaire.changed:
    topic: questionnaire-lifecycle
    aggregate: Questionnaire
    domain: survey/questionnaire
    description: "问卷生命周期变化"
    handler: questionnaire_changed_handler

  scale.changed:
    topic: questionnaire-lifecycle
    aggregate: MedicalScale
    domain: scale
    description: "量表生命周期变化"
    handler: scale_changed_handler

  answersheet.submitted:
    topic: assessment-lifecycle
    aggregate: AnswerSheet
    domain: survey/answersheet
    description: "答卷已提交"
    handler: answersheet_submitted_handler

  assessment.submitted:
    topic: assessment-lifecycle
    aggregate: Assessment
    domain: evaluation/assessment
    description: "测评已提交"
    handler: assessment_submitted_handler

  assessment.interpreted:
    topic: assessment-lifecycle
    aggregate: Assessment
    domain: evaluation/assessment
    description: "测评已解读"
    handler: assessment_interpreted_handler

  assessment.failed:
    topic: assessment-lifecycle
    aggregate: Assessment
    domain: evaluation/assessment
    description: "测评失败"
    handler: assessment_failed_handler

  report.generated:
    topic: assessment-lifecycle
    aggregate: Report
    domain: evaluation/report
    description: "报告已生成（在 assessment.interpreted 之后发布）"
    handler: report_generated_handler

  task.opened:
    topic: task-lifecycle
    aggregate: AssessmentTask
    domain: plan
    description: "任务已开放"
    handler: task_opened_handler

  task.completed:
    topic: task-lifecycle
    aggregate: AssessmentTask
    domain: plan
    description: "任务已完成"
    handler: task_completed_handler

  task.expired:
    topic: task-lifecycle
    aggregate: AssessmentTask
    domain: plan
    description: "任务已过期"
    handler: task_expired_handler

  task.canceled:
    topic: task-lifecycle
    aggregate: AssessmentTask
    domain: plan
    description: "任务已取消"
    handler: task_canceled_handler
