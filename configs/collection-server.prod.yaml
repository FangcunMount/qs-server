# ============================================================
# collection-server 生产环境配置
# ============================================================
# 用途：BFF 层服务，提供前端友好的 REST API，调用 apiserver gRPC 服务
# 维护人：DevOps Team
# 最后更新：2025-01-20
# ============================================================

# ============================================================
# 1. 应用配置
# ============================================================
# 应用级别的基础配置

# ============================================================
# 2. 端口配置
# ============================================================
# HTTP、HTTPS 服务端口配置
# 说明：collection-server 是纯 REST API 服务，不对外暴露 gRPC

# -------------------------------------------------------
# 2.1 HTTP 服务（开发测试用）
# -------------------------------------------------------
insecure:
  bind-address: "0.0.0.0"
  bind-port: 8080

# -------------------------------------------------------
# 2.2 HTTPS 服务（生产环境）
# -------------------------------------------------------
secure:
  bind-address: "0.0.0.0"
  # serverA Nginx 统一终止公网 HTTPS，并通过 infra-network 访问本服务 HTTP 8080。
  # collection-server 与 apiserver 同机部署（serverA 4C/8G），不挂载公网 TLS 证书。
  bind-port: 0
  tls:
    # bind-port=0 时不会读取 Web 证书；保留字段便于回滚启用 HTTPS listener。
    cert-file: "/etc/qs-server/ssl/certs/fangcunmount.cn.crt"
    private-key-file: "/etc/qs-server/ssl/private/fangcunmount.cn.key"

# -------------------------------------------------------
# 2.3 gRPC 客户端配置（调用 apiserver）
# -------------------------------------------------------
grpc_client:
  endpoint: "qs-apiserver:9090"     # Docker 容器服务名 apiserver 地址
  timeout: 30                       # gRPC 超时时间（秒）
  insecure: false                   # 生产环境启用 TLS（insecure=false 表示启用 TLS）
  max_inflight: 420                 # 4C/8G mixed_280+（原 360；对齐 HTTP 并发 480）
  inflight_wait_ms: 4000            # 槽位满时多等，减少 2s 快速失败 → k6 重试/VU 螺旋
  
  # mTLS 客户端配置（宿主机 /data/infra/ssl/grpc → 容器 /etc/qs-server/ssl）
  tls-cert-file: "/etc/qs-server/ssl/grpc/server/qs-collection-server.crt"
  tls-key-file: "/etc/qs-server/ssl/grpc/server/qs-collection-server.key"
  tls-ca-file: "/etc/qs-server/ssl/grpc/ca/ca-chain.crt"
  tls-server-name: "qs-apiserver.svc"  # 服务端证书的 CN，用于验证

# ============================================================
# 3. 存储配置
# ============================================================
# 数据库、缓存等存储服务配置

# -------------------------------------------------------
# 3.1 Redis
# -------------------------------------------------------
# 用途：缓存、会话、限流等临时数据
# DB 分配约定（生产）：
#   - DB 0: IAM 业务
#   - DB 1: QS 业务默认 Redis
redis:
  host: "127.0.0.1"                    # Redis 主机地址
  port: 6379                           # Redis 端口
  username: ""                         # Redis 用户名
  password: ""                         # Redis 密码
  database: 1                          # Redis 数据库
  max-idle: 48                         # Redis 最大空闲连接数
  max-active: 320                      # 4C/8G：对齐 apiserver Redis 并发
  timeout: 300                         # Redis 超时时间
  min-idle-conns: 10                   # Redis 最小空闲连接数
  pool-timeout: 10                     # Redis 连接池超时时间
  dial-timeout: 5                      # Redis 连接超时时间
  read-timeout: 5                      # Redis 读取超时时间
  write-timeout: 5                     # Redis 写入超时时间
  enable-cluster: false                # 启用 Redis 集群
  use-ssl: false                       # 启用 SSL

redis_profiles:                        # Redis 配置文件
  ops_runtime:                         # ops_runtime 家族
    database: 1                        # Redis 数据库 1
  lock_cache:                          # lock_lease 家族
    database: 6                        # Redis 数据库 6

lock_lease:
  renewal_enabled: true

redis_runtime:                         # Redis 运行时配置
  namespace: ""                        # 命名空间
  families:                            # 家族配置
    ops_runtime:                       # ops_runtime 家族
      redis_profile: "ops_runtime"     # Redis 配置文件 ops_runtime
      namespace_suffix: "ops:runtime"  # 命名空间后缀
      allow_fallback_default: true     # 允许降级默认值
    lock_lease:                        # lock_lease 家族
      redis_profile: "lock_cache"      # Redis 配置文件
      namespace_suffix: "cache:lock"   # 命名空间后缀
      allow_fallback_default: true     # 允许降级默认值

# -------------------------------------------------------
# 3.3 限流配置
# -------------------------------------------------------
rate_limit:                          # 限流配置
  enabled: true                      # 启用限流
  submit_global_qps: 300             # 提交全局 QPS 300
  submit_global_burst: 450           # 提交全局突发 450
  submit_user_qps: 120               # 提交用户 QPS 120
  submit_user_burst: 180             # 提交用户突发 180
  query_global_qps: 300              # 查询全局 QPS 300
  query_global_burst: 450            # 查询全局突发 450
  query_user_qps: 120                # 查询用户 QPS 120
  query_user_burst: 180              # 查询用户突发 180
  wait_report_global_qps: 200        # 等待报告全局 QPS 200
  wait_report_global_burst: 300      # 等待报告全局突发 300
  wait_report_user_qps: 60           # 等待报告用户 QPS 60
  wait_report_user_burst: 120        # 等待报告用户突发 120
  report_events_global_qps: 120      # 报告事件全局 QPS 120（mixed_280 WS 96/s 留余量）
  report_events_global_burst: 180    # 报告事件全局突发 180
  report_events_user_qps: 20         # 报告事件用户 QPS 20
  report_events_user_burst: 40       # 报告事件用户突发 40

# -------------------------------------------------------
# 3.4 提交排队配置
# -------------------------------------------------------
submit_queue:                       # 提交排队配置
  enabled: true                     # 启用提交排队
  queue_size: 2800                  # 4C/8G：略增削峰深度（24/s 压测）
  worker_count: 56                  # 4C/8G mixed_280+（原 48；对齐 apiserver mongo 排水）
  wait_timeout_ms: 500              # 兼容旧配置；当前非阻塞入队不使用该字段作为削峰等待旋钮

cache:
  capabilities:
    catalog:
      questionnaire:
        enabled: true
        ttl_seconds: 180
        ttl_jitter_ratio: 0.2
        max_entries: 256
        singleflight: true
        signal_evict_enabled: true
      typology:
        enabled: true
        ttl_seconds: 180
        ttl_jitter_ratio: 0.2
        max_entries: 256
        singleflight: true
        signal_evict_enabled: true
    report_status:
      ttl_seconds: 172800

wait_report:                        # 报告等待 HTTP 轮询接口配置
  default_timeout_seconds: 20       # 默认等待超时时间 20s
  min_timeout_seconds: 1            # 最小等待超时时间
  max_timeout_seconds: 25           # 最大等待超时时间
  poll_interval_ms: 500             # 轮询间隔时间 500ms
  max_active_waiters: 3000          # 最大活跃等待请求数 3000
  max_http_concurrency: 400         # wait-report 独立池（与 query 读池分离）
  degrade_immediate_enabled: true   # 立即降级 true
  degrade_retry_after_seconds: 5    # 降级重试时间 5s

report_events:                   # WebSocket 报告事件推送配置
  enabled: true                  # 启用 WebSocket 报告事件推送
  path: /api/v1/report-events    # WebSocket 报告事件推送路径
  max_connections: 2000          # 最大并发 WebSocket 连接数
  max_per_testee: 2              # 每个测试对象最大并发 WebSocket 连接数
  idle_timeout_seconds: 120      # WebSocket 连接空闲超时时间
  heartbeat_interval_seconds: 30 # WebSocket 心跳间隔时间

signaling:                      # 报告状态信号配置
  redis:                        # Redis 配置
    enabled: true               # 启用 Redis 发布/订阅机制
    prefix: "qs:signal"         # 信号前缀: qs:signal (默认)
    buffer_size: 100            # 信号缓冲区大小: 100  

# ============================================================
# 4. 集成配置
# ============================================================
# 外部服务集成配置（IAM 等）

# -------------------------------------------------------
# 4.1 IAM 认证集成
# -------------------------------------------------------
# 说明：IAM 服务端口规划
# - 9080: HTTP REST API（内部调用，不加密）
# - 9444: HTTPS REST API（外网访问，SSL 加密）
# - 9090: gRPC with mTLS（服务间调用，双向认证）
# - 9091: Health Check（健康检查端口）
iam:
  enabled: true       # 启用 IAM 集成
  grpc-enabled: true  # 启用 gRPC 认证
  jwks-enabled: true  # 启用 JWKS 认证
  
  # 可观测性配置
  enable-tracing: true            # 启用 OpenTelemetry 链路追踪
  enable-metrics: true            # 启用 Prometheus 指标
  
  # gRPC 客户端配置
  grpc:
    address: "iam-apiserver:9090"  # IAM 在 serverB；经 Swarm overlay infra-network 解析（勿映射到宿主机 9090）
    timeout: 30s
    retry-max: 3
    
    # mTLS 配置（宿主机 /data/infra/ssl/grpc → 容器 /etc/qs-server/ssl）
    # IAM gRPC 服务端口 9090 启用了 mTLS 保护
    tls:
      enabled: true   # 启用 mTLS 双向认证（与 IAM 9090 端口匹配）
      ca-file: "/etc/qs-server/ssl/grpc/ca/ca-chain.crt"                    # CA 证书链
      cert-file: "/etc/qs-server/ssl/grpc/server/qs-collection-server.crt"  # 客户端证书 (collection-server 调用 IAM)
      key-file: "/etc/qs-server/ssl/grpc/server/qs-collection-server.key"   # 客户端私钥 (collection-server 调用 IAM)
  
  # JWT 验证配置
  jwt:
    issuer: "https://iam.fangcunmount.cn"  # canonical issuer
    audience: ["collection-api"]
    algorithms: ["RS256", "ES256"]
    clock-skew: 30s
    required-claims: ["sub", "exp"]
  
  # JWKS 配置
  jwks:
    url: "https://iam.fangcunmount.cn/.well-known/jwks.json"
    grpc-endpoint: "iam-apiserver:9090"                    # gRPC 降级端点（HTTP 失败时使用，端口 9090）
    refresh-interval: 1h
    cache-ttl: 24h
    fetch-strategies: ["http", "grpc", "cache"]  # 降级策略：HTTP → gRPC → 缓存
  
  # 用户信息缓存
  user-cache:
    enabled: true
    ttl: 5m
    max-size: 5000
  
  # ProfileLink 缓存
  profile-link-cache:
    enabled: true
    ttl: 10m
    max-size: 20000

# ============================================================
# 5. 系统配置
# ============================================================
# 日志、JWT 等系统级配置

# -------------------------------------------------------
# 5.1 日志配置
# -------------------------------------------------------
log:
  disable-caller: true      # 生产环境禁用调用者信息
  disable-stacktrace: false  # 生产环境禁用堆栈跟踪
  level: debug                # 生产环境使用 info 级别(debug, info, warn, error, fatal, panic)
  format: console               # 生产环境使用 json 格式
  enable-color: true        # 生产环境禁用颜色
  development: true         # 生产环境禁用开发模式
  name: "qs-collection-server"  # 日志名称
  max-size: 100                # 单个日志文件最大 100MB
  max-age: 30                   # 保留 30 天
  max-backups: 10               # 保留 10 个备份文件
  compress: true                # 压缩旧文件节省空间
  enable-time-rotation: true    # 启用按天轮转
  time-rotation-format: "2006-01-02"  # 按天轮转
  enable-level-output: true       # 启用分级输出
  level-output-mode: "duplicate"  # 重复输出模式（推荐）
  level-output-paths:
    all:
      - stdout                       # 容器/进程标准输出保留完整日志
      - /data/logs/qs/qs-collection-server.log  # 完整日志（所有级别）
    error:
      - stderr                               # ERROR 级别写入标准错误，便于监控采集
      - /data/logs/qs/qs-collection-server-error.log  # 额外记录 ERROR（快速定位故障）

# ============================================================
# 6. 调优参数（内存/并发）
# ============================================================
# 控制 Go 运行时的 GC/内存行为与并发
runtime:
  # 将 GOMEMLIMIT 设置为容器配额的 75% 以避免 OOM（容器 mem_limit=3072MiB）
  go-mem-limit: "2304MiB"
  # 更积极的 GC，降低峰值内存
  gogc: 50                           # GC 触发阈值: 50%

# 并发/连接池调优
concurrency:                        # 并发/连接池调优（4C/8G mixed_300 攻关）
  max-catalog-concurrency: 512      # catalog L1 独立池（与 heavy query 分池）
  max-query-concurrency: 280        # 非 catalog 读（assessment/stats/report-status）
  max-submit-concurrency: 96        # 写路径（submit 等，与读池隔离）
  max-wait-ms: 4000                 # submit/非 catalog 读 槽位满时最长排队
  catalog-max-wait-ms: 800          # catalog L1 miss 时短排队（替代 Try 503）
