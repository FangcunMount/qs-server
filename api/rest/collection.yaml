components:
  schemas:
    answersheet.AnswerSheetResponse:
      type: object
      properties:
        answers:
          type: array
          items:
            $ref: '#/components/schemas/github_com_FangcunMount_qs-server_internal_collection-server_application_answersheet.Answer'
        created_at:
          type: string
        id:
          type: string
        questionnaire_code:
          type: string
        questionnaire_version:
          type: string
        score:
          type: number
        testee_id:
          type: string
        testee_name:
          type: string
        title:
          type: string
        updated_at:
          type: string
        writer_id:
          type: string
        writer_name:
          type: string
    answersheet.SubmitAcceptedResponse:
      type: object
      properties:
        request_id:
          type: string
        status:
          type: string
    answersheet.SubmitAnswerSheetRequest:
      type: object
      required:
      - answers
      - questionnaire_code
      - questionnaire_version
      - testee_id
      properties:
        answers:
          type: array
          items:
            $ref: '#/components/schemas/github_com_FangcunMount_qs-server_internal_collection-server_application_answersheet.Answer'
        idempotency_key:
          type: string
        questionnaire_code:
          type: string
        questionnaire_version:
          type: string
        task_id:
          type: string
        testee_id:
          type: integer
        title:
          type: string
    answersheet.SubmitStatusResponse:
      type: object
      properties:
        answersheet_id:
          type: string
        assessment_id:
          description: AssessmentID 在 status=done 且异步测评已落库后出现；未就绪时省略，客户端可继续轮询 submit-status。
          type: string
        status:
          type: string
        updated_at:
          type: integer
    core.ErrResponse:
      type: object
      properties:
        code:
          description: Code 定义了业务错误代码
          type: integer
        message:
          description: 'Message 包含此消息的详细信息

            此消息适合暴露给外部'
          type: string
        reference:
          description: Reference 返回参考文档，可能有助于解决此错误
          type: string
    core.Response:
      type: object
      properties:
        code:
          description: Code 业务状态码，0 表示成功
          type: integer
        data:
          description: Data 响应数据
        message:
          description: Message 响应消息
          type: string
        reference:
          description: Reference 返回参考文档（错误时使用）
          type: string
    evaluation.AssessmentFactorChangeResponse:
      type: object
      properties:
        current_score:
          type: number
        delta:
          type: number
        factor_code:
          type: string
        factor_name:
          type: string
        previous_score:
          type: number
        risk_level:
          type: string
    evaluation.AssessmentFactorTrendPointResponse:
      type: object
      properties:
        assessment_id:
          type: string
        risk_level:
          type: string
        score:
          type: number
        submitted_at:
          type: string
    evaluation.AssessmentFactorTrendResponse:
      type: object
      properties:
        factor_code:
          type: string
        factor_name:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/evaluation.AssessmentFactorTrendPointResponse'
    evaluation.AssessmentStatusResponse:
      type: object
      properties:
        message:
          type: string
        next_poll_after_ms:
          type: integer
        reason:
          type: string
        risk_level:
          type: string
        stage:
          type: string
        status:
          description: pending/submitted/interpreted/failed
