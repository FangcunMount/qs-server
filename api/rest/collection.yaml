openapi: 3.1.0
info:
  description: Questionnaire collection/BFF layer
  title: Collection Server
  contact:
    name: API Support
    email: yshujie@163.com
    url: https://github.com/FangcunMount/qs-server
  version: '1.0'
servers:
- url: http://localhost:18083/api/v1
  description: 本地开发
- url: https://collect.fangcunmount.cn/api/v1
  description: 生产环境
tags:
- name: 受试者
  description: 受试者
- name: 报告事件
  description: 报告事件
- name: 测评
  description: 测评管理
- name: 答卷
  description: 答卷提交与查询
- name: 类型学模型
  description: 类型学模型
- name: 类型学测评
  description: 类型学测评
- name: 系统
  description: 系统健康检查
- name: 量表
  description: 量表
- name: 问卷
  description: 问卷查询
paths:
  /answersheets:
    post:
      tags:
      - 答卷
      summary: 提交答卷
      description: 用户提交问卷答卷
      operationId: 提交答卷
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/answersheet.SubmitAnswerSheetRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/answersheet.SubmitAcceptedResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /answersheets/submit-status:
    get:
      tags:
      - 答卷
      summary: 查询提交状态
      description: 根据 request_id 查询提交处理状态。status=done 时返回 answersheet_id；异步测评落库后附带
        assessment_id（人格/医学通用），未就绪可继续轮询。
      operationId: 查询提交状态
      parameters:
      - type: string
        description: 请求ID
        name: request_id
        in: query
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/answersheet.SubmitStatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /answersheets/{id}:
    get:
      tags:
      - 答卷
      summary: 获取答卷详情
      description: 根据ID获取答卷详情
      operationId: 获取答卷详情
      parameters:
      - type: integer
        description: 答卷ID
        name: id
        in: path
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/answersheet.AnswerSheetResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /assessments/trend:
    get:
      tags:
      - 测评
      summary: 获取因子得分趋势
      description: 获取指定因子的历史得分趋势
      operationId: 获取因子得分趋势
      parameters:
      - type: integer
        description: 受试者ID
        name: testee_id
        in: query
        required: true
      - type: string
        description: 因子编码
        name: factor_code
        in: query
        required: true
      - type: integer
        default: 10
        description: 数据点数量
        name: limit
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/evaluation.TrendPointResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /assessments/{id}/factors/high-risk:
    get:
      tags:
      - 测评
      summary: 获取高风险因子
      description: 获取指定测评的高风险因子列表
      operationId: 获取高风险因子
      parameters:
      - type: integer
        description: 测评ID
        name: id
        in: path
        required: true
      - type: integer
        description: 受试者ID
        name: testee_id
        in: query
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/evaluation.FactorScoreResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /assessments/{id}/report-status:
    get:
      tags:
      - 测评
      summary: 查询报告生成状态
      description: 立即返回当前报告状态；非终态时通过 next_poll_after_ms 指引客户端退避重试
      operationId: 查询报告生成状态
      parameters:
      - type: integer
        description: 测评ID
        name: id
        in: path
        required: true
      - type: integer
        description: 受试者ID
        name: testee_id
        in: query
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/evaluation.AssessmentStatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /assessments/{id}/scores:
    get:
      tags:
      - 测评
      summary: 获取测评得分详情
      description: 获取测评的因子得分详情。响应中的每个因子得分包含 max_score（最大分，可选）字段
      operationId: 获取测评得分详情
      parameters:
      - type: integer
        description: 测评ID
        name: id
        in: path
        required: true
      - type: integer
        description: 受试者ID
        name: testee_id
        in: query
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/evaluation.FactorScoreResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /assessments/{id}/trend-summary:
    get:
      tags:
      - 测评
      summary: 获取测评趋势摘要
      description: 获取指定测评所属同量表、同版本的历史趋势摘要
      operationId: 获取测评趋势摘要
      parameters:
      - type: integer
        description: 测评ID
        name: id
        in: path
        required: true
      - type: integer
        description: 受试者ID
        name: testee_id
        in: query
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/evaluation.AssessmentTrendSummaryResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /assessments/{id}/wait-report:
    get:
      tags:
      - 测评
      summary: 长轮询等待报告生成
      description: 等待测评报告生成，支持长轮询机制。如果报告已生成则立即返回，否则等待最多 timeout 秒
      operationId: 长轮询等待报告生成
      parameters:
      - type: integer
        description: 测评ID
        name: id
        in: path
        required: true
      - type: integer
        description: 受试者ID
        name: testee_id
        in: query
        required: true
      - maximum: 25
        minimum: 1
        type: integer
        default: 20
        description: 超时时间（秒）
        name: timeout
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/evaluation.AssessmentStatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /public/info:
    get:
      tags:
      - 系统
      summary: 服务信息
      description: 获取服务基本信息
      operationId: 服务信息
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.Response'
  /questionnaires:
    get:
      tags:
      - 问卷
      summary: 获取问卷列表
      description: 分页获取问卷列表
      operationId: 获取问卷列表
      parameters:
      - type: integer
        default: 1
        description: 页码
        name: page
        in: query
      - type: integer
        default: 20
        description: 每页数量
        name: page_size
        in: query
      - type: string
        description: 状态过滤（draft/published/archived）
        name: status
        in: query
      - type: string
        description: 标题过滤
        name: title
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/github_com_FangcunMount_qs-server_internal_collection-server_application_questionnaire.ListQuestionnairesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /questionnaires/{code}:
    get:
      tags:
      - 问卷
      summary: 获取问卷详情
      description: 根据问卷编码获取问卷详情，问题包含校验规则。人格测评请优先使用 session 返回的 questionnaire_code
        + questionnaire_version，通过 version 查询精确题版。
      operationId: 获取问卷详情
      parameters:
      - type: string
        description: 问卷编码
        name: code
        in: path
        required: true
      - type: string
        description: 问卷版本（人格测评推荐传入模型绑定版本）
        name: version
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/questionnaire.QuestionnaireResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /report-events:
    get:
      tags:
      - 报告事件
      summary: 报告状态 WebSocket 推送
      description: 升级 WebSocket 后发送 subscribe 帧等待测评终态。每条连接仅允许一次 subscribe。人格线 kind=personality；量表线
        kind=medical。需 report_events.enabled=true。
      operationId: 报告状态WebSocket推送
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      responses:
        '101':
          description: Switching Protocols
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ws.ReportEventsStatusFrame'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '404':
          description: report_events 未开启
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /scales:
    get:
      tags:
      - 量表
      summary: 获取量表列表
      description: '分页获取量表列表（摘要信息，不包含因子详情），支持按主类、阶段、使用年龄、填报人、标签等条件过滤。

        查询参数说明：

        - category: 主类过滤，可选值：adhd/tic/sensory/executive/mental/neurodev/chronic/qol

        - stages: 阶段过滤（数组），可选值：deep_assessment/follow_up/outcome

        - applicable_ages: 使用年龄过滤（数组），可选值：infant/preschool/school_child/adolescent/adult

        - reporters: 填报人过滤（数组），可选值：parent/teacher/self/clinical

        - tags: 标签过滤（数组），动态标签值

        响应中包含分类字段：category、stages（数组）、applicable_ages（数组）、reporters（数组）、tags（数组）、question_count（题目数量，不包含
        Section 题型）'
      operationId: 获取量表列表
      parameters:
      - type: integer
        default: 1
        description: 页码
        name: page
        in: query
      - type: integer
        default: 20
        description: 每页数量
        name: page_size
        in: query
      - type: string
        description: 状态过滤（draft/published/archived）
        name: status
        in: query
      - type: string
        description: 标题过滤
        name: title
        in: query
      - type: string
        description: 主类过滤
        name: category
        in: query
      - type: array
        items:
          type: string
        collectionFormat: csv
        description: 阶段过滤（数组）
        name: stages
        in: query
      - type: array
        items:
          type: string
        collectionFormat: csv
        description: 使用年龄过滤（数组）
        name: applicable_ages
        in: query
      - type: array
        items:
          type: string
        collectionFormat: csv
        description: 填报人过滤（数组）
        name: reporters
        in: query
      - type: array
        items:
          type: string
        collectionFormat: csv
        description: 标签过滤（数组）
        name: tags
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/github_com_FangcunMount_qs-server_internal_collection-server_application_scale.ListScalesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /scales/categories:
    get:
      tags:
      - 量表
      summary: 获取量表分类列表
      description: '获取量表的主类、阶段、使用年龄、填报人等分类选项列表，用于前端渲染和配置量表字段。

        返回说明：

        - categories: 主类列表，包含8个选项（adhd, tic, sensory, executive, mental, neurodev,
        chronic, qol）

        - stages: 阶段列表，包含3个选项（deep_assessment, follow_up, outcome）

        - applicable_ages: 使用年龄列表，包含5个选项（infant, preschool, school_child, adolescent,
        adult）

        - reporters: 填报人列表，包含4个选项（parent, teacher, self, clinical）

        - tags: 标签列表，返回空数组（标签已改为动态输入，通过后台输入设置）'
      operationId: 获取量表分类列表
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/scale.ScaleCategoriesResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /scales/hot:
    get:
      tags:
      - 量表
      summary: 获取热门量表列表
      description: 获取当前热门量表排行榜，用于小程序首页展示 3~5 个可填写量表。默认按近 30 天答卷提交量排序。
      operationId: 获取热门量表列表
      parameters:
      - type: integer
        default: 5
        description: 返回数量，服务端限制为 3~5
        name: limit
        in: query
      - type: integer
        default: 30
        description: 热度统计窗口天数
        name: window_days
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/github_com_FangcunMount_qs-server_internal_collection-server_application_scale.ListHotScalesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /scales/{code}:
    get:
      tags:
      - 量表
      summary: 获取量表详情
      description: '根据量表编码获取量表详情。注意：返回的因子列表只包含 is_show = true 的因子。

        响应字段说明：

        - category: 主类（adhd/tic/sensory/executive/mental/neurodev/chronic/qol）

        - stages: 阶段列表（数组，deep_assessment/follow_up/outcome）

        - applicable_ages: 使用年龄列表（数组，infant/preschool/school_child/adolescent/adult）

        - reporters: 填报人列表（数组，可包含 parent/teacher/self/clinical）

        - tags: 标签列表（数组，动态输入）

        - question_count: 题目数量（不包含 Section 题型）

        - factors: 因子列表（只包含 is_show = true 的因子），每个因子包含 max_score（最大分，可选）和 is_show（是否显示）字段'
      operationId: 获取量表详情
      parameters:
      - type: string
        description: 量表编码
        name: code
        in: path
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/scale.ScaleResponse'
