paths:
  /admin/logs:
    get:
      tags:
      - Admin
      summary: 管理员接口（未实现）
      operationId: 管理员接口未实现
      responses:
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /admin/statistics:
    get:
