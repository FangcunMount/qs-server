    get:
      tags:
      - Scale-Query
      summary: 根据问卷编码获取量表
      description: '根据关联的问卷编码获取量表。

        响应字段说明：

        - category: 主类（adhd/tic/sensory/executive/mental/neurodev/chronic/qol）

        - stages: 阶段列表（数组，deep_assessment/follow_up/outcome）

        - applicable_ages: 使用年龄列表（数组，infant/preschool/school_child/adolescent/adult）

        - reporters: 填报人列表（数组，可包含 parent/teacher/self/clinical）

        - tags: 标签列表（数组，动态输入）

        - scoring_params: 计分参数，map[string]interface{}，cnt 策略直接包含 cnt_option_contents
        字段

        - max_score: 因子的最大分（可选）

        - is_show: 是否显示（用于报告中的维度展示）

        - risk_level: 因子级别的风险等级，从解读规则中提取（使用第一个规则的风险等级），有效值：none/low/medium/high/severe'
      operationId: 根据问卷编码获取量表
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      - type: string
        description: 问卷编码
        name: questionnaire_code
