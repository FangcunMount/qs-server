components:
  schemas:
    binding.DecisionKind:
      type: string
      enum:
      - score_range
      - pole_composition
      - trait_profile
      - nearest_pattern
      - dominant_factor
      - norm_lookup
      - ability_level
      - score_range_interpretation
      - score_range
      - pole_composition
      - trait_profile
      - nearest_pattern
      - dominant_factor
      - norm_lookup
      - ability_level
      x-enum-varnames:
      - DecisionKindScoreRange
      - DecisionKindPoleComposition
      - DecisionKindTraitProfile
      - DecisionKindNearestPattern
      - DecisionKindDominantFactor
      - DecisionKindNormLookup
      - DecisionKindAbilityLevel
    cachemodel.FamilyStatus:
      type: object
      properties:
        allow_warmup:
          type: boolean
        available:
          type: boolean
        component:
          type: string
        configured:
          type: boolean
        consecutive_failures:
          type: integer
        degraded:
          type: boolean
        family:
          type: string
        last_error:
          type: string
        last_failure_at:
          type: string
        last_success_at:
          type: string
        mode:
          type: string
        namespace:
          type: string
        profile:
          type: string
        updated_at:
          type: string
    cachemodel.ManualWarmupItemResult:
      type: object
      properties:
        family:
          type: string
        kind:
          type: string
        message:
          type: string
        scope:
          type: string
        status:
          $ref: '#/components/schemas/cachemodel.ManualWarmupItemStatus'
    cachemodel.ManualWarmupItemStatus:
      type: string
      enum:
      - ok
      - skipped
      - error
      x-enum-varnames:
      - ManualWarmupItemStatusOK
      - ManualWarmupItemStatusSkipped
      - ManualWarmupItemStatusError
    cachemodel.ManualWarmupResult:
      type: object
      properties:
        finished_at:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/cachemodel.ManualWarmupItemResult'
        started_at:
          type: string
        summary:
          $ref: '#/components/schemas/cachemodel.ManualWarmupSummary'
        trigger:
          type: string
    cachemodel.ManualWarmupSummary:
      type: object
      properties:
        error_count:
          type: integer
        ok_count:
          type: integer
        result:
          type: string
        skipped_count:
          type: integer
        target_count:
          type: integer
    cachemodel.RuntimeSnapshot:
      type: object
      properties:
        component:
          type: string
        families:
          type: array
          items:
            $ref: '#/components/schemas/cachemodel.FamilyStatus'
        generated_at:
          type: string
        summary:
          $ref: '#/components/schemas/cachemodel.RuntimeSummary'
    cachemodel.RuntimeSummary:
      type: object
      properties:
        available_count:
          type: integer
        degraded_count:
          type: integer
        family_total:
          type: integer
        ready:
          type: boolean
        unavailable_count:
          type: integer
    cachetarget.ManualWarmupRequest:
      type: object
      properties:
        targets:
          type: array
