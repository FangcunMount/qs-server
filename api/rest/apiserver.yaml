              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/response.ScaleListResponse'
    post:
      tags:
      - Scale-Lifecycle
      summary: 创建量表
      description: '创建新量表，初始状态为草稿。支持设置主类、阶段、使用年龄、填报人和标签等分类信息。

        字段说明：

        - category: 主类，可选值：adhd(ADHD)、tic(抽动障碍)、sensory(感统)、executive(执行功能)、mental(心理健康)、neurodev(神经发育)、chronic(慢性病管理)、qol(生活质量)

        - stages: 阶段列表（数组），可选值：deep_assessment(深评)、follow_up(随访)、outcome(结局)，可多选

        - applicable_ages: 使用年龄列表（数组），可选值：infant(婴幼儿)、preschool(学龄前)、school_child(学龄儿童)、adolescent(青少年)、adult(成人)，可多选

        - reporters: 填报人列表（数组），可选值：parent(家长评)、teacher(教师评)、self(自评)、clinical(临床评定)，可多选

        - tags: 标签列表（数组），动态输入，最多5个，每个标签长度1-50字符，只能包含字母、数字、下划线和中文'
      operationId: 创建量表
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request.CreateScaleRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/response.ScaleResponse'
