    put:
      tags:
      - AssessmentModel
      summary: 更新测评模型定义
      operationId: 更新测评模型定义
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      - type: string
        description: 模型编码
        name: code
        in: path
        required: true
