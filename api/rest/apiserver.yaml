components:
  schemas:
    cachegovernance.ManualWarmupItemResult:
      type: object
      properties:
        family:
          type: string
        kind:
          $ref: '#/components/schemas/cachetarget.WarmupKind'
        message:
          type: string
        scope:
          type: string
        status:
          $ref: '#/components/schemas/cachegovernance.ManualWarmupItemStatus'
    cachegovernance.ManualWarmupItemStatus:
      type: string
      enum:
      - ok
      - skipped
      - error
      x-enum-varnames:
      - ManualWarmupItemStatusOK
      - ManualWarmupItemStatusSkipped
      - ManualWarmupItemStatusError
    cachegovernance.ManualWarmupRequest:
      type: object
      properties:
        targets:
          type: array
          items:
            $ref: '#/components/schemas/cachegovernance.ManualWarmupTarget'
    cachegovernance.ManualWarmupResult:
      type: object
      properties:
        finished_at:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/cachegovernance.ManualWarmupItemResult'
        started_at:
          type: string
        summary:
          $ref: '#/components/schemas/cachegovernance.ManualWarmupSummary'
        trigger:
          type: string
    cachegovernance.ManualWarmupSummary:
      type: object
      properties:
        error_count:
          type: integer
        ok_count:
          type: integer
        result:
          type: string
        skipped_count:
          type: integer
        target_count:
          type: integer
    cachegovernance.ManualWarmupTarget:
      type: object
      properties:
        kind:
          $ref: '#/components/schemas/cachetarget.WarmupKind'
        scope:
          type: string
    cachetarget.WarmupKind:
      type: string
      enum:
      - static.scale
      - static.questionnaire
      - static.scale_list
      - static.typology_model
      - query.stats_overview
      - query.stats_system
      - query.stats_questionnaire
      - query.stats_plan
      x-enum-varnames:
      - WarmupKindStaticScale
      - WarmupKindStaticQuestionnaire
      - WarmupKindStaticScaleList
      - WarmupKindStaticTypologyModel
      - WarmupKindQueryStatsOverview
      - WarmupKindQueryStatsSystem
      - WarmupKindQueryStatsQuestionnaire
      - WarmupKindQueryStatsPlan
    core.ErrResponse:
      type: object
      properties:
        code:
          description: Code 定义了业务错误代码
          type: integer
        message:
          description: 'Message 包含此消息的详细信息

            此消息适合暴露给外部'
          type: string
        reference:
          description: Reference 返回参考文档，可能有助于解决此错误
          type: string
    core.Response:
      type: object
      properties:
        code:
          description: Code 业务状态码，0 表示成功
          type: integer
        data:
          description: Data 响应数据
        message:
          description: Message 响应消息
          type: string
        reference:
          description: Reference 返回参考文档（错误时使用）
          type: string
    handler.questionnaireBatchRequest:
      type: object
      properties:
        codes:
          type: array
          items:
            type: string
    meta.ID:
      type: integer
      enum:
      - 0
