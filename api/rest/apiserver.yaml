              schema:
                $ref: '#/components/schemas/core.Response'
  /assessment-models:
    get:
      tags:
      - AssessmentModel
      summary: 获取测评模型列表
      description: 管理端模型目录。人格测评 kind/product_channel canonical 为 typology；创建/筛选仍接受
        personality 读兼容别名。
      operationId: 获取测评模型列表
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      - enum:
        - typology
        - personality
        - behavioral_rating
        - cognitive
        - custom
        - medical_scale
        type: string
        description: 模型类型
        name: kind
        in: query
      - type: string
        description: 子类型
        name: sub_kind
        in: query
      - type: string
        description: 状态
        name: status
        in: query
      - type: string
        description: 关键词
        name: keyword
        in: query
      - type: string
        description: 分类
        name: category
        in: query
      - type: string
        description: 算法
        name: algorithm
        in: query
      - type: integer
        description: 页码
        name: page
        in: query
      - type: integer
        description: 每页数量
        name: page_size
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/response.AssessmentModelListResponse'
    post:
      tags:
      - AssessmentModel
      summary: 创建测评模型
      description: 新建模型时人格测评请传 kind=typology（personality 为读兼容别名）。product_channel 同步使用
        typology。
      operationId: 创建测评模型
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request.CreateAssessmentModelRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/response.AssessmentModelResponse'
  /assessment-models/options:
    get:
