  /answersheets:
    get:
      tags:
      - AnswerSheet-Management
      summary: 查询答卷列表
      description: 管理员查询答卷列表，支持多维度筛选
      operationId: 查询答卷列表
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      - type: integer
        default: 1
        description: 页码
        name: page
        in: query
      - type: integer
        default: 10
        description: 每页数量
        name: page_size
        in: query
      - type: string
        description: 问卷编码
        name: questionnaire_code
        in: query
      - type: string
        description: 填写人ID
        name: filler_id
        in: query
      - type: string
        description: 开始时间
        name: start_time
        in: query
      - type: string
        description: 结束时间
        name: end_time
        in: query
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/response.AnswerSheetListResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /answersheets/admin-submit:
    post:
      tags:
      - AnswerSheet-Management
      summary: 管理员提交答卷
      description: 管理员绕过ProfileLink 权限校验提交答卷
      operationId: 管理员提交答卷
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/request.AdminSubmitAnswerSheetRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/core.Response'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/response.AnswerSheetResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/core.ErrResponse'
  /answersheets/{id}:
    get:
      tags:
      - AnswerSheet-Management
      summary: 获取答卷详情
      description: 管理员查看答卷的完整信息
      operationId: 获取答卷详情
      parameters:
      - type: string
        description: Bearer 用户令牌
        name: Authorization
        in: header
        required: true
      - type: string
        description: 答卷ID
        name: id
        in: path
        required: true
      responses:
        '200':
