syntax = "proto3";

package personalitymodel;

option go_package = "github.com/FangcunMount/qs-server/api/grpc/gen/personalitymodel";

// PersonalityModelService exposes C-side personality model catalog reads.
service PersonalityModelService {
  rpc GetPersonalityModel(GetPersonalityModelRequest) returns (GetPersonalityModelResponse);
  rpc ListPersonalityModels(ListPersonalityModelsRequest) returns (ListPersonalityModelsResponse);
  rpc GetPersonalityModelCategories(GetPersonalityModelCategoriesRequest) returns (GetPersonalityModelCategoriesResponse);
}

message PersonalityModelSummary {
  string code = 1;
  string version = 2;
  string title = 3;
  string algorithm = 4;
  string description = 5;
  string questionnaire_code = 6;
  string questionnaire_version = 7;
  string status = 8;
  int32 question_count = 9;
  string kind = 10;
  string sub_kind = 11;
  string product_channel = 12;
  string algorithm_family = 13;
  string payload_format = 14;
  string decision_kind = 15;
}

message PersonalityDimension {
  string code = 1;
  string name = 2;
  string left_pole = 3;
  string right_pole = 4;
}

message PersonalityOutcomeSummary {
  string code = 1;
  string name = 2;
  string one_liner = 3;
  string image_url = 4;
}

message PersonalityModel {
  PersonalityModelSummary summary = 1;
  repeated string dimension_order = 2;
  repeated PersonalityDimension dimensions = 3;
  repeated PersonalityOutcomeSummary outcomes = 4;
}

message PersonalityModelCategory {
  string value = 1;
  string label = 2;
}

message GetPersonalityModelRequest {
  string code = 1;
}

message GetPersonalityModelResponse {
  PersonalityModel model = 1;
}

message ListPersonalityModelsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string algorithm = 3;
}

message ListPersonalityModelsResponse {
  repeated PersonalityModelSummary models = 1;
  int64 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message GetPersonalityModelCategoriesRequest {}

message GetPersonalityModelCategoriesResponse {
  repeated PersonalityModelCategory categories = 1;
}
