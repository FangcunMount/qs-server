syntax = "proto3";

package internalapi;

option go_package = "github.com/FangcunMount/qs-server/api/grpc/gen/internalapi";

import "google/protobuf/timestamp.proto";

// 内部服务 - 供 Worker 调用
// 用于事件处理后的业务逻辑调用
service InternalService {
  // ==================== AnswerSheet 操作 ====================
  
  // 计算答卷分数
  // 场景：worker 处理 answersheet.submitted 事件后调用
  // 流程：根据问卷评分规则计算每个答案的分数并保存
  rpc CalculateAnswerSheetScore(CalculateAnswerSheetScoreRequest) 
      returns (CalculateAnswerSheetScoreResponse);
  
  // ==================== Assessment 操作 ====================
  
  // 从答卷创建测评
  // 场景：worker 处理 answersheet.submitted 事件后调用（在计分之后）
  // 流程：根据答卷信息创建 Assessment，如果问卷关联了量表则自动提交
  rpc CreateAssessmentFromAnswerSheet(CreateAssessmentFromAnswerSheetRequest) 
      returns (CreateAssessmentFromAnswerSheetResponse);
  
  // 执行测评评估
  // 场景：worker 处理 assessment.submitted 事件后调用
  // 流程：加载测评和量表，执行计分和解读，保存结果
  rpc EvaluateAssessment(EvaluateAssessmentRequest) 
      returns (EvaluateAssessmentResponse);

  // 生成测评报告
  // 场景：worker 处理 assessment.evaluated 事件后调用
  // 流程：基于已计分结果生成 InterpretReport
  rpc GenerateReportFromAssessment(GenerateReportFromAssessmentRequest)
      returns (GenerateReportFromAssessmentResponse);
  
  // ==================== Testee 操作 ====================
  
  // 同步测评后置关注状态
  // 场景：worker 处理 report.generated 事件后调用
  // 流程：根据风险等级和 mark_key_focus 决定是否自动标记重点关注
  rpc SyncAssessmentAttention(SyncAssessmentAttentionRequest)
      returns (SyncAssessmentAttentionResponse);

  // ==================== 小程序码生成操作 ====================
  
  // 生成问卷小程序码
  // 场景：worker 处理 questionnaire.changed(published) 事件后调用
  // 流程：生成小程序码并保存，返回二维码 URL
  rpc GenerateQuestionnaireQRCode(GenerateQuestionnaireQRCodeRequest) 
      returns (GenerateQuestionnaireQRCodeResponse);
  rpc HandleQuestionnairePublishedPostActions(GenerateQuestionnaireQRCodeRequest)
      returns (GenerateQuestionnaireQRCodeResponse);
  
  // 生成量表小程序码
  // 场景：worker 处理 assessment_model.changed(published) 事件后调用
  // 流程：生成小程序码并保存，返回二维码 URL
  rpc GenerateScaleQRCode(GenerateScaleQRCodeRequest) 
      returns (GenerateScaleQRCodeResponse);
  rpc HandleScalePublishedPostActions(GenerateScaleQRCodeRequest)
      returns (GenerateScaleQRCodeResponse);

  // 投影行为足迹事件
  // 场景：worker 处理 qs.analytics.behavior 事件后调用
  // 流程：幂等写入行为足迹、测评服务过程和日投影，必要时进入 pending 重试
  rpc ProjectBehaviorEvent(ProjectBehaviorEventRequest)
      returns (ProjectBehaviorEventResponse);

  // 发送 task.opened 小程序订阅消息
  // 场景：worker 处理 task.opened 事件后调用
  // 流程：解析收件人（本人优先，监护人兜底）并发送小程序订阅消息
  rpc SendTaskOpenedMiniProgramNotification(SendTaskOpenedMiniProgramNotificationRequest)
      returns (SendTaskOpenedMiniProgramNotificationResponse);

  // ==================== Operator Bootstrap 操作 ====================

  // 自举首个操作者
  // 场景：seed/bootstrap 工具需要在尚无 active operator 的 org 中创建第一个 operator
  // 流程：EnsureByUser 幂等建档，同步基础信息，必要时激活/停用，并从 IAM 快照回填本地角色投影
  rpc BootstrapOperator(BootstrapOperatorRequest)
      returns (BootstrapOperatorResponse);
}

// Plan 写侧命令服务 - 供 Worker 和内部系统动作调用
service PlanCommandService {
  rpc CreatePlan(CreatePlanRequest) returns (CreatePlanResponse);
  rpc PausePlan(PausePlanRequest) returns (PausePlanResponse);
  rpc ResumePlan(ResumePlanRequest) returns (ResumePlanResponse);
  rpc FinishPlan(FinishPlanRequest) returns (FinishPlanResponse);
  rpc CancelPlan(CancelPlanRequest) returns (CancelPlanResponse);
  rpc EnrollTestee(EnrollTesteeRequest) returns (EnrollTesteeResponse);
  rpc TerminateEnrollment(TerminateEnrollmentRequest) returns (TerminateEnrollmentResponse);
  rpc SchedulePendingTasks(SchedulePendingTasksRequest) returns (SchedulePendingTasksResponse);
  rpc OpenTask(OpenTaskRequest) returns (OpenTaskResponse);
  rpc CompleteTask(CompleteTaskRequest) returns (CompleteTaskResponse);
  rpc ExpireTask(ExpireTaskRequest) returns (ExpireTaskResponse);
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
}

// ==================== PlanCommandService ====================

message PlanResultMessage {
  string id = 1;
  int64 org_id = 2;
  string scale_code = 3;
  string schedule_type = 4;
  int32 interval = 5;
  int32 total_times = 6;
  repeated string fixed_dates = 7;
  repeated int32 relative_weeks = 8;
  string status = 9;
  string trigger_time = 10;
}

message TaskResultMessage {
  string id = 1;
  string plan_id = 2;
  int32 seq = 3;
  int64 org_id = 4;
  string testee_id = 5;
  string scale_code = 6;
  string planned_at = 7;
  optional string open_at = 8;
  optional string expire_at = 9;
  optional string completed_at = 10;
  string status = 11;
  optional string assessment_id = 12;
  string entry_token = 13;
  string entry_url = 14;
}

message EnrollmentResultMessage {
  string plan_id = 1;
  repeated TaskResultMessage tasks = 2;
  bool idempotent = 3;
  int32 created_task_count = 4;
}

message TaskScheduleStatsMessage {
  int32 pending_count = 1;
  int32 opened_count = 2;
  int32 failed_count = 3;
  int32 expired_count = 4;
  int32 expire_failed_count = 5;
}

message CreatePlanRequest {
  int64 org_id = 1;
  string scale_code = 2;
  string schedule_type = 3;
  int32 interval = 4;
  int32 total_times = 5;
  repeated string fixed_dates = 6;
  repeated int32 relative_weeks = 7;
  string trigger_time = 8;
}

message CreatePlanResponse {
  PlanResultMessage plan = 1;
}

message PausePlanRequest {
  int64 org_id = 1;
  string plan_id = 2;
}

message PausePlanResponse {
  PlanResultMessage plan = 1;
}

message ResumePlanRequest {
  int64 org_id = 1;
  string plan_id = 2;
  map<string, string> testee_start_dates = 3;
}

message ResumePlanResponse {
  PlanResultMessage plan = 1;
}

message FinishPlanRequest {
  int64 org_id = 1;
  string plan_id = 2;
}

message FinishPlanResponse {
  PlanResultMessage plan = 1;
}

message CancelPlanRequest {
  int64 org_id = 1;
  string plan_id = 2;
}

message CancelPlanResponse {
  string plan_id = 1;
  int32 affected_task_count = 2;
}

message EnrollTesteeRequest {
  int64 org_id = 1;
  string plan_id = 2;
  string testee_id = 3;
  string start_date = 4;
}

message EnrollTesteeResponse {
  EnrollmentResultMessage enrollment = 1;
}

message TerminateEnrollmentRequest {
  int64 org_id = 1;
  string plan_id = 2;
  string testee_id = 3;
}

message TerminateEnrollmentResponse {
  string plan_id = 1;
  string testee_id = 2;
  int32 affected_task_count = 3;
}

message SchedulePendingTasksRequest {
  int64 org_id = 1;
  string before = 2;
}

message SchedulePendingTasksResponse {
  repeated TaskResultMessage tasks = 1;
  TaskScheduleStatsMessage stats = 2;
}

message OpenTaskRequest {
  int64 org_id = 1;
  string task_id = 2;
}

message OpenTaskResponse {
  TaskResultMessage task = 1;
}

message CompleteTaskRequest {
  int64 org_id = 1;
  string task_id = 2;
  string assessment_id = 3;
}

message CompleteTaskResponse {
  TaskResultMessage task = 1;
}

message ExpireTaskRequest {
  int64 org_id = 1;
  string task_id = 2;
}

message ExpireTaskResponse {
  TaskResultMessage task = 1;
}

message CancelTaskRequest {
  int64 org_id = 1;
  string task_id = 2;
}

message CancelTaskResponse {
  string task_id = 1;
  string plan_id = 2;
  int32 affected_task_count = 3;
}

// ==================== CalculateAnswerSheetScore ====================

// 计算答卷分数请求
message CalculateAnswerSheetScoreRequest {
  uint64 answersheet_id = 1;         // 答卷ID
}

// 计算答卷分数响应
message CalculateAnswerSheetScoreResponse {
  bool success = 1;                  // 是否成功
  double total_score = 2;            // 总分
  string message = 3;                // 描述信息
}

// ==================== CreateAssessmentFromAnswerSheet ====================

// 从答卷创建测评请求
message CreateAssessmentFromAnswerSheetRequest {
  uint64 answersheet_id = 1;         // 答卷ID
  string questionnaire_code = 2;     // 问卷编码
  string questionnaire_version = 3;  // 问卷版本
  uint64 testee_id = 4;              // 受试者ID
  uint64 org_id = 5;                 // 组织ID
  uint64 filler_id = 6;              // 填写人ID
  string filler_type = 7;            // 填写人类型：self/proxy
  string origin_type = 8;            // 来源类型：adhoc/plan（可选）
  string origin_id = 9;              // 来源ID（可选）
  string task_id = 10;               // 计划任务ID（可选）
}

// 从答卷创建测评响应
message CreateAssessmentFromAnswerSheetResponse {
  uint64 assessment_id = 1;          // 创建的测评ID（如果有）
  bool created = 2;                  // 是否创建了测评
  bool auto_submitted = 3;           // 是否自动提交（关联量表时）
  string message = 4;                // 描述信息
  bool success = 5;                  // 业务是否成功（与 gRPC error 分离）
}

// ==================== EvaluateAssessment ====================

// 执行测评评估请求
message EvaluateAssessmentRequest {
  uint64 assessment_id = 1;          // 测评ID
}

// 执行测评评估响应
message EvaluateAssessmentResponse {
  bool success = 1;                  // 是否成功
  string status = 2;                 // 处理后的状态：evaluated/failed/skipped
  string message = 3;                // 描述信息
  reserved 4, 5;
  reserved "total_score", "risk_level";
  OutcomeSummary outcome = 6;        // v2 outcome 投影
  bool retryable = 7;                // 失败时是否应 nack 重试（与 evaluation_run.retryable 对齐）
  string run_id = 8;                 // 失败时关联的 evaluation_run id
  string failure_kind = 9;           // 失败分类：validation/calculation/timeout/internal
  string trace_id = 10;              // 关联 evaluation_run trace_id
  string input_snapshot_ref = 11;    // 关联 evaluation_run input_snapshot_ref
}

message OutcomeSummary {
  ModelIdentity model = 1;
  ScoreValue primary_score = 2;
  ResultLevel level = 3;
}

message ModelIdentity {
  string kind = 1;
  string sub_kind = 2;
  string algorithm = 3;
  string code = 4;
  string version = 5;
  string title = 6;
  string product_channel = 7;
  string algorithm_family = 8;
}

message ScoreValue {
  string kind = 1;
  double value = 2;
  string label = 3;
  optional double max = 4;
}

message ResultLevel {
  string code = 1;
  string label = 2;
  string severity = 3;
}

// ==================== GenerateReportFromAssessment ====================

message GenerateReportFromAssessmentRequest {
  uint64 assessment_id = 1;
  string outcome_id = 2;              // assessment.evaluated 携带的 canonical EvaluationOutcome ID
}

message GenerateReportFromAssessmentResponse {
  bool success = 1;
  string status = 2;
  string message = 3;
  bool retryable = 4;                // 失败时是否应 nack 重试
  string run_id = 5;                 // 关联的 interpretation_run id（若有）
  string failure_kind = 6;           // 失败分类（若有）
  string generation_id = 7;          // 报告生成聚合 ID
  string report_id = 8;              // 成功 Artifact ID（若有）
  string failure_code = 9;           // 失败代码（若有）
}

// ==================== Assessment Attention Sync ====================

// 同步测评后置关注状态请求
message SyncAssessmentAttentionRequest {
  uint64 testee_id = 1;              // 受试者ID
  string risk_level = 2;             // 风险等级：none/low/medium/high/severe
  bool mark_key_focus = 3;           // 是否允许高风险时自动标记重点关注
}

// 同步测评后置关注状态响应
message SyncAssessmentAttentionResponse {
  bool success = 1;                  // 是否成功
  bool key_focus_marked = 2;         // 本次测评结果是否满足自动重点关注规则
  string message = 3;                // 描述信息
}

// ==================== GenerateQuestionnaireQRCode ====================

// 生成问卷小程序码请求
message GenerateQuestionnaireQRCodeRequest {
  string code = 1;                    // 问卷编码
  string version = 2;                 // 问卷版本
}

// 生成问卷小程序码响应
message GenerateQuestionnaireQRCodeResponse {
  bool success = 1;                  // 是否成功
  string qrcode_url = 2;             // 二维码 URL
  string message = 3;                // 描述信息
}

// ==================== GenerateScaleQRCode ====================

// 生成量表小程序码请求
message GenerateScaleQRCodeRequest {
  string code = 1;                    // 量表编码
}

// 生成量表小程序码响应
message GenerateScaleQRCodeResponse {
  bool success = 1;                  // 是否成功
  string qrcode_url = 2;             // 二维码 URL
  string message = 3;                // 描述信息
}

// ==================== ProjectBehaviorEvent ====================

message ProjectBehaviorEventRequest {
  string event_id = 1;
  string event_type = 2;
  int64 org_id = 3;
  uint64 clinician_id = 4;
  uint64 entry_id = 5;
  uint64 testee_id = 6;
  uint64 assessment_id = 7;
  uint64 report_id = 8;
  google.protobuf.Timestamp occurred_at = 9;
  uint64 answersheet_id = 10;
  uint64 source_clinician_id = 11;
  string failure_reason = 12;
}

message ProjectBehaviorEventResponse {
  string status = 1;                 // completed / pending
  string message = 2;
}

// ==================== SendTaskOpenedMiniProgramNotification ====================

message SendTaskOpenedMiniProgramNotificationRequest {
  int64 org_id = 1;                  // 机构 ID
  string task_id = 2;                // 任务 ID
  uint64 testee_id = 3;              // 受试者 ID
  string entry_url = 4;              // 任务入口 URL
  google.protobuf.Timestamp open_at = 5; // 任务开放时间
}

message SendTaskOpenedMiniProgramNotificationResponse {
  bool success = 1;                  // 是否成功
  int32 sent_count = 2;              // 成功发送条数
  repeated string recipient_open_ids = 3; // 实际命中的 openid 列表
  string recipient_source = 4;       // 收件人来源：testee / profile_link
  bool skipped = 5;                  // 是否跳过发送
  string message = 6;                // 描述信息
}

// ==================== BootstrapOperator ====================

message BootstrapOperatorRequest {
  int64 org_id = 1;                  // 机构 ID
  int64 user_id = 2;                 // IAM 用户 ID
  string name = 3;                   // 姓名
  string email = 4;                  // 邮箱（可选）
  string phone = 5;                  // 手机号（可选）
  bool is_active = 6;                // 是否激活
}

message BootstrapOperatorResponse {
  uint64 operator_id = 1;            // 操作者 ID
  bool created = 2;                  // 是否首次创建
  string message = 3;                // 描述信息
  repeated string roles = 4;         // 当前本地角色投影
}
