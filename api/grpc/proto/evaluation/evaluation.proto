syntax = "proto3";

package evaluation;

option go_package = "github.com/FangcunMount/qs-server/api/grpc/gen/evaluation";

// 受试者测评查询。
service TesteeEvaluationService {
  // 获取我的测评详情（含 model/primary_score/level outcome 投影）
  rpc GetMyAssessment(GetMyAssessmentRequest) returns (GetMyAssessmentResponse);

  // 获取我的测评列表（含 outcome 投影）
  rpc ListMyAssessments(ListMyAssessmentsRequest) returns (ListMyAssessmentsResponse);

  rpc GetAssessmentScores(GetAssessmentScoresRequest) returns (GetAssessmentScoresResponse);
  rpc GetFactorTrend(GetFactorTrendRequest) returns (GetFactorTrendResponse);
  rpc GetHighRiskFactors(GetHighRiskFactorsRequest) returns (GetHighRiskFactorsResponse);

}

// 答卷编排系统调用的 Evaluation intake Journey。
service AssessmentIntakeService {
  rpc EnsureAssessment(EnsureAssessmentRequest) returns (EnsureAssessmentResponse);
  rpc ResolveAssessmentByAnswerSheetID(ResolveAssessmentByAnswerSheetIDRequest) returns (ResolveAssessmentByAnswerSheetIDResponse);
}

// 单次评分 Worker 入口。
service EvaluationWorkerService {
  rpc ExecuteEvaluation(ExecuteEvaluationRequest) returns (ExecuteEvaluationResponse);
}

// ==================== Outcome 共享类型 ====================

message ModelIdentity {
  string kind = 1;
  string sub_kind = 2;
  string algorithm = 3;
  string code = 4;
  string version = 5;
  string title = 6;
  string product_channel = 7;
  string algorithm_family = 8;
  // Publish-time frozen RuntimeIdentity fields (MC-R006).
  string decision_kind = 9;
  string payload_format = 10;
}

message ScoreValue {
  string kind = 1;
  double value = 2;
  string label = 3;
  optional double max = 4;
}

message ResultLevel {
  string code = 1;
  string label = 2;
  string severity = 3;
}

// ==================== 测评消息 ====================

message AssessmentSummary {
  reserved 5, 6, 9, 10;
  reserved "scale_code", "scale_name", "total_score", "risk_level";
  uint64 id = 1;
  string questionnaire_code = 3;
  string questionnaire_version = 4;
  string origin_type = 7;
  string status = 8;
  string created_at = 11;
  string submitted_at = 12;
  reserved 13;
  reserved "interpreted_at";
  uint64 answer_sheet_id = 14;
  ModelIdentity model = 15;
  ScoreValue primary_score = 16;
  ResultLevel level = 17;
}

message AssessmentDetail {
  reserved 8, 9, 13, 14;
  reserved "scale_code", "scale_name", "total_score", "risk_level";
  uint64 id = 1;
  uint64 org_id = 2;
  uint64 testee_id = 3;
  string questionnaire_code = 5;
  string questionnaire_version = 6;
  uint64 answer_sheet_id = 7;
  string origin_type = 10;
  string origin_id = 11;
  string status = 12;
  string created_at = 15;
  string submitted_at = 16;
  reserved 17;
  reserved "interpreted_at";
  string failed_at = 18;
  string failure_reason = 19;
  ModelIdentity model = 20;
  ScoreValue primary_score = 21;
  ResultLevel level = 22;
}

message FactorScore {
  string factor_code = 1;
  string factor_name = 2;
  double raw_score = 3;
  string risk_level = 4;
  bool is_total_score = 7;
}

message TrendPoint {
  uint64 assessment_id = 1;
  double score = 2;
  string risk_level = 3;
  string created_at = 4;
}

// ==================== 测评查询 ====================

message GetMyAssessmentRequest {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
}

message GetMyAssessmentResponse {
  AssessmentDetail assessment = 1;
}

message ResolveAssessmentByAnswerSheetIDRequest {
  uint64 answer_sheet_id = 1;
}

message ResolveAssessmentByAnswerSheetIDResponse {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
  // readiness_phase: pending | no_assessment_required | ready | failed (EV-R007)
  string readiness_phase = 3;
  string assessment_status = 4;
  string failure_reason = 5;
}

message EnsureAssessmentRequest {
  uint64 org_id = 1;
  uint64 answer_sheet_id = 2;
  string questionnaire_code = 3;
  string questionnaire_version = 4;
  uint64 testee_id = 5;
  uint64 filler_id = 6;
  string task_id = 7;
  string origin_type = 8;
  string origin_id = 9;
  // Submit-time frozen evaluation admission (EV-R001). Empty purpose = legacy.
  AssessmentAdmission admission = 10;
}

// AssessmentAdmission freezes independent vs assessment intent and exact release.
message AssessmentAdmission {
  string purpose = 1;
  string questionnaire_code = 2;
  string questionnaire_version = 3;
  string model_kind = 4;
  string model_sub_kind = 5;
  string model_algorithm = 6;
  string model_code = 7;
  string model_version = 8;
  string model_title = 9;
}

message EnsureAssessmentResponse {
  uint64 assessment_id = 1;
  bool created = 2;
  bool auto_submitted = 3;
}

message ExecuteEvaluationRequest { uint64 assessment_id = 1; }

message ExecuteEvaluationResponse {
  string status = 1;
  ModelIdentity model = 2;
  ScoreValue primary_score = 3;
  ResultLevel level = 4;
  string outcome_id = 5;
  bool retryable = 6;
  string run_id = 7;
  string failure_kind = 8;
  string failure_message = 9;
  string trace_id = 10;
  string input_snapshot_ref = 11;
  string retry_disposition = 12;
  string attempt_origin = 13;
  int32 current_attempt = 14;
  int32 max_automatic_attempts = 15;
  int32 remaining_automatic_attempts = 16;
  string next_attempt_at = 17;
  string retry_event_id = 18;
  string action_request_id = 19;
}

message ListMyAssessmentsRequest {
  uint64 testee_id = 1;
  string status = 2;
  int32 page = 3;
  int32 page_size = 4;
  string scale_code = 5;
  string risk_level = 6;
  string date_from = 7;
  string date_to = 8;
  string model_kind = 9;
  reserved 10;
  reserved "model_algorithm";
  string model_code = 11;
  // Optional exact model-kind set. When present, it replaces model_kind and
  // keeps pagination/counting in the read model instead of the caller.
  repeated string model_kinds = 12;
}

message ListMyAssessmentsResponse {
  repeated AssessmentSummary items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// ==================== 得分查询 ====================

message GetAssessmentScoresRequest {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
}

message GetAssessmentScoresResponse {
  uint64 assessment_id = 1;
  double total_score = 2;
  string risk_level = 3;
  repeated FactorScore factor_scores = 4;
}

message GetFactorTrendRequest {
  uint64 testee_id = 1;
  string factor_code = 2;
  int32 limit = 3;
}

message GetFactorTrendResponse {
  uint64 testee_id = 1;
  string factor_code = 2;
  string factor_name = 3;
  repeated TrendPoint data_points = 4;
}

message GetHighRiskFactorsRequest {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
}

message GetHighRiskFactorsResponse {
  uint64 assessment_id = 1;
  bool has_high_risk = 2;
  repeated FactorScore high_risk_factors = 3;
  bool needs_urgent_care = 4;
}
