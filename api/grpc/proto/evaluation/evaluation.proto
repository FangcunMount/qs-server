syntax = "proto3";

package evaluation;

option go_package = "github.com/FangcunMount/qs-server/api/grpc/gen/evaluation";

// 测评服务 - C端用户接口
// 提供测评结果查询、报告查看等功能
service EvaluationService {
  // 获取我的测评详情（含 model/primary_score/level outcome 投影）
  rpc GetMyAssessment(GetMyAssessmentRequest) returns (GetMyAssessmentResponse);

  // 通过答卷 ID 解析 testee_id + assessment_id（供 BFF 薄包装使用）
  rpc ResolveAssessmentByAnswerSheetID(ResolveAssessmentByAnswerSheetIDRequest) returns (ResolveAssessmentByAnswerSheetIDResponse);

  // Deprecated: 优先使用 ResolveAssessmentByAnswerSheetID + GetMyAssessment
  rpc GetMyAssessmentByAnswerSheetID(GetMyAssessmentByAnswerSheetIDRequest) returns (GetMyAssessmentByAnswerSheetIDResponse);

  // 获取我的测评列表（含 outcome 投影）
  rpc ListMyAssessments(ListMyAssessmentsRequest) returns (ListMyAssessmentsResponse);

  rpc GetAssessmentScores(GetAssessmentScoresRequest) returns (GetAssessmentScoresResponse);
  rpc GetFactorTrend(GetFactorTrendRequest) returns (GetFactorTrendResponse);
  rpc GetHighRiskFactors(GetHighRiskFactorsRequest) returns (GetHighRiskFactorsResponse);

  // testee_id 可选：有值时校验归属并返回 outcome 投影；worker 内部调用可省略
  rpc GetAssessmentReport(GetAssessmentReportRequest) returns (GetAssessmentReportResponse);
  rpc ListMyReports(ListMyReportsRequest) returns (ListMyReportsResponse);
}

// ==================== Outcome 共享类型 ====================

message ModelIdentity {
  string kind = 1;
  string sub_kind = 2;
  string algorithm = 3;
  string code = 4;
  string version = 5;
  string title = 6;
}

message ScoreValue {
  string kind = 1;
  double value = 2;
  string label = 3;
  optional double max = 4;
}

message ResultLevel {
  string code = 1;
  string label = 2;
  string severity = 3;
}

// ==================== 测评消息 ====================

message AssessmentSummary {
  uint64 id = 1;
  string questionnaire_code = 3;
  string questionnaire_version = 4;
  string scale_code = 5;
  string scale_name = 6;
  string origin_type = 7;
  string status = 8;
  double total_score = 9;
  string risk_level = 10;
  string created_at = 11;
  string submitted_at = 12;
  string interpreted_at = 13;
  uint64 answer_sheet_id = 14;
  ModelIdentity model = 15;
  ScoreValue primary_score = 16;
  ResultLevel level = 17;
}

message AssessmentDetail {
  uint64 id = 1;
  uint64 org_id = 2;
  uint64 testee_id = 3;
  string questionnaire_code = 5;
  string questionnaire_version = 6;
  uint64 answer_sheet_id = 7;
  string scale_code = 8;
  string scale_name = 9;
  string origin_type = 10;
  string origin_id = 11;
  string status = 12;
  double total_score = 13;
  string risk_level = 14;
  string created_at = 15;
  string submitted_at = 16;
  string interpreted_at = 17;
  string failed_at = 18;
  string failure_reason = 19;
  ModelIdentity model = 20;
  ScoreValue primary_score = 21;
  ResultLevel level = 22;
}

message FactorScore {
  string factor_code = 1;
  string factor_name = 2;
  double raw_score = 3;
  string risk_level = 4;
  string conclusion = 5;
  string suggestion = 6;
  bool is_total_score = 7;
}

message TrendPoint {
  uint64 assessment_id = 1;
  double score = 2;
  string risk_level = 3;
  string created_at = 4;
}

message Suggestion {
  string category = 1;
  string content = 2;
  string factor_code = 3;
}

message DimensionInterpret {
  string factor_code = 1;
  string factor_name = 2;
  double raw_score = 3;
  double max_score = 6;
  string risk_level = 4;
  string description = 5;
  string suggestion = 7;
}

message ModelExtra {
  string kind = 1;
  string type_code = 2;
  string type_name = 3;
  string one_liner = 4;
  string image_url = 5;
  double match_percent = 6;
  bool is_special = 7;
  string special_trigger = 8;
  string commentary = 9;
  ModelRarity rarity = 10;
}

message ModelRarity {
  double percent = 1;
  string label = 2;
  int32 one_in_x = 3;
}

message AssessmentReport {
  uint64 assessment_id = 1;
  string scale_code = 2;
  string scale_name = 3;
  double total_score = 4;
  string risk_level = 5;
  string conclusion = 6;
  repeated DimensionInterpret dimensions = 7;
  repeated Suggestion suggestions = 8;
  string created_at = 9;
  ModelExtra model_extra = 10;
  ModelIdentity model = 11;
  ScoreValue primary_score = 12;
  ResultLevel level = 13;
}

// ==================== 测评查询 ====================

message GetMyAssessmentRequest {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
}

message GetMyAssessmentResponse {
  AssessmentDetail assessment = 1;
}

message ResolveAssessmentByAnswerSheetIDRequest {
  uint64 answer_sheet_id = 1;
}

message ResolveAssessmentByAnswerSheetIDResponse {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
}

message GetMyAssessmentByAnswerSheetIDRequest {
  uint64 answer_sheet_id = 1;
}

message GetMyAssessmentByAnswerSheetIDResponse {
  AssessmentDetail assessment = 1;
}

message ListMyAssessmentsRequest {
  uint64 testee_id = 1;
  string status = 2;
  int32 page = 3;
  int32 page_size = 4;
  string scale_code = 5;
  string risk_level = 6;
  string date_from = 7;
  string date_to = 8;
  string model_kind = 9;
  string model_algorithm = 10;
  string model_code = 11;
}

message ListMyAssessmentsResponse {
  repeated AssessmentSummary items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

// ==================== 得分查询 ====================

message GetAssessmentScoresRequest {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
}

message GetAssessmentScoresResponse {
  uint64 assessment_id = 1;
  double total_score = 2;
  string risk_level = 3;
  repeated FactorScore factor_scores = 4;
}

message GetFactorTrendRequest {
  uint64 testee_id = 1;
  string factor_code = 2;
  int32 limit = 3;
}

message GetFactorTrendResponse {
  uint64 testee_id = 1;
  string factor_code = 2;
  string factor_name = 3;
  repeated TrendPoint data_points = 4;
}

message GetHighRiskFactorsRequest {
  uint64 testee_id = 1;
  uint64 assessment_id = 2;
}

message GetHighRiskFactorsResponse {
  uint64 assessment_id = 1;
  bool has_high_risk = 2;
  repeated FactorScore high_risk_factors = 3;
  bool needs_urgent_care = 4;
}

// ==================== 报告查询 ====================

message GetAssessmentReportRequest {
  uint64 assessment_id = 1;
  uint64 testee_id = 2;
}

message GetAssessmentReportResponse {
  AssessmentReport report = 1;
}

message ListMyReportsRequest {
  uint64 testee_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListMyReportsResponse {
  repeated AssessmentReport items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}
