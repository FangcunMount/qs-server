    get:
      description: 等待测评报告生成，支持长轮询机制。如果报告已生成则立即返回，否则等待最多 timeout 秒
      parameters:
      - description: 测评ID
        in: path
        name: id
        required: true
        type: integer
      - description: 受试者ID
        in: query
        name: testee_id
        required: true
        type: integer
      - default: 20
        description: 超时时间（秒）
        in: query
        maximum: 25
        minimum: 1
