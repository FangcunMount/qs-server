      - application/json
      description: 升级 WebSocket 后发送 subscribe 帧等待测评终态。每条连接仅允许一次 subscribe。人格线 kind=personality；量表线
        kind=medical。需 report_events.enabled=true。
      parameters:
      - description: Bearer 用户令牌
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols
          schema:
            $ref: '#/definitions/ws.ReportEventsStatusFrame'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/core.ErrResponse'
        "404":
          description: report_events 未开启
          schema:
            $ref: '#/definitions/core.ErrResponse'
      summary: 报告状态 WebSocket 推送
      tags:
      - 报告事件
