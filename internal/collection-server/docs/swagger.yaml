      algorithm:
        type: string
      algorithm_family:
        type: string
      code:
        type: string
      decision_kind:
        type: string
      description:
        type: string
      kind:
        enum:
        - typology
        example: typology
        type: string
      payload_format:
        type: string
      product_channel:
        enum:
        - typology
        example: typology
        type: string
      question_count:
        type: integer
      questionnaire_code:
        type: string
      questionnaire_version:
        type: string
      status:
        type: string
      sub_kind:
        description: 子机制，人格测评固定 typology。
        example: typology
        type: string
      title:
        type: string
      version:
        type: string
    type: object
  typologymodel.TypologyOutcomeResponse:
    properties:
      code:
        type: string
      image_url:
        type: string
      name:
        type: string
      one_liner:
        type: string
    type: object
  typologysession.SessionEndpointsResponse:
    properties:
      assessment_by_answer_sheet:
        description: 已下线（R121）端点 URL 模板，勿调用。assessment_id 请用 GET /typology-assessments
          列表按 answer_sheet_id 匹配。
        type: string
      report:
        type: string
      submit_answer_sheet:
        type: string
      wait_report:
        description: legacy 长轮询；推荐改用 report-status 短轮询或 WSS /report-events（kind=personality）。
        type: string
    type: object
  typologysession.StartSessionRequest:
    properties:
      model_code:
        example: MBTI_OEJTS
        type: string
      testee_id:
        description: 受试者 ID；JSON 可传字符串或数字（小程序大整数建议字符串）。
        example: "618855887087350318"
        type: string
    required:
    - model_code
    - testee_id
    type: object
  typologysession.StartSessionResponse:
    properties:
      endpoints:
        $ref: '#/definitions/typologysession.SessionEndpointsResponse'
      model:
        $ref: '#/definitions/typologymodel.TypologyModelSummaryResponse'
      questionnaire:
        $ref: '#/definitions/questionnaire.QuestionnaireResponse'
      submit_contract:
        $ref: '#/definitions/typologysession.SubmitContractResponse'
    type: object
  typologysession.SubmitContractResponse:
    properties:
      questionnaire_code:
        type: string
      questionnaire_version:
        type: string
      testee_id:
        type: string
    type: object
  ws.ReportEventsStatusFrame:
    properties:
      data:
        properties:
          status:
            enum:
            - pending
            - submitted
            - interpreted
            - failed
            example: interpreted
            type: string
        type: object
      op:
        example: status
        type: string
    type: object
