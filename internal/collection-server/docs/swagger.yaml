        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/core.ErrResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/core.ErrResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/core.ErrResponse'
      security:
      - Bearer: []
      summary: 创建受试者
      tags:
      - 受试者
  /api/v1/testees/{id}:
    get:
      description: 根据ID获取受试者详细信息
      parameters:
      - description: 受试者ID
        in: path
        name: id
        required: true
