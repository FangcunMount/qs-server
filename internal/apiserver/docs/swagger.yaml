      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/core.Response'
            - properties:
                data:
                  $ref: '#/definitions/response.AnswerSheetListResponse'
              type: object
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/core.ErrResponse'
      summary: 查询答卷列表
      tags:
      - AnswerSheet-Management
