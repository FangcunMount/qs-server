name: Production Deploy

# ============================================================================
# 必需的 Secrets 配置
# ============================================================================
# Organization Secrets (组织级别，共享配置):
#   Organization Variables（主机连通，明文可读）:
#   SVRA_HOST / SVRB_HOST / SVRD_HOST（建议 Tailscale 100.x）
#   SVRA_USERNAME / SVRB_USERNAME / SVRD_USERNAME
#   SVRA_SSH_PORT / SVRB_SSH_PORT / SVRD_SSH_PORT（可选，默认 22）
#   Organization Secrets（敏感凭据）:
#   SVRA_SSH_KEY；SVRB/SVRD_SSH_KEY 可选，缺省复用 SVRA_SSH_KEY
#   SVRA/SVRB/SVRD_SUDO_PASSWORD（可选，sudo 需要密码时）
#   MONGODB_HOST, MONGODB_PORT
#   MYSQL_HOST, MYSQL_PORT (Worker 使用)
#   REDIS_HOST, REDIS_PORT, REDIS_USE_SSL, REDIS_SSL_INSECURE_SKIP_VERIFY
#   NSQ_NSQD_HOST, NSQ_NSQD_PORT, NSQ_LOOKUPD_HOST, NSQ_LOOKUPD_PORT
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#   ALIYUN_ACR_REGISTRY (如 registry.cn-hangzhou.aliyuncs.com)
#   ALIYUN_ACR_NAMESPACE (ACR 命名空间)
#   ALIYUN_ACR_USERNAME, ALIYUN_ACR_PASSWORD (ACR 登录密码)
#
# Repository Secrets (仓库级别，敏感信息):
#   MONGODB_USERNAME, MONGODB_PASSWORD, MONGODB_DBNAME
#   MYSQL_USERNAME, MYSQL_PASSWORD, MYSQL_DATABASE (Worker 使用)
#   REDIS_PORT/DB/USERNAME/PASSWORD/USE_SSL/SSL_INSECURE_SKIP_VERIFY
#   JWT_SECRET
#   OSS_ACCESS_KEY_ID, OSS_ACCESS_KEY_SECRET, OSS_SESSION_TOKEN（可选，apiserver 二维码 OSS）
#   GRPC_APISERVER_ADDR (可选，默认 qs-apiserver:9090)
#
# 生产拓扑（2026-06）：
#   serverA（8C/16G）：nginx + qs-apiserver + qs-collection-server
#   serverB：IAM（iam-apiserver）；经 Swarm overlay infra-network 跨机 DNS（勿 extra_hosts 到宿主机 9090）
#   serverD：qs-worker（跨云 gRPC 连 apiserver）
#   WWW_UID, WWW_GID（与宿主机运行用户一致，部署时 chown TLS 与 configs；镜像 RUN_UID 与之一致）
#
# 可选 Repository / Organization Variables（自托管部署机 ServerD）:
#   QS_DEPLOY_RUNNER=serverd          deploy-* job 的 runs-on；组织级 runner 标签，多仓库共用
#   QS_DEPLOY_EXPORT_REGISTRY=acr      ServerD export 镜像源；留空默认 acr（国内 ACR pull）
#   QS_DEPLOY_HTTP_PROXY=http://127.0.0.1:7890  Mihomo HTTP 代理
#   QS_DEPLOY_HTTPS_PROXY=（默认同 HTTP）
#   QS_DEPLOY_ALL_PROXY=socks5://127.0.0.1:7891
#   QS_DEPLOY_NO_PROXY=127.0.0.1,localhost,内网域名/IP
#
# Repository Secrets（自托管 checkout）:
#   QS_SERVER_DEPLOY_KEY  GitHub Deploy Key 私钥（只读），用于 actions/checkout ssh-key
# 组织级 runner 注册见 .github/workflows/README.md §自托管 Runner
# ============================================================================

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: '要部署的服务'
        required: true
        type: choice
        options:
          - all
          - apiserver
          - collection
          - worker
      worker_replicas:
        description: 'Worker 副本数（留空则读取 QS_WORKER_REPLICAS，缺失时默认为 3）'
        required: false
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_REPOSITORY: fangcunmount
  DEPLOY_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  BUILD_TIME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.updated_at || github.event.repository.updated_at }}
  DEPLOY_EXPORT_REGISTRY: ${{ vars.QS_DEPLOY_EXPORT_REGISTRY || 'acr' }}
  # 自托管 runner（ServerD）网络：走 Mihomo 代理 + GitHub SSH；ACR 走 NO_PROXY 直连国内
  SELF_HOSTED_HTTP_PROXY: ${{ vars.QS_DEPLOY_HTTP_PROXY || 'http://127.0.0.1:7890' }}
  SELF_HOSTED_HTTPS_PROXY: ${{ vars.QS_DEPLOY_HTTPS_PROXY || vars.QS_DEPLOY_HTTP_PROXY || 'http://127.0.0.1:7890' }}
  SELF_HOSTED_ALL_PROXY: ${{ vars.QS_DEPLOY_ALL_PROXY || 'socks5://127.0.0.1:7891' }}
  SELF_HOSTED_NO_PROXY: ${{ vars.QS_DEPLOY_NO_PROXY || '127.0.0.1,localhost,100.64.0.0/10,.aliyuncs.com,.personal.cr.aliyuncs.com' }}

jobs:
  plan:
    name: Plan Deploy Services
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      actions: read
    outputs:
      services: ${{ steps.plan.outputs.services }}
      has_services: ${{ steps.plan.outputs.has_services }}
      apiserver: ${{ steps.plan.outputs.apiserver }}
      collection: ${{ steps.plan.outputs.collection }}
      worker: ${{ steps.plan.outputs.worker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 0

      - name: Plan deploy services
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SERVICE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.service || 'all' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          make cd-plan

  docker:
    name: Build and Push Docker Images
    needs: [plan]
    runs-on: ubuntu-latest
    environment:
      name: production
    if: |
      needs.plan.outputs.has_services == 'true'
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
      ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.plan.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and publish ${{ matrix.service }}
        run: |
          make cd-image \
            SERVICE="${{ matrix.service }}" \
            DEPLOY_REF="${DEPLOY_REF}" \
            DEPLOY_SHA="${DEPLOY_SHA}" \
            BUILD_TIME="${BUILD_TIME}"

  deploy-apiserver:
    name: Deploy API Server
    needs: [plan, docker]
    runs-on: ${{ vars.QS_DEPLOY_RUNNER || 'ubuntu-latest' }}
    environment:
      name: production
    permissions:
      contents: read
    if: |
      always() &&
      needs.docker.result == 'success' &&
      needs.plan.outputs.apiserver == 'true'
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
    steps:
      - name: Configure runner network (proxy + GitHub SSH)
        if: vars.QS_DEPLOY_RUNNER != ''
        env:
          HTTP_PROXY: ${{ env.SELF_HOSTED_HTTP_PROXY }}
          HTTPS_PROXY: ${{ env.SELF_HOSTED_HTTPS_PROXY }}
          ALL_PROXY: ${{ env.SELF_HOSTED_ALL_PROXY }}
          NO_PROXY: ${{ env.SELF_HOSTED_NO_PROXY }}
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
        run: |
          script_ref="${NETWORK_SCRIPT_REF:-${DEPLOY_SHA:-main}}"
          curl -fsSL --proxy "${HTTP_PROXY}" \
            "https://raw.githubusercontent.com/FangcunMount/qs-server/${script_ref}/scripts/cd/setup-runner-network.sh" \
            | bash

      - name: Checkout (self-hosted SSH)
        if: vars.QS_DEPLOY_RUNNER != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 1
          ssh-key: ${{ secrets.QS_SERVER_DEPLOY_KEY }}

      - name: Checkout (GitHub-hosted HTTPS)
        if: vars.QS_DEPLOY_RUNNER == ''
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 1

      - name: Login to Aliyun ACR
        if: env.DEPLOY_EXPORT_REGISTRY == 'acr'
        env:
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: echo "$ALIYUN_ACR_PASSWORD" | docker login "$ALIYUN_ACR_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin

      - name: Export deployment image tarball
        if: env.DEPLOY_EXPORT_REGISTRY == 'acr'
        env:
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
          EXPORT_IMAGE_REGISTRY: acr
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
        run: make cd-export-image SERVICE=apiserver

      - name: Prepare deployment package
        env:
          MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
          MONGODB_PORT: ${{ secrets.MONGODB_PORT || 27017 }}
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          MONGODB_DBNAME: ${{ secrets.MONGODB_DBNAME }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT || 3306 }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE != '' && secrets.MYSQL_DATABASE || secrets.MYSQL_DBNAME }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || 6379 }}
          REDIS_DB: ${{ secrets.REDIS_DB || 0 }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_USE_SSL: ${{ secrets.REDIS_USE_SSL }}
          REDIS_SSL_INSECURE_SKIP_VERIFY: ${{ secrets.REDIS_SSL_INSECURE_SKIP_VERIFY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NSQ_NSQD_HOST: ${{ secrets.NSQ_NSQD_HOST }}
          NSQ_NSQD_PORT: ${{ secrets.NSQ_NSQD_PORT || 4150 }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_SESSION_TOKEN: ${{ secrets.OSS_SESSION_TOKEN }}
        run: |
          make cd-package SERVICE=apiserver

      - name: Setup deploy SSH
        env:
          RUNNER_SSH_KEY: ${{ secrets.SVRA_SSH_KEY }}
          RUNNER_SSH_HOST: ${{ vars.SVRA_HOST }}
          RUNNER_SSH_USER: ${{ vars.SVRA_USERNAME }}
          RUNNER_SSH_PORT: ${{ vars.SVRA_SSH_PORT || 22 }}
          RUNNER_SSH_ALIAS: deploy-target-apiserver
        run: bash scripts/cd/setup-runner-ssh.sh

      - name: Upload and deploy apiserver
        env:
          RUNNER_SSH_ALIAS: deploy-target-apiserver
          RUNNER_SSH_HOST: ${{ vars.SVRA_HOST }}
          SERVICE: apiserver
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SUDO_PASSWORD: ${{ secrets.SVRA_SUDO_PASSWORD }}
          WWW_UID: ${{ env.WWW_UID }}
          WWW_GID: ${{ env.WWW_GID }}
          IMAGE_TAG: ${{ env.DEPLOY_SHA }}
          DEPLOY_IMAGE_SOURCE: tarball
        run: bash scripts/cd/runner-upload-and-deploy.sh

  deploy-collection:
    name: Deploy Collection Server
    needs: [plan, docker]
    runs-on: ${{ vars.QS_DEPLOY_RUNNER || 'ubuntu-latest' }}
    environment:
      name: production
    permissions:
      contents: read
    if: |
      always() &&
      needs.docker.result == 'success' &&
      needs.plan.outputs.collection == 'true'
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
    steps:
      - name: Configure runner network (proxy + GitHub SSH)
        if: vars.QS_DEPLOY_RUNNER != ''
        env:
          HTTP_PROXY: ${{ env.SELF_HOSTED_HTTP_PROXY }}
          HTTPS_PROXY: ${{ env.SELF_HOSTED_HTTPS_PROXY }}
          ALL_PROXY: ${{ env.SELF_HOSTED_ALL_PROXY }}
          NO_PROXY: ${{ env.SELF_HOSTED_NO_PROXY }}
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
        run: |
          script_ref="${NETWORK_SCRIPT_REF:-${DEPLOY_SHA:-main}}"
          curl -fsSL --proxy "${HTTP_PROXY}" \
            "https://raw.githubusercontent.com/FangcunMount/qs-server/${script_ref}/scripts/cd/setup-runner-network.sh" \
            | bash

      - name: Checkout (self-hosted SSH)
        if: vars.QS_DEPLOY_RUNNER != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 1
          ssh-key: ${{ secrets.QS_SERVER_DEPLOY_KEY }}

      - name: Checkout (GitHub-hosted HTTPS)
        if: vars.QS_DEPLOY_RUNNER == ''
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 1

      - name: Login to Aliyun ACR
        if: env.DEPLOY_EXPORT_REGISTRY == 'acr'
        env:
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: echo "$ALIYUN_ACR_PASSWORD" | docker login "$ALIYUN_ACR_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin

      - name: Export deployment image tarball
        if: env.DEPLOY_EXPORT_REGISTRY == 'acr'
        env:
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
          EXPORT_IMAGE_REGISTRY: acr
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
        run: make cd-export-image SERVICE=collection

      - name: Prepare deployment package
        env:
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || 6379 }}
          REDIS_DB: ${{ secrets.REDIS_DB || 0 }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_USE_SSL: ${{ secrets.REDIS_USE_SSL }}
          REDIS_SSL_INSECURE_SKIP_VERIFY: ${{ secrets.REDIS_SSL_INSECURE_SKIP_VERIFY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          make cd-package SERVICE=collection

      - name: Setup deploy SSH
        env:
          RUNNER_SSH_KEY: ${{ secrets.SVRA_SSH_KEY }}
          RUNNER_SSH_HOST: ${{ vars.SVRA_HOST }}
          RUNNER_SSH_USER: ${{ vars.SVRA_USERNAME }}
          RUNNER_SSH_PORT: ${{ vars.SVRA_SSH_PORT || 22 }}
          RUNNER_SSH_ALIAS: deploy-target-collection
        run: bash scripts/cd/setup-runner-ssh.sh

      - name: Upload and deploy collection
        env:
          RUNNER_SSH_ALIAS: deploy-target-collection
          RUNNER_SSH_HOST: ${{ vars.SVRA_HOST }}
          SERVICE: collection
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SUDO_PASSWORD: ${{ secrets.SVRA_SUDO_PASSWORD }}
          WWW_UID: ${{ env.WWW_UID }}
          WWW_GID: ${{ env.WWW_GID }}
          IMAGE_TAG: ${{ env.DEPLOY_SHA }}
          DEPLOY_IMAGE_SOURCE: tarball
        run: bash scripts/cd/runner-upload-and-deploy.sh

  deploy-worker:
    name: Deploy Worker
    needs: [plan, docker]
    runs-on: ${{ vars.QS_DEPLOY_RUNNER || 'ubuntu-latest' }}
    environment:
      name: production
    permissions:
      contents: read
    if: |
      always() &&
      needs.docker.result == 'success' &&
      needs.plan.outputs.worker == 'true'
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
      WORKER_REPLICAS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.worker_replicas || vars.QS_WORKER_REPLICAS || '3' }}
    steps:
      - name: Configure runner network (proxy + GitHub SSH)
        if: vars.QS_DEPLOY_RUNNER != ''
        env:
          HTTP_PROXY: ${{ env.SELF_HOSTED_HTTP_PROXY }}
          HTTPS_PROXY: ${{ env.SELF_HOSTED_HTTPS_PROXY }}
          ALL_PROXY: ${{ env.SELF_HOSTED_ALL_PROXY }}
          NO_PROXY: ${{ env.SELF_HOSTED_NO_PROXY }}
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
        run: |
          script_ref="${NETWORK_SCRIPT_REF:-${DEPLOY_SHA:-main}}"
          curl -fsSL --proxy "${HTTP_PROXY}" \
            "https://raw.githubusercontent.com/FangcunMount/qs-server/${script_ref}/scripts/cd/setup-runner-network.sh" \
            | bash

      - name: Checkout (self-hosted SSH)
        if: vars.QS_DEPLOY_RUNNER != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 1
          ssh-key: ${{ secrets.QS_SERVER_DEPLOY_KEY }}

      - name: Checkout (GitHub-hosted HTTPS)
        if: vars.QS_DEPLOY_RUNNER == ''
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}
          fetch-depth: 1

      - name: Login to Aliyun ACR
        if: env.DEPLOY_EXPORT_REGISTRY == 'acr'
        env:
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: echo "$ALIYUN_ACR_PASSWORD" | docker login "$ALIYUN_ACR_REGISTRY" -u "$ALIYUN_ACR_USERNAME" --password-stdin

      - name: Export deployment image tarball
        if: env.DEPLOY_EXPORT_REGISTRY == 'acr'
        env:
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
          EXPORT_IMAGE_REGISTRY: acr
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
        run: make cd-export-image SERVICE=worker

      - name: Prepare deployment package
        env:
          MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
          MONGODB_PORT: ${{ secrets.MONGODB_PORT || 27017 }}
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          MONGODB_DBNAME: ${{ secrets.MONGODB_DBNAME }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT || 3306 }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          NSQ_NSQD_HOST: ${{ secrets.NSQ_NSQD_HOST }}
          NSQ_NSQD_PORT: ${{ secrets.NSQ_NSQD_PORT || 4150 }}
          NSQ_LOOKUPD_HOST: ${{ secrets.NSQ_LOOKUPD_HOST }}
          NSQ_LOOKUPD_PORT: ${{ secrets.NSQ_LOOKUPD_PORT || 4161 }}
          GRPC_APISERVER_ADDR: ${{ secrets.GRPC_APISERVER_ADDR || 'qs-apiserver:9090' }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || 6379 }}
          REDIS_DB: ${{ secrets.REDIS_DB || 0 }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_USE_SSL: ${{ secrets.REDIS_USE_SSL }}
          REDIS_SSL_INSECURE_SKIP_VERIFY: ${{ secrets.REDIS_SSL_INSECURE_SKIP_VERIFY }}
        run: |
          make cd-package SERVICE=worker

      - name: Setup deploy SSH
        env:
          RUNNER_SSH_KEY: ${{ secrets.SVRD_SSH_KEY || secrets.SVRA_SSH_KEY }}
          RUNNER_SSH_HOST: ${{ vars.SVRD_HOST }}
          RUNNER_SSH_USER: ${{ vars.SVRD_USERNAME || vars.SVRA_USERNAME }}
          RUNNER_SSH_PORT: ${{ vars.SVRD_SSH_PORT || vars.SVRA_SSH_PORT || 22 }}
          RUNNER_SSH_ALIAS: deploy-target-worker
        run: bash scripts/cd/setup-runner-ssh.sh

      - name: Upload and deploy worker
        env:
          RUNNER_SSH_ALIAS: deploy-target-worker
          RUNNER_SSH_HOST: ${{ vars.SVRD_HOST }}
          # worker 与 apiserver/collection 共用 docker-compose.prod.yml；
          # compose 会解析全文件，qs-apiserver.extra_hosts 仍需 IAM_GRPC_HOST。
          IAM_GRPC_HOST: ${{ vars.SVRB_HOST }}
          SERVICE: worker
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SUDO_PASSWORD: ${{ secrets.SVRD_SUDO_PASSWORD || secrets.SVRA_SUDO_PASSWORD }}
          WWW_UID: ${{ env.WWW_UID }}
          WWW_GID: ${{ env.WWW_GID }}
          WORKER_REPLICAS: ${{ env.WORKER_REPLICAS }}
          IMAGE_TAG: ${{ env.DEPLOY_SHA }}
          DEPLOY_IMAGE_SOURCE: tarball
        run: bash scripts/cd/runner-upload-and-deploy.sh

  notify:
    name: Send Notification
    needs: [plan, docker, deploy-apiserver, deploy-collection, deploy-worker]
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.head_branch == 'main') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Log deployment status
        run: |
          echo "=========================================="
          echo "Deployment Summary"
          echo "=========================================="
          echo "Plan: ${{ needs.plan.result }}"
          echo "Planned services: ${{ needs.plan.outputs.services }}"
          echo "Docker images: ${{ needs.docker.result }}"
          echo "API Server: ${{ needs.deploy-apiserver.result }}"
          echo "Collection Server: ${{ needs.deploy-collection.result }}"
          echo "Worker: ${{ needs.deploy-worker.result }}"

          if [ "${{ needs.plan.result }}" != "success" ]; then
            echo "Deploy planning failed"
            exit 1
          fi

          if [ "${{ needs.plan.outputs.has_services }}" != "true" ]; then
            echo "No deployable service changes detected; production deploy skipped"
            exit 0
          fi

          if [ "${{ needs.docker.result }}" != "success" ]; then
            echo "Docker image build/push failed"
            exit 1
          fi

          ok() {
            [ "$1" = "success" ] || [ "$1" = "skipped" ]
          }

          if ok "${{ needs.deploy-apiserver.result }}" &&
             ok "${{ needs.deploy-collection.result }}" &&
             ok "${{ needs.deploy-worker.result }}"; then
            echo "All deployments succeeded or were skipped by design"
          else
            echo "Some deployments failed"
            exit 1
          fi
