name: Ping Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次

jobs:
  ping-production:
    name: Production Server Check (ServerA)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: System Health Check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.SVRA_HOST }}
          username: ${{ vars.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ vars.SVRA_SSH_PORT || 22 }}
          script: |
            echo "=========================================="
            echo "QS-Server - Production Check (ServerA)"
            echo "=========================================="
            echo "Hostname: $(hostname)"
            echo "Uptime: $(uptime)"
            echo "Date: $(date)"
            echo ""
            echo "Memory:"
            free -h | grep -E "Mem|Swap"
            echo ""
            echo "Disk:"
            df -h | grep -E "^/dev/" | head -3
            echo ""
            echo "CPU:"
            top -bn1 | grep "Cpu(s)"
            echo ""
            echo "Load Average:"
            uptime | awk -F'load average:' '{print $2}'
            echo "=========================================="

      - name: Docker Service Check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.SVRA_HOST }}
          username: ${{ vars.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ vars.SVRA_SSH_PORT || 22 }}
          script: |
            echo "=========================================="
            echo "Docker Service Status (ServerA)"
            echo "=========================================="

            if ! sudo docker info >/dev/null 2>&1; then
              echo "❌ Docker is not running"
              exit 1
            fi
            echo "✅ Docker daemon is running"
            echo ""
            echo "QS-Server containers:"
            sudo docker ps --filter "name=qs-" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo ""

            missing=0
            for svc in qs-apiserver qs-collection-server; do
              if sudo docker ps --filter "name=${svc}" --format "{{.Names}}" | grep -q "${svc}"; then
                echo "✅ ${svc} is running"
              else
                echo "❌ ${svc} is NOT running"
                missing=1
              fi
            done
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
            echo "=========================================="

      - name: API Health Check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.SVRA_HOST }}
          username: ${{ vars.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ vars.SVRA_SSH_PORT || 22 }}
          script: |
            echo "=========================================="
            echo "API Health Check (ServerA)"
            echo "=========================================="

            failed=0

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/healthz 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API Server HTTP (8081/healthz): OK"
            else
              echo "❌ API Server HTTP (8081/healthz): Failed ($HTTP_CODE)"
              failed=1
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Collection Server HTTP (8082/health): OK"
            else
              echo "❌ Collection Server HTTP (8082/health): Failed ($HTTP_CODE)"
              failed=1
            fi

            if [ "$failed" -ne 0 ]; then
              exit 1
            fi
            echo "=========================================="

  ping-serverd:
    name: ServerD Deploy Runner Check
    runs-on: ${{ vars.QS_DEPLOY_RUNNER || 'serverd' }}
    timeout-minutes: 10

    steps:
      - name: Configure runner network (proxy + GitHub SSH)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NETWORK_SCRIPT_REF: ${{ github.sha }}
        run: |
          org="${GITHUB_REPOSITORY%%/*}"
          get_var() {
            gh variable get "$1" --repo "$GITHUB_REPOSITORY" 2>/dev/null \
              || gh variable get "$1" --org "$org" 2>/dev/null \
              || true
          }
          for env_file in \
            "${HOME}/.env" \
            "/opt/actions-runner/runner1/.env" \
            "/opt/actions-runner/runner2/.env" \
            "/opt/actions-runner/runner3/.env"; do
            if [ -f "$env_file" ]; then
              set -a
              # shellcheck source=/dev/null
              . "$env_file"
              set +a
              break
            fi
          done
          HTTP_PROXY="${HTTP_PROXY:-$(get_var QS_DEPLOY_HTTP_PROXY)}"
          HTTP_PROXY="${HTTP_PROXY:-http://127.0.0.1:7890}"
          HTTPS_PROXY="${HTTPS_PROXY:-$(get_var QS_DEPLOY_HTTPS_PROXY)}"
          HTTPS_PROXY="${HTTPS_PROXY:-$HTTP_PROXY}"
          ALL_PROXY="${ALL_PROXY:-$(get_var QS_DEPLOY_ALL_PROXY)}"
          ALL_PROXY="${ALL_PROXY:-socks5://127.0.0.1:7891}"
          NO_PROXY="${NO_PROXY:-$(get_var QS_DEPLOY_NO_PROXY)}"
          NO_PROXY="${NO_PROXY:-127.0.0.1,localhost}"
          export HTTP_PROXY HTTPS_PROXY ALL_PROXY NO_PROXY
          curl -fsSL --proxy "${HTTP_PROXY}" \
            "https://raw.githubusercontent.com/FangcunMount/qs-server/${NETWORK_SCRIPT_REF}/scripts/cd/setup-runner-network.sh" \
            | bash

      - name: Runner and host info
        run: |
          echo "=========================================="
          echo "ServerD Self-Hosted Runner"
          echo "=========================================="
          echo "Runner name: ${{ runner.name }}"
          echo "Runner OS:   ${{ runner.os }}"
          echo "Runner arch: ${{ runner.arch }}"
          echo "Hostname:    $(hostname)"
          echo "Uptime:      $(uptime -p 2>/dev/null || uptime)"
          echo "Date:        $(date)"
          echo ""
          echo "Memory:"
          free -h | grep -E "Mem|Swap" || true
          echo ""
          echo "Disk (/ and /tmp):"
          df -h / /tmp 2>/dev/null | grep -E "^/dev/|^Filesystem"
          echo "=========================================="

      - name: Actions Runner service
        run: |
          echo "=========================================="
          echo "Actions Runner Service"
          echo "=========================================="
          if pgrep -f 'Runner.Listener' >/dev/null 2>&1; then
            echo "✅ Runner.Listener process is running"
            pgrep -af 'Runner.Listener' | head -3
          else
            echo "❌ Runner.Listener process not found"
            exit 1
          fi
          echo "=========================================="

      - name: Deploy tooling
        run: |
          echo "=========================================="
          echo "Deploy Tooling"
          echo "=========================================="
          missing=0
          for cmd in docker git make gzip ssh scp; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "✅ $cmd: $(command -v "$cmd")"
            else
              echo "❌ $cmd: not found"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if ! docker info >/dev/null 2>&1; then
            echo "❌ Docker daemon not accessible for runner user"
            exit 1
          fi
          echo "✅ Docker daemon reachable"
          echo "   Version: $(docker version --format '{{.Server.Version}}' 2>/dev/null || echo unknown)"
          echo "=========================================="

      - name: SSH reachability to ServerA
        env:
          RUNNER_SSH_KEY: ${{ secrets.SVRA_SSH_KEY }}
          RUNNER_SSH_HOST: ${{ vars.SVRA_HOST }}
          RUNNER_SSH_USER: ${{ vars.SVRA_USERNAME }}
          RUNNER_SSH_PORT: ${{ vars.SVRA_SSH_PORT || 22 }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          key_file=~/.ssh/runner_servera_key
          printf '%s\n' "$RUNNER_SSH_KEY" >"$key_file" && chmod 600 "$key_file"
          touch ~/.ssh/config && chmod 600 ~/.ssh/config
          if ! grep -q '^Host servera$' ~/.ssh/config; then
            {
              echo ""
              echo "Host servera"
              echo "  HostName ${RUNNER_SSH_HOST}"
              echo "  User ${RUNNER_SSH_USER}"
              echo "  Port ${RUNNER_SSH_PORT}"
              echo "  IdentityFile ${key_file}"
              echo "  StrictHostKeyChecking accept-new"
            } >> ~/.ssh/config
          fi
          ssh servera 'echo "✅ SSH to ServerA ($(hostname)) OK"'

      - name: SSH reachability to ServerB
        env:
          RUNNER_SSH_KEY: ${{ secrets.SVRB_SSH_KEY || secrets.SVRA_SSH_KEY }}
          RUNNER_SSH_HOST: ${{ vars.SVRB_HOST }}
          RUNNER_SSH_USER: ${{ vars.SVRB_USERNAME || vars.SVRA_USERNAME }}
          RUNNER_SSH_PORT: ${{ vars.SVRB_SSH_PORT || vars.SVRA_SSH_PORT || 22 }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          key_file=~/.ssh/runner_serverb_key
          printf '%s\n' "$RUNNER_SSH_KEY" >"$key_file" && chmod 600 "$key_file"
          touch ~/.ssh/config && chmod 600 ~/.ssh/config
          if ! grep -q '^Host serverb$' ~/.ssh/config; then
            {
              echo ""
              echo "Host serverb"
              echo "  HostName ${RUNNER_SSH_HOST}"
              echo "  User ${RUNNER_SSH_USER}"
              echo "  Port ${RUNNER_SSH_PORT}"
              echo "  IdentityFile ${key_file}"
              echo "  StrictHostKeyChecking accept-new"
            } >> ~/.ssh/config
          fi
          ssh serverb 'echo "✅ SSH to ServerB ($(hostname)) OK"'

      - name: Worker containers on ServerD
        run: |
          echo "=========================================="
          echo "Worker Containers (local)"
          echo "=========================================="
          if ! docker info >/dev/null 2>&1; then
            echo "❌ Docker not accessible"
            exit 1
          fi
          docker ps --filter "name=qs-worker" --format "table {{.Names}}\t{{.Status}}" || true
          running="$(docker ps --filter "name=qs-worker" --filter "status=running" -q | wc -l | tr -d ' ')"
          if [ "${running:-0}" -gt 0 ]; then
            echo "✅ ${running} worker container(s) running"
          else
            echo "⚠️  No running qs-worker containers (may be expected if not deployed)"
          fi
          echo "=========================================="

  report:
    name: Status Report
    needs: [ping-production, ping-serverd]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Report
        run: |
          echo "=========================================="
          echo "Ping Runner - Status Report"
          echo "=========================================="
          echo "Production (ServerA):  ${{ needs.ping-production.result }}"
          echo "ServerD deploy runner: ${{ needs.ping-serverd.result }}"
          echo "Time: $(date)"
          echo ""

          if [ "${{ needs.ping-production.result }}" != "success" ]; then
            echo "❌ Production check failed!"
            exit 1
          fi

          if [ "${{ needs.ping-serverd.result }}" != "success" ]; then
            echo "❌ ServerD runner check failed!"
            exit 1
          fi

          echo "✅ All checks passed"
          echo "=========================================="
