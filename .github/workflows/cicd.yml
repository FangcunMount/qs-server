                fi
              else
                if [ -n "$registry" ]; then
                  if $SUDO docker login "$registry" -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                else
                  if $SUDO docker login -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                fi
              fi
              rm -f "$token_file"
              return "$rc"
            }

            echo "=========================================="
            echo "Deploying ${CONTAINER_NAME}"
            echo "=========================================="

            # 目录准备
            $SUDO mkdir -p /opt/qs-server/${CONTAINER_NAME}/configs/env
            $SUDO mkdir -p /data/logs/qs-server/${CONTAINER_NAME}
            $SUDO mkdir -p /opt/backups/qs-server/${CONTAINER_NAME}

            # 备份
            BACKUP_DIR="/opt/backups/qs-server/${CONTAINER_NAME}"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if [ -d "/opt/qs-server/${CONTAINER_NAME}/configs" ] && [ "$(ls -A /opt/qs-server/${CONTAINER_NAME}/configs 2>/dev/null)" != "" ]; then
              $SUDO tar -czf "$BACKUP_DIR/backup_${TIMESTAMP}.tar.gz" \
                /opt/qs-server/${CONTAINER_NAME}/configs \
                2>/dev/null || echo "No previous backup"
            fi

            # 解包（使用服务专用的包名，避免并行部署冲突）
            PKG_PATH="/tmp/deploy-package-collection.tar.gz"
            if [ ! -f "$PKG_PATH" ]; then
              echo "❌ $PKG_PATH not found" >&2
              ls -al /tmp/deploy-package*.tar.gz 2>/dev/null || true
              exit 1
            fi

            DEPLOY_TMP="/tmp/qs-deploy-collection-$$"
            mkdir -p "$DEPLOY_TMP"
            tar -xzf "$PKG_PATH" -C "$DEPLOY_TMP"

            $SUDO rsync -a "$DEPLOY_TMP/configs/" /opt/qs-server/${CONTAINER_NAME}/configs/
            $SUDO chown -R "$APP_UID:$APP_GID" /opt/qs-server/${CONTAINER_NAME}/configs
            $SUDO chown -R "$APP_UID:$APP_GID" /data/logs/qs-server/${CONTAINER_NAME}

            # 网络（创建 qs-network，检查 infra-network）
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w qs-network > /dev/null 2>&1; then
              $SUDO docker network create qs-network
            fi
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w infra-network > /dev/null 2>&1; then
              echo "❌ infra-network not found. Please ensure infrastructure is deployed first."
              exit 1
            fi

            # collection-server 的公网 HTTPS 由 serverA Nginx 终止，serverB 只需要 gRPC mTLS。
            GRPC_CERT_DIR="/data/infra/ssl/grpc"

            if ! $SUDO test -d "$GRPC_CERT_DIR"; then
              echo "❌ gRPC certificate directory not found: $GRPC_CERT_DIR"
              exit 1
            fi
            GRPC_CA="$GRPC_CERT_DIR/ca/ca-chain.crt"
            GRPC_CRT="$GRPC_CERT_DIR/server/qs-collection-server.crt"
            GRPC_KEY="$GRPC_CERT_DIR/server/qs-collection-server.key"
            for f in "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"; do
              if ! $SUDO test -r "$f"; then
                echo "❌ Missing or unreadable gRPC mTLS file: $f"
                exit 1
              fi
            done
            $SUDO chown "$APP_UID:$APP_GID" "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"
            $SUDO chmod 0644 "$GRPC_CA" "$GRPC_CRT"
            $SUDO chmod 0640 "$GRPC_KEY"

            export DOCKER_IMAGE_QS_COLLECTION_SERVER="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}/${IMAGE_NAME}:latest"

            GHCR_LOGIN_OK=0
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              echo "Logging into GitHub Container Registry..."
              docker_login_with_token "$GHCR_USERNAME" "$GITHUB_TOKEN" "$DOCKER_REGISTRY" && GHCR_LOGIN_OK=1 || GHCR_LOGIN_OK=0
            fi

            if [ "$GHCR_LOGIN_OK" -ne 1 ]; then
              if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
                echo "⚠️ GHCR login failed; falling back to Docker Hub..."
                DOCKERHUB_LOGIN_OK=0
                docker_login_with_token "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" && DOCKERHUB_LOGIN_OK=1 || DOCKERHUB_LOGIN_OK=0
                if [ "$DOCKERHUB_LOGIN_OK" -ne 1 ]; then
                  echo "❌ Docker Hub login failed; verify DOCKERHUB_USERNAME/DOCKERHUB_TOKEN." >&2
                  exit 1
                fi
                export DOCKER_IMAGE_QS_COLLECTION_SERVER="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest"
              else
                echo "⚠️ GHCR login failed and Docker Hub credentials missing."
              fi
            fi

            # 停旧容器
            if $SUDO docker ps -a --format '{{.Names}}' | grep -w ${CONTAINER_NAME} > /dev/null 2>&1; then
              $SUDO docker stop ${CONTAINER_NAME} || true
              $SUDO docker rm ${CONTAINER_NAME} || true
            fi

            # 启动（使用 compose）
            cd /opt/qs-server/${CONTAINER_NAME}
            $SUDO docker compose -f "$DEPLOY_TMP/docker-compose.prod.yml" pull qs-collection-server
            $SUDO docker compose -f "$DEPLOY_TMP/docker-compose.prod.yml" up -d qs-collection-server

            # 健康检查：容器内访问内部端口，避免宿主端口误配置
            ATTEMPTS=0
            MAX_ATTEMPTS=60
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              if $SUDO docker exec ${CONTAINER_NAME} wget -qO- http://127.0.0.1:${INTERNAL_HTTP_PORT}/health >/dev/null 2>&1; then
                echo "✅ Health check passed"
                break
              fi
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; then
                echo "⏳ Health check attempt $ATTEMPTS/$MAX_ATTEMPTS, retrying..."
                sleep 5
              fi
            done

            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "❌ Service failed to start"
              $SUDO docker logs --tail 100 ${CONTAINER_NAME} || true
              exit 1
            fi

            # 清理旧备份
            $SUDO bash -c 'ls -t '"$BACKUP_DIR"'/backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f || true'

            rm -rf "$DEPLOY_TMP"
            rm -f /tmp/deploy-package-collection.tar.gz

            echo "✅ ${CONTAINER_NAME} deployed"

  deploy-worker:
    name: Deploy Worker
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.service == 'all' || github.event.inputs.service == 'worker'))
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
      WORKER_REPLICAS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.worker_replicas || vars.QS_WORKER_REPLICAS || '3' }}
      SERVICE_NAME: qs-worker
      IMAGE_NAME: qs-worker
      CONTAINER_NAME: qs-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GHCR auth on runner
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "🔐 Verifying GHCR access on runner..."
          echo "$GITHUB_TOKEN" | docker login "$DOCKER_REGISTRY" -u "$GHCR_USERNAME" --password-stdin >/dev/null
          echo "✅ GHCR login succeeded on runner"

      - name: Prepare deployment files
        env:
          MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
          MONGODB_PORT: ${{ secrets.MONGODB_PORT || 27017 }}
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          MONGODB_DBNAME: ${{ secrets.MONGODB_DBNAME }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT || 3306 }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          NSQ_NSQD_HOST: ${{ secrets.NSQ_NSQD_HOST }}
          NSQ_NSQD_PORT: ${{ secrets.NSQ_NSQD_PORT || 4150 }}
          NSQ_LOOKUPD_HOST: ${{ secrets.NSQ_LOOKUPD_HOST }}
          NSQ_LOOKUPD_PORT: ${{ secrets.NSQ_LOOKUPD_PORT || 4161 }}
          GRPC_APISERVER_ADDR: ${{ secrets.GRPC_APISERVER_ADDR || 'qs-apiserver:9090' }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || 6379 }}
          REDIS_DB: ${{ secrets.REDIS_DB || 0 }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          require_env() {
            local missing=0
            for var in "$@"; do
              if [ -z "${!var}" ]; then
                echo "❌ Missing required env: $var"
                missing=1
              fi
            done
            if [ $missing -ne 0 ]; then
              echo "❌ Required deployment envs are not set, abort."
              exit 1
            fi
          }

          require_env \
            MONGODB_HOST MONGODB_PORT MONGODB_USERNAME MONGODB_PASSWORD MONGODB_DBNAME \
            MYSQL_HOST MYSQL_PORT MYSQL_USERNAME MYSQL_PASSWORD MYSQL_DATABASE \
            NSQ_NSQD_HOST NSQ_NSQD_PORT NSQ_LOOKUPD_HOST NSQ_LOOKUPD_PORT \
            REDIS_HOST REDIS_PORT

          mkdir -p deploy-package/configs/env
          cp -r configs deploy-package/
          cp build/docker/docker-compose.prod.yml deploy-package/docker-compose.prod.yml

          cat > deploy-package/configs/env/config.prod.env <<'ENVEOF'
          # Auto-generated production environment configuration for QS Worker
          # MongoDB 分离参数配置（程序会自动拼接 URL）
          QS_WORKER_MONGODB_HOST=__MONGODB_HOST__
          QS_WORKER_MONGODB_USERNAME=__MONGODB_USERNAME__
          QS_WORKER_MONGODB_PASSWORD=__MONGODB_PASSWORD__
          QS_WORKER_MONGODB_DATABASE=__MONGODB_DATABASE__

          QS_WORKER_MYSQL_HOST=__MYSQL_HOST__
          QS_WORKER_MYSQL_USERNAME=__MYSQL_USERNAME__
          QS_WORKER_MYSQL_PASSWORD=__MYSQL_PASSWORD__
          QS_WORKER_MYSQL_DATABASE=__MYSQL_DATABASE__

          QS_WORKER_MESSAGING_PROVIDER=nsq
          QS_WORKER_MESSAGING_NSQ_ADDR=__NSQ_ADDR__
          QS_WORKER_MESSAGING_NSQ_LOOKUPD_ADDR=__NSQ_LOOKUPD_ADDR__

          QS_WORKER_GRPC_APISERVER_ADDR=__GRPC_APISERVER_ADDR__

          # Redis（单实例）
          QS_WORKER_REDIS_HOST=__REDIS_HOST__
          QS_WORKER_REDIS_PORT=__REDIS_PORT__
          QS_WORKER_REDIS_USERNAME=__REDIS_USERNAME__
          QS_WORKER_REDIS_PASSWORD=__REDIS_PASSWORD__
          QS_WORKER_REDIS_DB=__REDIS_DB__
          ENVEOF

          # 去除前导空格并替换占位符为实际值
          sed -i 's/^[[:space:]]*//' deploy-package/configs/env/config.prod.env
          # MongoDB 分离参数（HOST 格式为 host:port，不需要额外拼接端口）
          sed -i "s|__MONGODB_HOST__|${MONGODB_HOST}:${MONGODB_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MONGODB_USERNAME__|${MONGODB_USERNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MONGODB_PASSWORD__|${MONGODB_PASSWORD}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MONGODB_DATABASE__|${MONGODB_DBNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_HOST__|${MYSQL_HOST}:${MYSQL_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_USERNAME__|${MYSQL_USERNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_PASSWORD__|${MYSQL_PASSWORD}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_DATABASE__|${MYSQL_DATABASE}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__NSQ_ADDR__|${NSQ_NSQD_HOST}:${NSQ_NSQD_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__NSQ_LOOKUPD_ADDR__|${NSQ_LOOKUPD_HOST}:${NSQ_LOOKUPD_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__GRPC_APISERVER_ADDR__|${GRPC_APISERVER_ADDR}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_HOST__|${REDIS_HOST}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_PORT__|${REDIS_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_USERNAME__|${REDIS_USERNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_PASSWORD__|${REDIS_PASSWORD}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_DB__|${REDIS_DB}|g" deploy-package/configs/env/config.prod.env

          echo "=========================================="
          echo "📋 Generated config.prod.env for Worker"
          echo "=========================================="
          cat deploy-package/configs/env/config.prod.env | sed 's/PASSWORD=.*/PASSWORD=***REDACTED***/g'
          echo "=========================================="

          tar -czf deploy-package-worker.tar.gz -C deploy-package .

      - name: Upload deployment package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SVRD_HOST }}
          username: ${{ secrets.SVRD_USERNAME || secrets.SVRA_USERNAME }}
          key: ${{ secrets.SVRD_SSH_KEY || secrets.SVRA_SSH_KEY }}
          port: ${{ secrets.SVRD_SSH_PORT || secrets.SVRA_SSH_PORT || 22 }}
          source: "deploy-package-worker.tar.gz"
          target: "/tmp"

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SUDO_PASSWORD: ${{ secrets.SVRD_SUDO_PASSWORD || secrets.SVRA_SUDO_PASSWORD }}
          WWW_UID: ${{ env.WWW_UID }}
          WWW_GID: ${{ env.WWW_GID }}
          WORKER_REPLICAS: ${{ env.WORKER_REPLICAS }}
        with:
          host: ${{ secrets.SVRD_HOST }}
          username: ${{ secrets.SVRD_USERNAME || secrets.SVRA_USERNAME }}
          key: ${{ secrets.SVRD_SSH_KEY || secrets.SVRA_SSH_KEY }}
          port: ${{ secrets.SVRD_SSH_PORT || secrets.SVRA_SSH_PORT || 22 }}
          envs: DOCKER_REGISTRY,DOCKER_REPOSITORY,IMAGE_NAME,CONTAINER_NAME,GHCR_USERNAME,GITHUB_TOKEN,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SUDO_PASSWORD,WWW_UID,WWW_GID,WORKER_REPLICAS
          script: |
            set -Eeuo pipefail

            : "${WWW_UID:?WWW_UID secret is required}"
            : "${WWW_GID:?WWW_GID secret is required}"
            APP_UID="${WWW_UID}"
            APP_GID="${WWW_GID}"

            # SUDO 助手
            if sudo -n true 2>/dev/null; then
              SUDO="sudo"
            else
              if [ -z "${SUDO_PASSWORD:-}" ]; then
                echo "❌ sudo needs password." >&2
                exit 1
              fi
              sudo_pw() { sudo -S "$@" <<<"$SUDO_PASSWORD"; }
              export -f sudo_pw
              SUDO="sudo_pw"
              $SUDO -v || true
            fi

            if [ "$SUDO" = "sudo_pw" ]; then
              SUDO_ASKPASS_SCRIPT="$(mktemp)"
              printf '%s\n' '#!/bin/sh' 'printf '\''%s\n'\'' "$SUDO_PASSWORD"' >"$SUDO_ASKPASS_SCRIPT"
              chmod 700 "$SUDO_ASKPASS_SCRIPT"
            fi

            cleanup_auth_helpers() {
              if [ -n "${SUDO_ASKPASS_SCRIPT:-}" ]; then
                rm -f "$SUDO_ASKPASS_SCRIPT"
              fi
            }
            trap cleanup_auth_helpers EXIT

            docker_login_with_token() {
              local username="$1"
              local token="$2"
              local registry="${3:-}"
              local token_file rc
              token_file="$(mktemp)"
              chmod 600 "$token_file"
              printf '%s' "$token" >"$token_file"
              rc=1
              if [ "$SUDO" = "sudo_pw" ]; then
                if [ -n "$registry" ]; then
                  if SUDO_ASKPASS="$SUDO_ASKPASS_SCRIPT" sudo -A docker login "$registry" -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                else
                  if SUDO_ASKPASS="$SUDO_ASKPASS_SCRIPT" sudo -A docker login -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                fi
              else
                if [ -n "$registry" ]; then
                  if $SUDO docker login "$registry" -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                else
                  if $SUDO docker login -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                fi
              fi
              rm -f "$token_file"
              return "$rc"
            }

            # 目录准备
            $SUDO mkdir -p /opt/qs-server/${CONTAINER_NAME}/configs/env
            $SUDO mkdir -p /data/logs/qs-server/${CONTAINER_NAME}
            $SUDO mkdir -p /opt/backups/qs-server/${CONTAINER_NAME}

            # 备份
            BACKUP_DIR="/opt/backups/qs-server/${CONTAINER_NAME}"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if [ -d "/opt/qs-server/${CONTAINER_NAME}/configs" ] && [ "$(ls -A /opt/qs-server/${CONTAINER_NAME}/configs 2>/dev/null)" != "" ]; then
              $SUDO tar -czf "$BACKUP_DIR/backup_${TIMESTAMP}.tar.gz" \
                /opt/qs-server/${CONTAINER_NAME}/configs \
                2>/dev/null || echo "No previous backup"
            fi

            # 解包（使用服务专用的包名，避免并行部署冲突）
            PKG_PATH="/tmp/deploy-package-worker.tar.gz"
            if [ ! -f "$PKG_PATH" ]; then
              echo "❌ $PKG_PATH not found" >&2
              ls -al /tmp/deploy-package*.tar.gz 2>/dev/null || true
              exit 1
            fi

            DEPLOY_TMP="/tmp/qs-deploy-worker-$$"
            mkdir -p "$DEPLOY_TMP"
            tar -xzf "$PKG_PATH" -C "$DEPLOY_TMP"

            $SUDO rsync -a "$DEPLOY_TMP/configs/" /opt/qs-server/${CONTAINER_NAME}/configs/
            $SUDO chown -R "$APP_UID:$APP_GID" /opt/qs-server/${CONTAINER_NAME}/configs
            $SUDO chown -R "$APP_UID:$APP_GID" /data/logs/qs-server/${CONTAINER_NAME}

            echo "=========================================="
            echo "Deploying ${CONTAINER_NAME} (replicas=${WORKER_REPLICAS})"
            echo "=========================================="

            if ! [[ "${WORKER_REPLICAS}" =~ ^[0-9]+$ ]] || [ "${WORKER_REPLICAS}" -lt 1 ]; then
              echo "❌ WORKER_REPLICAS must be a positive integer, got: ${WORKER_REPLICAS}" >&2
              exit 1
            fi

            # 网络（创建 qs-network，检查 infra-network）
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w qs-network > /dev/null 2>&1; then
              $SUDO docker network create qs-network
            fi
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w infra-network > /dev/null 2>&1; then
              echo "❌ infra-network not found. Please ensure infrastructure is deployed first."
              exit 1
            fi

            # Worker 只需要 gRPC mTLS，不需要 serverA 公网 TLS 证书。
            GRPC_CERT_DIR="/data/infra/ssl/grpc"
            if ! $SUDO test -d "$GRPC_CERT_DIR"; then
              echo "❌ gRPC certificate directory not found: $GRPC_CERT_DIR"
              exit 1
            fi
            GRPC_CA="$GRPC_CERT_DIR/ca/ca-chain.crt"
            GRPC_CRT="$GRPC_CERT_DIR/server/qs-worker.crt"
            GRPC_KEY="$GRPC_CERT_DIR/server/qs-worker.key"
            for f in "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"; do
              if ! $SUDO test -r "$f"; then
                echo "❌ Missing or unreadable gRPC mTLS file: $f"
                exit 1
              fi
            done
            $SUDO chown "$APP_UID:$APP_GID" "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"
            $SUDO chmod 0644 "$GRPC_CA" "$GRPC_CRT"
            $SUDO chmod 0640 "$GRPC_KEY"

            export DOCKER_IMAGE_QS_WORKER="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}/${IMAGE_NAME}:latest"

            GHCR_LOGIN_OK=0
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              echo "Logging into GitHub Container Registry..."
              docker_login_with_token "$GHCR_USERNAME" "$GITHUB_TOKEN" "$DOCKER_REGISTRY" && GHCR_LOGIN_OK=1 || GHCR_LOGIN_OK=0
            fi

            if [ "$GHCR_LOGIN_OK" -ne 1 ]; then
              if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
                echo "⚠️ GHCR login failed; falling back to Docker Hub..."
                DOCKERHUB_LOGIN_OK=0
                docker_login_with_token "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" && DOCKERHUB_LOGIN_OK=1 || DOCKERHUB_LOGIN_OK=0
                if [ "$DOCKERHUB_LOGIN_OK" -ne 1 ]; then
                  echo "❌ Docker Hub login failed; verify DOCKERHUB_USERNAME/DOCKERHUB_TOKEN." >&2
                  exit 1
                fi
                export DOCKER_IMAGE_QS_WORKER="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest"
              else
                echo "⚠️ GHCR login failed and Docker Hub credentials missing."
              fi
            fi

            # 清理历史遗留 worker 容器：
            # 1. 旧的单实例容器名：qs-worker
            # 2. 之前临时 compose project 生成的容器：qs-deploy-worker-<runid>-qs-worker-*
            echo "Cleaning up legacy worker containers..."
            LEGACY_WORKERS=$($SUDO docker ps -a --format '{{.ID}} {{.Names}}' | awk '$2 == "qs-worker" || $2 ~ /^qs-deploy-worker-[0-9]+-qs-worker-[0-9]+$/ {print $1}')
            if [ -n "${LEGACY_WORKERS}" ]; then
              echo "${LEGACY_WORKERS}" | xargs -r $SUDO docker rm -f
            fi

            # 启动（使用 compose 扩到多个 worker 实例）
            cd /opt/qs-server/${CONTAINER_NAME}
            $SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" pull qs-worker
            $SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" up -d --scale qs-worker="${WORKER_REPLICAS}" qs-worker

            # Worker 无 HTTP 健康检查，检查容器是否正常运行
            echo "Waiting for container to start..."
            sleep 10

            RUNNING_COUNT=$($SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" ps --status running -q qs-worker | wc -l | tr -d ' ')

            if [ "${RUNNING_COUNT}" -ge "${WORKER_REPLICAS}" ]; then
              echo "✅ Worker replicas are running (${RUNNING_COUNT}/${WORKER_REPLICAS})"
              $SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" ps qs-worker
              FIRST_WORKER=$($SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" ps -q qs-worker | head -n1)
              if [ -z "${FIRST_WORKER}" ]; then
                echo "❌ No running worker container found for connectivity check"
                exit 1
              fi
              echo "⏳ Verifying worker can resolve and reach qs-apiserver:9090 ..."
              READY=0
              for _ in $(seq 1 20); do
                if $SUDO docker exec "${FIRST_WORKER}" sh -lc 'getent hosts qs-apiserver >/dev/null 2>&1 && nc -z qs-apiserver 9090 >/dev/null 2>&1'; then
                  READY=1
                  break
                fi
                sleep 3
              done
              if [ "${READY}" -ne 1 ]; then
                echo "❌ Worker cannot resolve or reach qs-apiserver:9090 from inside container"
                $SUDO docker exec "${FIRST_WORKER}" sh -lc 'echo "--- /etc/resolv.conf ---"; cat /etc/resolv.conf; echo "--- getent ---"; getent hosts qs-apiserver || true; echo "--- nc ---"; nc -vz qs-apiserver 9090 || true'
                $SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" logs --tail 100 qs-worker || true
                exit 1
              fi
              echo "✅ Worker can resolve and reach qs-apiserver:9090"
              echo "📋 Recent logs (all worker replicas):"
              $SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" logs --tail 20 qs-worker
            else
              echo "❌ Worker replicas failed to reach expected count (${RUNNING_COUNT}/${WORKER_REPLICAS})"
              $SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" ps qs-worker || true
              $SUDO docker compose -p qs-worker -f "$DEPLOY_TMP/docker-compose.prod.yml" logs --tail 100 qs-worker || true
              exit 1
            fi

            # 清理旧备份
            $SUDO bash -c 'ls -t '"$BACKUP_DIR"'/backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f || true'

            echo "✅ ${CONTAINER_NAME} deployed"

            rm -rf "$DEPLOY_TMP"
            rm -f /tmp/deploy-package-worker.tar.gz

  # ==========================================================================
  # 5) 总体通知 —— 把 skipped 也视为 OK，支持「只部署部分服务」
  # ==========================================================================

  notify:
    name: Send Notification
    needs: [deploy-apiserver, deploy-collection, deploy-worker]
    runs-on: ubuntu-latest
    if: |
      always() && (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Log deployment status
        run: |
          echo "=========================================="
          echo "Deployment Summary"
          echo "=========================================="
          echo "API Server: ${{ needs.deploy-apiserver.result }}"
          echo "Collection Server: ${{ needs.deploy-collection.result }}"
          echo "Worker: ${{ needs.deploy-worker.result }}"

          ok() {
            [ "$1" = "success" ] || [ "$1" = "skipped" ]
          }

          if ok "${{ needs.deploy-apiserver.result }}" &&
             ok "${{ needs.deploy-collection.result }}" &&
             ok "${{ needs.deploy-worker.result }}"; then
            echo "✅ All deployments succeeded or were skipped by design"
          else
            echo "❌ Some deployments failed"
            exit 1
          fi
