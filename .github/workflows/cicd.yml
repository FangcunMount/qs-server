      HTTPS_PORT: 9446
      INTERNAL_HTTP_PORT: 8080
      INTERNAL_HTTPS_PORT: 8443
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GHCR auth on runner
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "🔐 Verifying GHCR access on runner..."
          echo "$GITHUB_TOKEN" | docker login "$DOCKER_REGISTRY" -u "$GHCR_USERNAME" --password-stdin >/dev/null
          echo "✅ GHCR login succeeded on runner"

      - name: Prepare deployment files
        env:
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
