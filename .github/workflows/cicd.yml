          # Redis（单实例）
          COLLECTION_SERVER_REDIS_HOST=__REDIS_HOST__
          COLLECTION_SERVER_REDIS_PORT=__REDIS_PORT__
          COLLECTION_SERVER_REDIS_USERNAME=__REDIS_USERNAME__
          COLLECTION_SERVER_REDIS_PASSWORD=__REDIS_PASSWORD__
          COLLECTION_SERVER_REDIS_DB=__REDIS_DB__

          COLLECTION_SERVER_JWT_SECRET=__JWT_SECRET__
