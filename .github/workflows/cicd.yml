name: CI/CD Pipeline

# ============================================================================
# 必需的 Secrets 配置
# ============================================================================
# Organization Secrets (组织级别，共享配置):
#   SVRA_HOST (serverA: qs-apiserver)
#   SVRB_HOST (serverB: qs-collection-server)
#   SVRD_HOST (serverD: qs-worker)
#   SVRA_USERNAME, SVRA_SSH_KEY, SVRA_SSH_PORT
#   SVRB_USERNAME/SVRB_SSH_KEY/SVRB_SSH_PORT 可选，缺省复用 SVRA_*
#   SVRD_USERNAME/SVRD_SSH_KEY/SVRD_SSH_PORT 可选，缺省复用 SVRA_*
#   SVRA/SVRB/SVRD_SUDO_PASSWORD (可选，如果 sudo 需要密码)
#   MONGODB_HOST, MONGODB_PORT
#   MYSQL_HOST, MYSQL_PORT (Worker 使用)
#   REDIS_HOST, REDIS_PORT
#   NSQ_NSQD_HOST, NSQ_NSQD_PORT, NSQ_LOOKUPD_HOST, NSQ_LOOKUPD_PORT
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#
# Repository Secrets (仓库级别，敏感信息):
#   MONGODB_USERNAME, MONGODB_PASSWORD, MONGODB_DBNAME
#   MYSQL_USERNAME, MYSQL_PASSWORD, MYSQL_DATABASE (Worker 使用)
#   REDIS_PORT/DB/USERNAME/PASSWORD
#   JWT_SECRET
#   OSS_ACCESS_KEY_ID, OSS_ACCESS_KEY_SECRET, OSS_SESSION_TOKEN（可选，apiserver 二维码 OSS）
#   GRPC_APISERVER_ADDR (可选，默认 qs-apiserver:9090)
#   WWW_UID, WWW_GID（与宿主机运行用户一致，部署时 chown TLS 与 configs；镜像 RUN_UID 与之一致）
#   部署拉 ghcr：与 iam-contracts 一致保留 GITHUB_TOKEN 方案，但 runner/远端统一用 github.actor 登录；
#   sudo 需密码时用 printf 先喂 sudo 密码再喂 token（见 deploy 脚本）。GHCR 失败时可回退 Docker Hub。
# ============================================================================

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      service:
        description: '要部署的服务'
        required: true
        type: choice
        options:
          - all
          - apiserver
          - collection
          - worker
      worker_replicas:
        description: 'Worker 副本数（留空则读取 QS_WORKER_REPLICAS，缺失时默认为 3）'
        required: false
        type: string
        default: ''
      docs_verify:
        description: '运行文档校验 (docs-verify)'
        required: false
        type: boolean
        default: false

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_REPOSITORY: fangcunmount
  GO_VERSION: '1.25.9'
  GOTOOLCHAIN: auto
  DOCS_VERIFY: 'false' # 需要文档校验时设为 'true'（例如 workflow_dispatch 手动触发）

jobs:
  # ==========================================================================
  # 1) 校验 Secrets（只在 main 上严格要求）
  # ==========================================================================

  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Required Secrets
        env:
          SVRA_HOST: ${{ secrets.SVRA_HOST }}
          SVRB_HOST: ${{ secrets.SVRB_HOST }}
          SVRD_HOST: ${{ secrets.SVRD_HOST }}
          SVRA_USERNAME: ${{ secrets.SVRA_USERNAME }}
          SVRA_SSH_KEY: ${{ secrets.SVRA_SSH_KEY }}
          SVRB_USERNAME: ${{ secrets.SVRB_USERNAME }}
          SVRB_SSH_KEY: ${{ secrets.SVRB_SSH_KEY }}
          SVRD_USERNAME: ${{ secrets.SVRD_USERNAME }}
          SVRD_SSH_KEY: ${{ secrets.SVRD_SSH_KEY }}
          MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          MONGODB_DBNAME: ${{ secrets.MONGODB_DBNAME }}
          MONGODB_PORT: ${{ secrets.MONGODB_PORT }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          # 兼容两种命名：优先 MYSQL_DATABASE，其次 MYSQL_DBNAME
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE != '' && secrets.MYSQL_DATABASE || secrets.MYSQL_DBNAME }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_DB: ${{ secrets.REDIS_DB }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          NSQ_NSQD_HOST: ${{ secrets.NSQ_NSQD_HOST }}
          NSQ_NSQD_PORT: ${{ secrets.NSQ_NSQD_PORT }}
          NSQ_LOOKUPD_HOST: ${{ secrets.NSQ_LOOKUPD_HOST }}
          NSQ_LOOKUPD_PORT: ${{ secrets.NSQ_LOOKUPD_PORT }}
          SVRA_SSH_PORT: ${{ secrets.SVRA_SSH_PORT }}
          SVRB_SSH_PORT: ${{ secrets.SVRB_SSH_PORT }}
          SVRD_SSH_PORT: ${{ secrets.SVRD_SSH_PORT }}
          SVRA_SUDO_PASSWORD: ${{ secrets.SVRA_SUDO_PASSWORD }}
          SVRB_SUDO_PASSWORD: ${{ secrets.SVRB_SUDO_PASSWORD }}
          SVRD_SUDO_PASSWORD: ${{ secrets.SVRD_SUDO_PASSWORD }}
          WWW_UID: ${{ secrets.WWW_UID }}
          WWW_GID: ${{ secrets.WWW_GID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_SESSION_TOKEN: ${{ secrets.OSS_SESSION_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "🔍 Validating GitHub Action secrets..."
          VALIDATION_FAILED=0
          ENFORCE_REQUIRED=0

          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENFORCE_REQUIRED=1
            echo "📋 Checking required secrets for main branch deployment..."
          else
            echo "ℹ️ Not on main branch – required secrets reported for awareness only."
          fi

          REQUIRED_SECRETS=(SVRA_HOST SVRB_HOST SVRD_HOST SVRA_USERNAME SVRA_SSH_KEY MONGODB_HOST MONGODB_USERNAME MONGODB_PASSWORD MONGODB_DBNAME MYSQL_HOST MYSQL_USERNAME MYSQL_PASSWORD MYSQL_DATABASE REDIS_HOST JWT_SECRET OSS_ACCESS_KEY_ID OSS_ACCESS_KEY_SECRET NSQ_NSQD_HOST NSQ_LOOKUPD_HOST DOCKERHUB_USERNAME DOCKERHUB_TOKEN WWW_UID WWW_GID)
          OPTIONAL_SECRETS=(SVRA_SSH_PORT SVRB_USERNAME SVRB_SSH_KEY SVRB_SSH_PORT SVRD_USERNAME SVRD_SSH_KEY SVRD_SSH_PORT SVRA_SUDO_PASSWORD SVRB_SUDO_PASSWORD SVRD_SUDO_PASSWORD MONGODB_PORT MYSQL_PORT REDIS_PORT REDIS_DB REDIS_USERNAME REDIS_PASSWORD NSQ_NSQD_PORT NSQ_LOOKUPD_PORT OSS_SESSION_TOKEN)

          for SECRET_NAME in "${REQUIRED_SECRETS[@]}"; do
            VALUE=${!SECRET_NAME}
            if [ -n "$VALUE" ]; then
              echo "✅ $SECRET_NAME is set"
            else
              if [ $ENFORCE_REQUIRED -eq 1 ]; then
                echo "❌ $SECRET_NAME is not set"
                VALIDATION_FAILED=1
              else
                echo "⚠️ $SECRET_NAME is not set (required when deploying main)"
              fi
            fi
          done

          echo ""
          echo "📎 Checking optional secrets (warnings only)..."
          for SECRET_NAME in "${OPTIONAL_SECRETS[@]}"; do
            VALUE=${!SECRET_NAME}
            if [ -n "$VALUE" ]; then
              echo "✅ $SECRET_NAME is set"
            else
              case "$SECRET_NAME" in
                SVRA_SUDO_PASSWORD)
                  echo "⚠️ $SECRET_NAME is not set (needed only if sudo prompts for a password)"
                  ;;
                MONGODB_PORT)
                  echo "⚠️ $SECRET_NAME is not set (defaults to 27017)"
                  ;;
                REDIS_PORT)
                  echo "⚠️ $SECRET_NAME is not set (redis defaults to 6379)"
                  ;;
                REDIS_DB)
                  echo "⚠️ $SECRET_NAME is not set (redis defaults to DB 0)"
                  ;;
                REDIS_USERNAME)
                  echo "⚠️ $SECRET_NAME is not set (redis uses default user)"
                  ;;
                REDIS_PASSWORD)
                  echo "⚠️ $SECRET_NAME is not set (redis auth disabled)"
                  ;;
                NSQ_NSQD_PORT|NSQ_LOOKUPD_PORT)
                  echo "⚠️ $SECRET_NAME is not set (NSQ may be optional)"
                  ;;
                *)
                  echo "⚠️ $SECRET_NAME is not set (optional)"
                  ;;
              esac
            fi
          done

          echo ""
          if [ $ENFORCE_REQUIRED -eq 1 ] && [ $VALIDATION_FAILED -eq 1 ]; then
            echo "❌ Secrets validation failed for main branch! Please configure the missing required secrets."
            exit 1
          else
            echo "✅ Required secrets look good (or not enforced for this branch)."
          fi

  # ==========================================================================
  # 2) Test / Lint / Build —— 跑在 GitHub 托管 runner 上
  # ==========================================================================

  test:
    name: Run Tests
    needs: [validate-secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true
      
      - name: Get dependencies
        run: |
          go mod download
          go mod verify
      
      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      
      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Lint Code
    needs: [validate-secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true
      
      - name: Install dependencies
        run: |
          go mod download

      - name: Install golangci-lint
        run: |
          GOBIN="$(pwd)/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: |
          make fmt-check
      
      - name: Run make lint
        run: |
          make lint

  security:
    name: Security Scan (Advisory)
    needs: [validate-secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Download dependencies
        run: |
          go mod download

      - name: Install security tools
        run: |
          make install-security-tools

      - name: Run govulncheck (advisory)
        continue-on-error: true
        run: |
          make security-govulncheck-ci

      - name: Run gosec (advisory)
        continue-on-error: true
        run: |
          make security-gosec-ci

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: tmp/security/
          retention-days: 7

  maintainability:
    name: Maintainability Scan (Advisory)
    needs: [validate-secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Download dependencies
        run: |
          go mod download

      - name: Install golangci-lint
        run: |
          GOBIN="$(pwd)/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Run maintainability advisory
        continue-on-error: true
        run: |
          make maintainability-lint-ci

      - name: Upload maintainability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainability-reports
          path: tmp/maintainability/
          retention-days: 7

  tier1-test-policy:
    name: Tier 1 Test Policy
    needs: [validate-secrets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Tier 1 package policy
        run: |
          make tier1-test-policy

  docs:
    name: Docs & API Sync
    needs: [validate-secrets]
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.docs_verify) || (github.event_name != 'workflow_dispatch' && vars.DOCS_VERIFY == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Install PyYAML
        run: |
          python -m pip install --quiet pyyaml

      - name: Install swagger toolchain
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Download dependencies
        run: |
          go mod download

      - name: Verify docs locally (make docs-verify)
        run: |
          make docs-verify

      - name: Ensure no doc drift
        run: |
          git diff --exit-code

  build:
    name: Build Applications
    needs: [test, lint, tier1-test-policy]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [apiserver, collection, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true
      
      - name: Build ${{ matrix.service }}
        run: |
          make build-${{ matrix.service }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qs-${{ matrix.service }}
          path: bin/*
          retention-days: 7

  # ==========================================================================
  # 3) 构建 Docker 镜像 —— 继续用 Linux runner，因为用了 docker/* action
  # ==========================================================================

  docker:
    name: Build Docker Images
    needs: [build]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch')
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [apiserver, collection, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate runtime UID/GID
        run: |
          : "${WWW_UID:?WWW_UID secret is required}"
          : "${WWW_GID:?WWW_GID secret is required}"
          case "${WWW_UID}:${WWW_GID}" in
            *[!0-9:]*|:*|*:|"")
              echo "WWW_UID/WWW_GID must be numeric" >&2
              exit 1
              ;;
          esac
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set image metadata
        id: meta
        run: |
          if [ "${{ matrix.service }}" = "apiserver" ]; then
            echo "image_name=qs-apiserver" >> $GITHUB_OUTPUT
            echo "dockerfile=build/docker/Dockerfile.qs-apiserver" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.service }}" = "worker" ]; then
            echo "image_name=qs-worker" >> $GITHUB_OUTPUT
            echo "dockerfile=build/docker/Dockerfile.qs-worker" >> $GITHUB_OUTPUT
          else
            echo "image_name=qs-collection-server" >> $GITHUB_OUTPUT
            echo "dockerfile=build/docker/Dockerfile.collection-server" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ steps.meta.outputs.image_name }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ steps.meta.outputs.image_name }}:${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            RUN_UID=${{ env.WWW_UID }}
            RUN_GID=${{ env.WWW_GID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Tag and push to Docker Hub
        run: |
          IMAGE_NAME=${{ steps.meta.outputs.image_name }}
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${IMAGE_NAME}:latest
          docker tag ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${IMAGE_NAME}:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest
          docker tag ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${IMAGE_NAME}:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${{ github.sha }}
          echo "✅ 镜像已推送到 Docker Hub:"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${{ github.sha }}"

  # ==========================================================================
  # 4) 部署 API Server / Collection Server / Worker —— 仍然在 Linux 上跑
  #    支持：push main 全量部署；workflow_dispatch 只部署指定 service
  # ==========================================================================

  deploy-apiserver:
    name: Deploy API Server
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.service == 'all' || github.event.inputs.service == 'apiserver'))
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
      SERVICE_NAME: qs-apiserver
      IMAGE_NAME: qs-apiserver
      CONTAINER_NAME: qs-apiserver
      HTTP_PORT: 8081
      HTTPS_PORT: 9445
      INTERNAL_HTTP_PORT: 8080
      INTERNAL_HTTPS_PORT: 8443
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GHCR auth on runner
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "🔐 Verifying GHCR access on runner..."
          echo "$GITHUB_TOKEN" | docker login "$DOCKER_REGISTRY" -u "$GHCR_USERNAME" --password-stdin >/dev/null
          echo "✅ GHCR login succeeded on runner"

      - name: Prepare deployment files
        env:
          MONGODB_HOST: ${{ secrets.MONGODB_HOST }}
          MONGODB_PORT: ${{ secrets.MONGODB_PORT || 27017 }}
          MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          MONGODB_DBNAME: ${{ secrets.MONGODB_DBNAME }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT || 3306 }}
          MYSQL_USERNAME: ${{ secrets.MYSQL_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          # 兼容两种命名：优先 MYSQL_DATABASE，其次 MYSQL_DBNAME
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE != '' && secrets.MYSQL_DATABASE || secrets.MYSQL_DBNAME }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT || 6379 }}
          REDIS_DB: ${{ secrets.REDIS_DB || 0 }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NSQ_NSQD_HOST: ${{ secrets.NSQ_NSQD_HOST }}
          NSQ_NSQD_PORT: ${{ secrets.NSQ_NSQD_PORT || 4150 }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_SESSION_TOKEN: ${{ secrets.OSS_SESSION_TOKEN }}
        run: |
          require_env() {
            local missing=0
            for var in "$@"; do
              if [ -z "${!var}" ]; then
                echo "❌ Missing required env: $var"
                missing=1
              fi
            done
            if [ $missing -ne 0 ]; then
              echo "❌ Required deployment envs are not set, abort."
              exit 1
            fi
          }

          require_env \
            MONGODB_HOST MONGODB_PORT MONGODB_USERNAME MONGODB_PASSWORD MONGODB_DBNAME \
            MYSQL_HOST MYSQL_PORT MYSQL_USERNAME MYSQL_PASSWORD MYSQL_DATABASE \
            REDIS_HOST REDIS_PORT \
            JWT_SECRET NSQ_NSQD_HOST NSQ_NSQD_PORT \
            OSS_ACCESS_KEY_ID OSS_ACCESS_KEY_SECRET

          mkdir -p deploy-package/configs/env
          cp -r configs deploy-package/
          cp build/docker/docker-compose.prod.yml deploy-package/docker-compose.prod.yml

          cat > deploy-package/configs/env/config.prod.env <<'ENVEOF'
          # Auto-generated production environment configuration for QS API Server
          # MongoDB 分离参数配置（程序会自动拼接 URL）
          QS_APISERVER_MONGODB_HOST=__MONGODB_HOST__
          QS_APISERVER_MONGODB_USERNAME=__MONGODB_USERNAME__
          QS_APISERVER_MONGODB_PASSWORD=__MONGODB_PASSWORD__
          QS_APISERVER_MONGODB_DATABASE=__MONGODB_DATABASE__

          QS_APISERVER_MYSQL_HOST=__MYSQL_HOST__
          QS_APISERVER_MYSQL_USERNAME=__MYSQL_USERNAME__
          QS_APISERVER_MYSQL_PASSWORD=__MYSQL_PASSWORD__
          QS_APISERVER_MYSQL_DATABASE=__MYSQL_DATABASE__

          # Redis（单实例）
          QS_APISERVER_REDIS_HOST=__REDIS_HOST__
          QS_APISERVER_REDIS_PORT=__REDIS_PORT__
          QS_APISERVER_REDIS_USERNAME=__REDIS_USERNAME__
          QS_APISERVER_REDIS_PASSWORD=__REDIS_PASSWORD__
          QS_APISERVER_REDIS_DB=__REDIS_DB__

          QS_APISERVER_JWT_SECRET=__JWT_SECRET__

          QS_APISERVER_NSQ_NSQD_HOST=__NSQ_NSQD_HOST__
          QS_APISERVER_NSQ_NSQD_PORT=__NSQ_NSQD_PORT__

          QS_APISERVER_OSS_ACCESS_KEY_ID=__OSS_ACCESS_KEY_ID__
          QS_APISERVER_OSS_ACCESS_KEY_SECRET=__OSS_ACCESS_KEY_SECRET__
          QS_APISERVER_OSS_SESSION_TOKEN=__OSS_SESSION_TOKEN__
          ENVEOF

          # 去除前导空格并替换占位符为实际值
          sed -i 's/^[[:space:]]*//' deploy-package/configs/env/config.prod.env
          # MongoDB 分离参数（HOST 格式为 host:port，不需要额外拼接端口）
          sed -i "s|__MONGODB_HOST__|${MONGODB_HOST}:${MONGODB_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MONGODB_USERNAME__|${MONGODB_USERNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MONGODB_PASSWORD__|${MONGODB_PASSWORD}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MONGODB_DATABASE__|${MONGODB_DBNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_HOST__|${MYSQL_HOST}:${MYSQL_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_USERNAME__|${MYSQL_USERNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_PASSWORD__|${MYSQL_PASSWORD}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__MYSQL_DATABASE__|${MYSQL_DATABASE}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_HOST__|${REDIS_HOST}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_PORT__|${REDIS_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_USERNAME__|${REDIS_USERNAME}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_PASSWORD__|${REDIS_PASSWORD}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__REDIS_DB__|${REDIS_DB}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__JWT_SECRET__|${JWT_SECRET}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__NSQ_NSQD_HOST__|${NSQ_NSQD_HOST}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__NSQ_NSQD_PORT__|${NSQ_NSQD_PORT}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__OSS_ACCESS_KEY_ID__|${OSS_ACCESS_KEY_ID}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__OSS_ACCESS_KEY_SECRET__|${OSS_ACCESS_KEY_SECRET}|g" deploy-package/configs/env/config.prod.env
          sed -i "s|__OSS_SESSION_TOKEN__|${OSS_SESSION_TOKEN}|g" deploy-package/configs/env/config.prod.env

          echo "=========================================="
          echo "📋 Generated config.prod.env for API Server"
          echo "=========================================="
          cat deploy-package/configs/env/config.prod.env \
            | sed 's/PASSWORD=.*/PASSWORD=***REDACTED***/g' \
            | sed 's/SECRET=.*/SECRET=***REDACTED***/g' \
            | sed 's/ACCESS_KEY_ID=.*/ACCESS_KEY_ID=***REDACTED***/g' \
            | sed 's/SESSION_TOKEN=.*/SESSION_TOKEN=***REDACTED***/g'
          echo "=========================================="

          # 以目录形式上传，避免双重 tar 丢失文件
          # 使用服务名称作为前缀，避免并行部署时文件冲突
          tar -czf deploy-package-apiserver.tar.gz -C deploy-package .

      - name: Upload deployment package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SVRA_HOST }}
          username: ${{ secrets.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ secrets.SVRA_SSH_PORT || 22 }}
          source: "deploy-package-apiserver.tar.gz"
          target: "/tmp"

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.0
        env:
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          DOCKER_REPOSITORY: ${{ env.DOCKER_REPOSITORY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
          INTERNAL_HTTP_PORT: ${{ env.INTERNAL_HTTP_PORT }}
          INTERNAL_HTTPS_PORT: ${{ env.INTERNAL_HTTPS_PORT }}
          GHCR_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SUDO_PASSWORD: ${{ secrets.SVRA_SUDO_PASSWORD }}
          WWW_UID: ${{ env.WWW_UID }}
          WWW_GID: ${{ env.WWW_GID }}
        with:
          host: ${{ secrets.SVRA_HOST }}
          username: ${{ secrets.SVRA_USERNAME }}
          key: ${{ secrets.SVRA_SSH_KEY }}
          port: ${{ secrets.SVRA_SSH_PORT || 22 }}
          envs: DOCKER_REGISTRY,DOCKER_REPOSITORY,IMAGE_NAME,CONTAINER_NAME,HTTP_PORT,HTTPS_PORT,INTERNAL_HTTP_PORT,INTERNAL_HTTPS_PORT,GHCR_USERNAME,GITHUB_TOKEN,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SUDO_PASSWORD,WWW_UID,WWW_GID
          script: |
            set -Eeuo pipefail

            : "${WWW_UID:?WWW_UID secret is required}"
            : "${WWW_GID:?WWW_GID secret is required}"
            APP_UID="${WWW_UID}"
            APP_GID="${WWW_GID}"

            # SUDO 助手
            if sudo -n true 2>/dev/null; then
              SUDO="sudo"
              echo "ℹ️ Using passwordless sudo."
            else
              if [ -z "${SUDO_PASSWORD:-}" ]; then
                echo "❌ sudo needs password. Provide SVRA_SUDO_PASSWORD or configure NOPASSWD." >&2
                exit 1
              fi
              sudo_pw() { sudo -S "$@" <<<"$SUDO_PASSWORD"; }
              export -f sudo_pw
              SUDO="sudo_pw"
              $SUDO -v || true
              echo "ℹ️ Using sudo with password."
            fi

            if [ "$SUDO" = "sudo_pw" ]; then
              SUDO_ASKPASS_SCRIPT="$(mktemp)"
              printf '%s\n' '#!/bin/sh' 'printf '\''%s\n'\'' "$SUDO_PASSWORD"' >"$SUDO_ASKPASS_SCRIPT"
              chmod 700 "$SUDO_ASKPASS_SCRIPT"
            fi

            cleanup_auth_helpers() {
              if [ -n "${SUDO_ASKPASS_SCRIPT:-}" ]; then
                rm -f "$SUDO_ASKPASS_SCRIPT"
              fi
            }
            trap cleanup_auth_helpers EXIT

            docker_login_with_token() {
              local username="$1"
              local token="$2"
              local registry="${3:-}"
              local token_file rc
              token_file="$(mktemp)"
              chmod 600 "$token_file"
              printf '%s' "$token" >"$token_file"
              rc=1
              if [ "$SUDO" = "sudo_pw" ]; then
                if [ -n "$registry" ]; then
                  if SUDO_ASKPASS="$SUDO_ASKPASS_SCRIPT" sudo -A docker login "$registry" -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                else
                  if SUDO_ASKPASS="$SUDO_ASKPASS_SCRIPT" sudo -A docker login -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                fi
              else
                if [ -n "$registry" ]; then
                  if $SUDO docker login "$registry" -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                else
                  if $SUDO docker login -u "$username" --password-stdin <"$token_file" >/dev/null; then
                    rc=0
                  else
                    rc=$?
                  fi
                fi
              fi
              rm -f "$token_file"
              return "$rc"
            }

            echo "=========================================="
            echo "Deploying ${CONTAINER_NAME} to Production Server"
            echo "=========================================="

            # 目录准备
            $SUDO mkdir -p /opt/qs-server/${CONTAINER_NAME}/configs/env
            $SUDO mkdir -p /data/logs/qs-server/${CONTAINER_NAME}
            $SUDO mkdir -p /opt/backups/qs-server/${CONTAINER_NAME}

            # 备份
            BACKUP_DIR="/opt/backups/qs-server/${CONTAINER_NAME}"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if [ -d "/opt/qs-server/${CONTAINER_NAME}/configs" ] && [ "$(ls -A /opt/qs-server/${CONTAINER_NAME}/configs 2>/dev/null)" != "" ]; then
              $SUDO tar -czf "$BACKUP_DIR/backup_${TIMESTAMP}.tar.gz" \
                /opt/qs-server/${CONTAINER_NAME}/configs \
                2>/dev/null || echo "No previous version to backup"
            fi

            # 解包（使用服务专用的包名，避免并行部署冲突）
            PKG_PATH="/tmp/deploy-package-apiserver.tar.gz"
            if [ ! -f "$PKG_PATH" ]; then
              echo "❌ $PKG_PATH not found" >&2
              ls -al /tmp/deploy-package*.tar.gz 2>/dev/null || true
              exit 1
            fi

            DEPLOY_TMP="/tmp/qs-deploy-apiserver-$$"
            mkdir -p "$DEPLOY_TMP"
            tar -xzf "$PKG_PATH" -C "$DEPLOY_TMP"

            $SUDO rsync -a "$DEPLOY_TMP/configs/" /opt/qs-server/${CONTAINER_NAME}/configs/
            $SUDO chown -R "$APP_UID:$APP_GID" /opt/qs-server/${CONTAINER_NAME}/configs
            $SUDO chown -R "$APP_UID:$APP_GID" /data/logs/qs-server/${CONTAINER_NAME}
            $SUDO mkdir -p /data/image/qrcode
            $SUDO chmod 0777 /data/image
            $SUDO chown -R "$APP_UID:$APP_GID" /data/image/qrcode
            $SUDO chmod 0755 /data/image/qrcode

            # 网络（创建 qs-network，检查 infra-network）
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w qs-network > /dev/null 2>&1; then
              echo "Creating Docker network qs-network..."
              $SUDO docker network create qs-network
            fi
            if ! $SUDO docker network ls --format '{{.Name}}' | grep -w infra-network > /dev/null 2>&1; then
              echo "❌ infra-network not found. Please ensure infrastructure is deployed first."
              exit 1
            fi

            # Web TLS（与 iam-contracts 一致：root 可读校验后 chown 给容器运行 UID）
            CERT_HOST_PATH="/data/ssl/certs/fangcunmount.cn.crt"
            KEY_HOST_PATH="/data/ssl/private/fangcunmount.cn.key"
            GRPC_CERT_DIR="/data/infra/ssl/grpc"

            if ! $SUDO test -r "$CERT_HOST_PATH"; then
              echo "❌ Web CERT not readable: $CERT_HOST_PATH"
              $SUDO ls -l "$CERT_HOST_PATH" || true
              exit 1
            fi
            if ! $SUDO test -r "$KEY_HOST_PATH"; then
              echo "❌ Web KEY not readable: $KEY_HOST_PATH"
              $SUDO namei -l "$KEY_HOST_PATH" || true
              exit 1
            fi
            if ! $SUDO test -d "$GRPC_CERT_DIR"; then
              echo "❌ gRPC certificate directory not found: $GRPC_CERT_DIR"
              exit 1
            fi
            GRPC_CA="$GRPC_CERT_DIR/ca/ca-chain.crt"
            GRPC_CRT="$GRPC_CERT_DIR/server/qs-apiserver.crt"
            GRPC_KEY="$GRPC_CERT_DIR/server/qs-apiserver.key"
            for f in "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"; do
              if ! $SUDO test -r "$f"; then
                echo "❌ Missing or unreadable gRPC mTLS file: $f"
                exit 1
              fi
            done
            $SUDO chown "$APP_UID:$APP_GID" "$GRPC_CA" "$GRPC_CRT" "$GRPC_KEY"
            $SUDO chmod 0644 "$GRPC_CA" "$GRPC_CRT"
            $SUDO chmod 0640 "$GRPC_KEY"

            # 必须同时修正所在目录：仅 chown 文件时，若 private 仍为 700 且属主为其他用户，容器内无法遍历目录 → stat key 报 permission denied
            TLS_CERT_DIR="$(dirname "$CERT_HOST_PATH")"
            TLS_KEY_DIR="$(dirname "$KEY_HOST_PATH")"
            $SUDO chown "$APP_UID:$APP_GID" "$CERT_HOST_PATH" "$KEY_HOST_PATH" "$TLS_CERT_DIR" "$TLS_KEY_DIR"
            $SUDO chmod 0755 "$TLS_CERT_DIR"
            $SUDO chmod 0750 "$TLS_KEY_DIR"
            $SUDO chmod 0644 "$CERT_HOST_PATH"
            $SUDO chmod 0640 "$KEY_HOST_PATH"

            export DOCKER_IMAGE_QS_APISERVER="${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}/${IMAGE_NAME}:latest"

            echo "------------------------------------------"
            echo "🔎 GHCR: 若 login 失败，检查 Package 是否授权本仓库读取 ${DOCKER_REPOSITORY}/${IMAGE_NAME}"
            echo "------------------------------------------"
            GHCR_LOGIN_OK=0
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              echo "Logging into GitHub Container Registry..."
              docker_login_with_token "$GHCR_USERNAME" "$GITHUB_TOKEN" "$DOCKER_REGISTRY" && GHCR_LOGIN_OK=1 || GHCR_LOGIN_OK=0
            fi

            if [ "$GHCR_LOGIN_OK" -ne 1 ]; then
              if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
                echo "⚠️ GHCR login failed; falling back to Docker Hub..."
                DOCKERHUB_LOGIN_OK=0
                docker_login_with_token "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" && DOCKERHUB_LOGIN_OK=1 || DOCKERHUB_LOGIN_OK=0
                if [ "$DOCKERHUB_LOGIN_OK" -ne 1 ]; then
                  echo "❌ Docker Hub login failed; verify DOCKERHUB_USERNAME/DOCKERHUB_TOKEN." >&2
                  exit 1
                fi
                export DOCKER_IMAGE_QS_APISERVER="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest"
              else
                echo "⚠️ GHCR login failed and Docker Hub credentials missing."
              fi
            fi

            # 停旧容器
            if $SUDO docker ps -a --format '{{.Names}}' | grep -w ${CONTAINER_NAME} > /dev/null 2>&1; then
              echo "Stopping existing container..."
              $SUDO docker stop ${CONTAINER_NAME} || true
              $SUDO docker rm ${CONTAINER_NAME} || true
            fi

            # 启动容器（使用 compose）
            cd /opt/qs-server/${CONTAINER_NAME}
            $SUDO docker compose -f "$DEPLOY_TMP/docker-compose.prod.yml" pull qs-apiserver
            $SUDO docker compose -f "$DEPLOY_TMP/docker-compose.prod.yml" up -d qs-apiserver

            # 健康检查：直接在容器内访问内部端口，避免宿主端口配置失误导致误判
            echo "Waiting for service to be ready (in-container health check)..."
            ATTEMPTS=0
            MAX_ATTEMPTS=60
            while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
              if $SUDO docker exec ${CONTAINER_NAME} wget -qO- http://127.0.0.1:${INTERNAL_HTTP_PORT}/health >/dev/null 2>&1; then
                echo "✅ Health check passed (attempt $ATTEMPTS)"
                $SUDO docker ps --filter "name=${CONTAINER_NAME}" --format "table {{.Names}}\t{{.Status}}"
                break
              fi
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; then
                echo "⏳ Health check attempt $ATTEMPTS/$MAX_ATTEMPTS, retrying..."
                sleep 5
              fi
            done

            if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
              echo "❌ Service failed to start after $MAX_ATTEMPTS attempts"
              $SUDO docker logs --tail 100 ${CONTAINER_NAME} || true
              exit 1
            fi

            # 清理旧备份
            $SUDO bash -c 'ls -t '"$BACKUP_DIR"'/backup_*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f 2>/dev/null || true'

            rm -rf "$DEPLOY_TMP"
            rm -f /tmp/deploy-package-apiserver.tar.gz

            echo "=========================================="
            echo "✅ ${CONTAINER_NAME} deployment completed"
            echo "=========================================="

  deploy-collection:
    name: Deploy Collection Server
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.service == 'all' || github.event.inputs.service == 'collection'))
    env:
      WWW_UID: ${{ secrets.WWW_UID }}
      WWW_GID: ${{ secrets.WWW_GID }}
