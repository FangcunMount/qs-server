name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.25.9'
  GOTOOLCHAIN: auto

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Run tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Install dependencies
        run: |
          go mod download

      - name: Install golangci-lint
        run: |
          GOBIN="$(pwd)/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: |
          make fmt-check

      - name: Run make lint
        run: |
          make lint

  security:
    name: Security Scan (Advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Download dependencies
        run: |
          go mod download

      - name: Install security tools
        run: |
          make install-security-tools

      - name: Run govulncheck (advisory)
        continue-on-error: true
        run: |
          make security-govulncheck-ci

      - name: Run gosec (advisory)
        continue-on-error: true
        run: |
          make security-gosec-ci

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: tmp/security/
          retention-days: 7

  maintainability:
    name: Maintainability Scan (Advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Download dependencies
        run: |
          go mod download

      - name: Install golangci-lint
        run: |
          GOBIN="$(pwd)/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Run maintainability advisory
        continue-on-error: true
        run: |
          make maintainability-lint-ci

      - name: Upload maintainability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainability-reports
          path: tmp/maintainability/
          retention-days: 7

  tier1-test-policy:
    name: Tier 1 Test Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Tier 1 package policy
        run: |
          make tier1-test-policy

  docs:
    name: Docs & API Sync
    if: ${{ vars.DOCS_VERIFY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Install PyYAML
        run: |
          python -m pip install --quiet pyyaml

      - name: Install swagger toolchain
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Download dependencies
        run: |
          go mod download

      - name: Verify docs locally (make docs-verify)
        run: |
          make docs-verify

      - name: Ensure no doc drift
        run: |
          git diff --exit-code

  build:
    name: Build Applications
    needs: [test, lint, tier1-test-policy]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [apiserver, collection, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Build ${{ matrix.service }}
        run: |
          make build-${{ matrix.service }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qs-${{ matrix.service }}
          path: bin/*
          retention-days: 7
