# 生产拓扑（2026-07）：
# - serverA（4C/8G）：qs-apiserver + qs-collection-server x2（本文件前两段）
# - serverB：IAM（iam-apiserver，经 Swarm overlay infra-network 跨机 DNS 解析）
# - serverD：qs-worker（本文件 qs-worker 段，compose -p qs-worker 独立部署）
services:
  qs-apiserver:
    image: ${DOCKER_IMAGE_QS_APISERVER:-ghcr.io/fangcunmount/qs-apiserver:latest}
    container_name: qs-apiserver
    restart: unless-stopped
    # apiserver 4C/4G；GOMEMLIMIT 取容器内存 75%。
    mem_limit: "4096m"
    cpus: "4"
    networks:
      qs-network:
      infra-network:
    labels:
      - "prometheus.scrape=true"
      - "prometheus.job=qs-apiserver"
      - "prometheus.component=qs-apiserver"
      - "prometheus.metrics_port=8080"
      - "prometheus.metrics_path=/metrics"
    ports:
      - "8081:8080"
      - "9445:8443"
      - "127.0.0.1:19090:9090"
    env_file:
      - /opt/qs-server/qs-apiserver/configs/env/config.prod.env
    volumes:
      - /opt/qs-server/qs-apiserver/configs:/app/configs
      - /data/logs/qs-server/qs-apiserver:/data/logs/qs
      # 证书与密钥目录统一挂载（避免单文件挂载在只读目录内创建 mountpoint 失败）
      # 私钥须对容器内 www（UID/GID 与镜像构建时 RUN_UID/RUN_GID、GitHub WWW_UID/WWW_GID 一致）可读
      - /data/ssl/certs:/etc/qs-server/ssl/certs:ro
      - /data/ssl/private:/etc/qs-server/ssl/private:ro
      # gRPC mTLS 证书目录
      - /data/infra/ssl/grpc:/etc/qs-server/ssl/grpc:ro
      # 二维码存储目录
      - /data/image/qrcode:/data/image/qrcode:rw
    environment:
      - GOMEMLIMIT=3072MiB
      - GOMAXPROCS=4
    command: ["--config=/app/configs/apiserver.prod.yaml"]

  server:
    image: ${DOCKER_IMAGE_QS_COLLECTION_SERVER:-ghcr.io/fangcunmount/qs-collection-server:latest}
    restart: unless-stopped
    # 默认由 CD 扩为 2 副本；每个副本 2C/1.5G，CPU 配额与 GOMAXPROCS 对齐。
    mem_limit: "1536m"
    cpus: "2"
    networks:
      qs-network:
        aliases:
          - qs-collection-server
      infra-network:
        aliases:
          - qs-collection-server
    labels:
      - "prometheus.scrape=true"
      - "prometheus.job=qs-collection-server"
      - "prometheus.component=qs-collection-server"
      - "prometheus.metrics_port=8080"
      - "prometheus.metrics_path=/metrics"
    # 多副本仅通过 Docker 网络暴露；公网流量由 serverA Nginx 负载均衡。
    expose:
      - "8080"
      - "6060"
    env_file:
      - /opt/qs-server/qs-collection-server/configs/env/config.prod.env
    volumes:
      - /opt/qs-server/qs-collection-server/configs:/app/configs
      # gRPC mTLS 证书目录；公网 HTTPS 由 serverA Nginx 终止
      - /data/infra/ssl/grpc:/etc/qs-server/ssl/grpc:ro
    environment:
      - GOMEMLIMIT=1152MiB
      - GOMAXPROCS=2
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    command: ["--config=/app/configs/collection-server.prod.yaml"]

  runtime:
    image: ${DOCKER_IMAGE_QS_WORKER:-ghcr.io/fangcunmount/qs-worker:latest}
    restart: unless-stopped
    # serverD 独立部署（compose -p qs-worker）；此处为资源模板
    mem_limit: "768m"
    cpus: "1.0"
    networks:
      qs-network:
        aliases:
          - qs-worker
      infra-network:
        aliases:
          - qs-worker
    labels:
      - "prometheus.scrape=true"
      - "prometheus.job=qs-worker"
      - "prometheus.component=qs-worker"
      - "prometheus.metrics_port=9092"
      - "prometheus.metrics_path=/metrics"
    expose:
      - "9092"
    env_file:
      - /opt/qs-server/qs-worker/configs/env/config.prod.env
    volumes:
      - /opt/qs-server/qs-worker/configs:/app/configs
      - /data/logs/qs-server/qs-worker:/data/logs/qs
      # gRPC mTLS 证书目录（CA + 客户端证书），worker 不需要公网 REST TLS 证书
      - /data/infra/ssl/grpc:/etc/qs-server/ssl/grpc:ro
    environment:
      - GOMEMLIMIT=576MiB
      - GOMAXPROCS=2
    command: ["--config=/app/configs/worker.prod.yaml"]

networks:
  qs-network:
    external: true
  infra-network:
    external: true
